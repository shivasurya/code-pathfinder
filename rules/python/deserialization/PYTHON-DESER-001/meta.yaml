# FAQ
faq:
  - question: Why is pickle so dangerous compared to JSON?
    answer: |
      JSON only supports primitive data types (strings, numbers, booleans, arrays,
      objects). It cannot execute code during parsing. Pickle supports arbitrary
      Python objects and calls __reduce__() during deserialization, which can execute
      any Python code. There is no "safe mode" for pickle. The format itself is the
      vulnerability.

  - question: Does this rule also catch shelve, dill, and other pickle-based libraries?
    answer: |
      The rule covers pickle.loads, pickle.load, and _pickle variants. For shelve,
      dill, marshal, yaml.load, and jsonpickle, see the Flask and Django deserialization
      rules (PYTHON-FLASK-SEC-013, PYTHON-DJANGO-SEC-072) which cover a broader set
      of dangerous deserialization functions.

  - question: We use pickle for caching between our own services. Is that safe?
    answer: |
      Only if the transport is fully trusted and authenticated. If an attacker can
      inject data into the cache (through cache poisoning, network interception, or
      a compromised service), pickle deserialization becomes an RCE vector. Consider
      using MessagePack or Protocol Buffers for inter-service serialization, which
      are both faster and safer.

  - question: Can I use pickle safely with HMAC verification?
    answer: |
      HMAC verification before deserialization reduces the risk by ensuring the data
      hasn't been tampered with. However, this only works if the HMAC key is never
      compromised and the verification is correctly implemented. The rule recognizes
      hmac.compare_digest() as a sanitizer and will suppress findings when it's
      present in the flow.

  - question: How do I run this rule in CI/CD?
    answer: |
      Run: pathfinder ci --ruleset python/deserialization --project .
      It outputs SARIF, JSON, or CSV. On GitHub, it posts inline review comments
      directly on pull requests pointing to the exact lines.

  - question: What does a pickle RCE exploit actually look like?
    answer: |
      An attacker crafts a Python class with a __reduce__ method that returns
      (os.system, ('malicious_command',)). When pickle.loads() processes this
      object, it calls os.system('malicious_command'). The payload is typically
      base64-encoded binary data that looks innocuous in HTTP request bodies.

