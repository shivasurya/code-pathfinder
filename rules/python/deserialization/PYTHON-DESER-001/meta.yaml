# Content
description: |
  This rule uses taint analysis to trace untrusted input from web request objects
  (request.data, request.get_data, request.GET, request.POST, socket.recv) to
  pickle.loads() and pickle.load(). Pickle is Python's native serialization format
  and it can execute arbitrary Python code during deserialization. An attacker who
  controls the input to pickle.loads() can run any code on the server, install
  backdoors, exfiltrate data, or pivot to other systems.

  Python's own documentation includes a prominent warning: "The pickle module is
  not secure. Only unpickle data you trust." Despite this, pickle deserialization
  of user input remains one of the most common Python RCE vectors in the wild.

  The rule tracks data flow from request sources through variable assignments to
  pickle sinks. It recognizes HMAC signature verification and input validation as
  sanitizers. If the data passes through hmac.compare_digest() or a .validate()
  call before reaching pickle.loads(), the finding is suppressed.

message: "Untrusted data flows to pickle.loads(), enabling arbitrary code execution. Use json.loads() instead."

security_implications:
  - title: Remote Code Execution
    description: |
      Pickle deserialization calls __reduce__() on objects in the byte stream, which
      can execute arbitrary Python code. An attacker sends a crafted pickle payload
      that imports os and calls os.system('rm -rf /') or installs a reverse shell.
      There is no safe subset of pickle. Any pickle.loads() on attacker-controlled
      data is full RCE.
  - title: Server Takeover
    description: |
      Unlike SQL injection or XSS, pickle RCE gives the attacker a Python interpreter
      running as the web server process. They can read environment variables (database
      credentials, API keys), access the filesystem, connect to internal services, and
      establish persistent backdoor access.
  - title: Supply Chain Risk
    description: |
      Pickle payloads can import and execute any installed Python package. If the
      server has packages with known vulnerabilities, an attacker can leverage them
      through pickle deserialization even if the application code never imports those
      packages directly.
  - title: Difficult to Detect in Production
    description: |
      Pickle payloads are binary and opaque. Standard WAFs and request logging won't
      flag them because the malicious content is encoded in Python's internal object
      format, not in visible strings. The attack leaves no obvious trace in
      application logs.

secure_example: |
  import json
  from flask import Flask, request

  app = Flask(__name__)

  @app.route('/api/load', methods=['POST'])
  def load_data():
      # SECURE: Use JSON for untrusted data, never pickle
      try:
          user_data = json.loads(request.data)
          return {'data': user_data}
      except json.JSONDecodeError:
          return {'error': 'Invalid JSON'}, 400

recommendations:
  - Never use pickle.loads() or pickle.load() on data from untrusted sources. Use json.loads() for structured data exchange.
  - If you must deserialize complex Python objects, use a restricted format like jsonpickle with a strict allow-list of permitted classes
  - For inter-service communication where you control both ends, consider Protocol Buffers, MessagePack, or CBOR instead of pickle
  - If legacy code requires pickle for trusted internal data, verify an HMAC signature before deserializing and rotate signing keys regularly
  - Audit all uses of pickle, _pickle, cPickle, shelve, and dill in your codebase. Each one is a potential RCE vector.

detection_scope: |
  This rule traces data from request sources (request.data, request.get_data,
  request.GET, request.POST, request.COOKIES, input(), *.read(), *.recv()) to
  pickle sinks (pickle.loads, pickle.load, _pickle.loads, _pickle.load, *.loads,
  *.load). Sanitizers include *.validate(), *.verify_signature(), *.verify(), and
  hmac.compare_digest(). Uses scope="local" for intra-procedural analysis within
  a single function.

