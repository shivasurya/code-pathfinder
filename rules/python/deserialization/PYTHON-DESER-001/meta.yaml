# Rule Identity
id: PYTHON-DESER-001
name: Unsafe Pickle Deserialization
short_description: Traces untrusted user input from request objects to pickle.loads() or pickle.load(), which can execute arbitrary Python code during deserialization.

# Classification
severity: CRITICAL
category: deserialization
language: python
ruleset: python/deserialization/PYTHON-DESER-001

