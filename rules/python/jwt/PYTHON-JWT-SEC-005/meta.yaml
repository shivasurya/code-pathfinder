# Rule Identity
id: PYTHON-JWT-SEC-005
name: JWT User Input in Payload
short_description: Traces user-controlled input from Flask/Django request parameters into jwt.encode() payloads using taint analysis.

# Classification
severity: LOW
category: jwt
