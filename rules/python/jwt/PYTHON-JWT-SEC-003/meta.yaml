# Rule Identity
id: PYTHON-JWT-SEC-003
name: Unverified JWT Decode
short_description: Detects jwt.decode() calls that may bypass signature verification, allowing tampered tokens to be accepted.

# Classification
severity: HIGH
category: jwt
language: python
ruleset: python/jwt/PYTHON-JWT-SEC-003

# Vulnerability Details
cwe:
