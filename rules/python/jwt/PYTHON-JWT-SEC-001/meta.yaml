# Rule Identity
id: PYTHON-JWT-SEC-001
name: JWT Hardcoded Secret
short_description: Finds jwt.encode() calls where the signing secret is a hardcoded string instead of a runtime configuration value.

# Classification
severity: HIGH
category: jwt
language: python
ruleset: python/jwt/PYTHON-JWT-SEC-001

# Vulnerability Details
cwe:
  - id: CWE-798
    name: "Use of Hard-coded Credentials"
    url: https://cwe.mitre.org/data/definitions/798.html
  - id: CWE-522
