# Rule Identity
id: PYTHON-JWT-SEC-002
name: JWT None Algorithm
short_description: Detects jwt.encode() calls using algorithm='none', which creates unsigned tokens that anyone can forge.

# Classification
severity: CRITICAL
category: jwt
language: python
ruleset: python/jwt/PYTHON-JWT-SEC-002

# Vulnerability Details
cwe:
  - id: CWE-327
    name: "Use of a Broken or Risky Cryptographic Algorithm"
    url: https://cwe.mitre.org/data/definitions/327.html
  - id: CWE-345
