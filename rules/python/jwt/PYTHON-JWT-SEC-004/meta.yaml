# Rule Identity
id: PYTHON-JWT-SEC-004
name: JWT Exposed Credentials
short_description: Detects jwt.encode() calls where passwords or secrets may be included in the token payload, exposing them to anyone who reads the token.

# Classification
severity: MEDIUM
category: jwt
language: python
ruleset: python/jwt/PYTHON-JWT-SEC-004

