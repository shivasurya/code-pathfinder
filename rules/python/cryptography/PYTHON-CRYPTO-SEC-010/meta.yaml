id: PYTHON-CRYPTO-SEC-010
name: Insecure MD5 Hash (cryptography)
short_description: MD5 is cryptographically broken due to collision attacks since 2004. Use SHA-256 or SHA-3 instead.
severity: MEDIUM
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-010
cwe:
  - id: CWE-327
    name: Use of a Broken or Risky Cryptographic Algorithm
    url: https://cwe.mitre.org/data/definitions/327.html
  - id: CWE-328
    name: Use of Weak Hash
    url: https://cwe.mitre.org/data/definitions/328.html
tags:
  - python
  - cryptography
  - md5
  - weak-hash
  - CWE-327
  - OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: |
  Detects usage of MD5 via the `cryptography` library's hazmat primitives interface
  (`hashes.MD5()`). MD5 produces a 128-bit digest and has been considered
  cryptographically broken since 2004 when Wang et al. demonstrated practical chosen-prefix
  collision attacks. By 2008, rogue CA certificates were forged using MD5 collisions in
  under hours of computation. Today, MD5 collisions can be produced in seconds on commodity
  hardware.

  MD5 must not be used for digital signatures, certificate validation, HMAC-based
  authentication, or data integrity verification in security contexts. It remains acceptable
  for non-security purposes such as cache keys, file deduplication, or content-addressable
  storage where collision resistance is not a security requirement.

  This rule specifically targets `cryptography.hazmat.primitives.hashes.MD5` instantiation,
  which is the hazmat (Hazardous Materials) layer indicating the caller is expected to
  understand the risks — yet MD5 is still dangerous regardless of the API used.
message: MD5 is cryptographically broken due to collision attacks since 2004. Replace with hashes.SHA256() or hashes.SHA3_256() for security-sensitive operations.
detection_scope: |
  Matches any call to `CryptoHashes.method("MD5")` where `CryptoHashes` is a QueryType
  resolving fully-qualified names under `cryptography.hazmat.primitives.hashes`. This
  catches `hashes.MD5()` regardless of how the `hashes` module is imported or aliased.
  The rule fires on instantiation of the MD5 hash object, not on specific method calls
  made on the resulting digest object.
secure_example: |
  from cryptography.hazmat.primitives import hashes
  from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
  import os

  # SECURE: SHA-256 for general integrity checking
  digest = hashes.Hash(hashes.SHA256())
  digest.update(b"data to hash")
  result = digest.finalize()

  # SECURE: SHA-3 for stronger collision resistance
  digest = hashes.Hash(hashes.SHA3_256())
  digest.update(b"data to hash")
  result = digest.finalize()

  # SECURE: PBKDF2 with SHA-256 for password-derived keys
  salt = os.urandom(16)
  kdf = PBKDF2HMAC(algorithm=hashes.SHA256(), length=32, salt=salt, iterations=600000)
  key = kdf.derive(b"my password")

  # OK for non-security use (deduplication, cache keys — NOT integrity)
  # import hashlib; hashlib.md5(data).hexdigest()  # only if collision is not a concern
security_implications:
  - "Digital signature forgery: an attacker who can produce a colliding document can substitute a malicious payload that shares the same MD5 hash as a signed original."
  - "Certificate forgery: the 2008 rogue CA attack demonstrated that MD5-signed certificates can be forged, enabling man-in-the-middle attacks on TLS connections."
  - "Data integrity bypass: applications relying on MD5 for tamper detection can be tricked into accepting modified data that produces the same digest."
  - "Password cracking acceleration: MD5 is extremely fast (billions of hashes per second on GPUs), making brute-force and dictionary attacks trivial when MD5 is misused for password storage."
recommendations:
  - "Replace hashes.MD5() with hashes.SHA256() or hashes.SHA3_256() for all integrity and signing use cases."
  - "For password hashing, do not use any raw hash function — use a memory-hard KDF such as Argon2 (argon2-cffi), bcrypt, or scrypt instead."
  - "For HMAC authentication, use HMAC with SHA-256 or SHA-3 (cryptography.hazmat.primitives.hmac with hashes.SHA256())."
  - "MD5 may remain in place for purely non-security uses (cache keys, file deduplication) where collision resistance carries no security consequence — document this explicitly."
  - "When migrating existing MD5-hashed data (e.g., stored checksums), re-hash with SHA-256 on first verified access and deprecate the MD5 path."
compliance:
  - standard: OWASP Top 10
    requirement: "A02:2021 - Cryptographic Failures"
  - standard: PCI DSS v4.0
    requirement: "Requirement 4.2.1 -- use strong cryptography"
  - standard: NIST SP 800-131A
    requirement: "MD5 and SHA-1 disallowed for digital signatures"
  - standard: NIST SP 800-53
    requirement: "SC-13: Cryptographic Protection"
faq:
  - question: "Is MD5 ever safe to use?"
    answer: "MD5 is safe for non-security checksums such as file deduplication, cache invalidation keys, or content-addressable storage where an attacker gaining from a collision provides no security benefit. It must not be used for digital signatures, certificate hashing, HMAC, password storage, or any context where collision resistance matters."
  - question: "Why not just use SHA-256 for password hashing too?"
    answer: "SHA-256 (and all raw hash functions) are designed to be fast. Speed is an advantage for an attacker performing brute-force or dictionary attacks. Password hashing requires a deliberately slow, memory-hard function — use Argon2, bcrypt, or scrypt. PBKDF2 with SHA-256 is acceptable when Argon2 is unavailable, but requires at least 600,000 iterations per NIST SP 800-132."
  - question: "I need MD5 for a legacy protocol or format — what should I do?"
    answer: "If MD5 is mandated by an external specification you cannot change, document it clearly, isolate the usage, and add compensating controls (e.g., an outer integrity layer using SHA-256 HMAC). Flag the dependency for removal when the protocol allows migration."
  - question: "Does this rule fire on hashlib.md5() from the standard library?"
    answer: "No. This rule targets the `cryptography` library's hazmat primitives. For hashlib.md5() detection, see the hashlib-specific rules in this ruleset."
  - question: "How do I run this rule in CI/CD?"
    answer: "Run `code-pathfinder scan --ruleset python/cryptography/PYTHON-CRYPTO-SEC-010 --path ./src` in your pipeline. Add `--format sarif` to produce SARIF output compatible with GitHub Advanced Security and similar platforms."
  - question: "What is the severity and why MEDIUM rather than HIGH?"
    answer: "MEDIUM reflects that MD5 is context-dependent — collision attacks are practical but require attacker interaction at the point of signing or hashing. Rules targeting MD4 and MD2 are rated HIGH because those algorithms offer no practical security even in constrained scenarios."
  - question: "Can the cryptography library's hazmat MD5 be used safely for non-cryptographic purposes?"
    answer: "Technically yes, but using the hazmat interface for non-security purposes adds unnecessary complexity. Prefer `hashlib.md5()` for checksums to make the non-security intent explicit. The hazmat interface signals cryptographic use, which increases the chance of future misuse."
