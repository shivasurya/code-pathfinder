# Rule Identity
id: PYTHON-CRYPTO-SEC-005a
name: Triple DES (3DES) Cipher Usage via PyCryptodome
short_description: Detects use of Triple DES (3DES) through PyCryptodome, which has a 64-bit block size vulnerable to Sweet32 birthday attacks and was deprecated by NIST after 2023.

# Classification
severity: MEDIUM
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-005a

