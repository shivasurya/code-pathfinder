id: PYTHON-CRYPTO-SEC-023
name: Insufficient RSA Key Size (PyCryptodome)
short_description: RSA key size is less than 3072 bits in PyCryptodome. Use RSA.generate(3072) or higher.
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-023
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- pycryptodome
- rsa
- key-size
- CWE-326
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Detects RSA key generation using `RSA.generate(bits)` from PyCryptodome where the first
  positional argument (key size in bits) is less than 3072. This rule uses a
  `.where(0, lt(3072))` predicate targeting position 0 of the call — it fires only on
  provably undersized keys and does not flag 3072-bit or larger keys.

  The 3072-bit threshold is deliberately stricter than the SEC-020 `cryptography` library rule
  (which uses 2048 as the floor). PyCryptodome's own documentation recommends 3072-bit keys
  for new applications to ensure adequate security beyond 2030. NIST SP 800-57 equates 3072-bit
  RSA to 128-bit symmetric security. A 2048-bit RSA key provides only 112-bit security and
  is scheduled for deprecation by NIST after 2030. RSA keys shorter than 3072 bits are
  vulnerable to the General Number Field Sieve factorization algorithm given sufficient compute.
  For new systems, consider ECDSA with SECP256R1 or SECP384R1 which provides equivalent or
  stronger security with significantly shorter keys.
message: RSA key size is less than 3072 bits. Use RSA.generate(3072) or RSA.generate(4096) per PyCryptodome recommendations.
secure_example: |
  from Crypto.PublicKey import RSA

  # SECURE: RSA 3072-bit key (NIST 128-bit security, recommended minimum)
  key = RSA.generate(3072)

  # SECURE: RSA 4096-bit key (preferred for long-lived keys and certificates)
  key = RSA.generate(4096)

  # PREFERRED: Use ECDSA instead of RSA for new systems
  from Crypto.PublicKey import ECC
  key = ECC.generate(curve='P-384')
recommendations:
- Use RSA.generate(3072) as the minimum for PyCryptodome RSA key generation.
- Use RSA.generate(4096) for long-lived keys such as CA certificates or signing keys.
- Consider replacing RSA with ECC — ECC.generate(curve='P-256') provides equivalent security to RSA-3072 with a 256-bit key.
- Note that this rule is stricter than SEC-020 (cryptography lib) which uses 2048 as the floor; aligning on 3072 ensures systems will remain compliant beyond 2030.
- Audit all RSA key material in your infrastructure and schedule rotation of any keys below 3072 bits on a risk-based timeline.
