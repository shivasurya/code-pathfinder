faq:
- question: Does this rule flag RSA.generate(2048)?
  answer: >
    Yes. This rule flags keys below 3072 bits, so RSA.generate(2048) will trigger a finding.
    This is intentionally stricter than SEC-020 (which only flags below 2048). The 3072-bit
    threshold reflects NIST's recommendation for systems expected to operate beyond 2030 and
    PyCryptodome's own documentation guidance.
- question: Why does SEC-023 flag below 3072 while SEC-020 flags below 2048?
  answer: >
    SEC-020 targets the `cryptography` library and uses 2048 bits as the hard regulatory
    minimum per NIST SP 800-131A. SEC-023 targets PyCryptodome and applies a forward-looking
    threshold of 3072 bits, reflecting PyCryptodome's own recommendation for new applications
    and NIST's guidance that 2048-bit provides only 112-bit security (acceptable until 2030,
    not beyond). This difference helps teams building new systems avoid creating key material
    that will require imminent rotation.
- question: What key size should I use for new applications?
  answer: >
    Use RSA.generate(3072) as the minimum for new PyCryptodome applications. Use
    RSA.generate(4096) for long-lived certificates or any key protecting data beyond 2030.
    Alternatively migrate to ECC — ECC.generate(curve='P-256') provides 128-bit security
    with a much shorter key and faster operations.
- question: Is RSA.generate(2048) safe right now?
  answer: >
    Technically 2048-bit RSA meets current NIST minimums and will until 2030. However,
    PyCryptodome's documentation explicitly recommends 3072-bit for new applications, and
    this rule enforces that recommendation. If you have 2048-bit keys in existing systems
    you should plan rotation before 2030; do not generate new 2048-bit keys.
- question: What attack does a sub-3072 RSA key enable?
  answer: >
    RSA keys are broken by factoring the modulus N = p * q. The General Number Field Sieve
    (GNFS) algorithm has a sub-exponential runtime that makes 1024-bit keys factorable and
    puts 2048-bit keys at increasing risk as compute costs fall. Once factored, all
    past ciphertext encrypted with that key can be decrypted (no forward secrecy), and
    signatures can be forged.
- question: Does PyCryptodome enforce any minimum key size internally?
  answer: >
    PyCryptodome does not enforce a minimum key size by default. RSA.generate(512) will
    succeed without warning. This rule compensates for that missing guard at the code
    analysis layer.
- question: How does this rule detect the key size in positional argument calls?
  answer: >
    PyCryptodome's `RSA.generate(bits)` accepts key size as position 0. The rule uses
    `.where(0, lt(3072))` to filter on the first positional argument. If the key size is
    passed as a variable whose value cannot be statically resolved, this rule may not fire
    (under-approximation). Consider using named constants or literal values for key sizes.
