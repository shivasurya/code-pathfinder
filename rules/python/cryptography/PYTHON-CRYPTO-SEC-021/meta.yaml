faq:
- question: Does this rule flag 2048-bit DSA keys?
  answer: >
    No. The rule uses `.where("key_size", lt(2048))` which only fires when key_size is strictly
    less than 2048 bits. A key_size=2048 call does NOT trigger this rule.
- question: What key size should I use for DSA in new applications?
  answer: >
    Use 2048-bit DSA at minimum, or 3072-bit for systems requiring protection beyond 2030.
    However, for any new system consider replacing DSA entirely with ECDSA using SECP256R1
    (equivalent to 3072-bit RSA/DSA) or EdDSA (Ed25519). These are faster, have smaller
    key and signature sizes, and EdDSA is immune to nonce reuse vulnerabilities.
- question: Why is DSA particularly risky compared to RSA?
  answer: >
    DSA signing requires a random nonce (k) per signature. If that nonce is ever reused across
    two signatures, an attacker can algebraically recover the private key — even if the key
    itself is 4096 bits. This attack was used in 2010 to extract the Sony PS3 master signing key.
    ECDSA shares this property; EdDSA (Ed25519) deterministically derives nonces and is immune.
- question: What attack does a small DSA key enable?
  answer: >
    Small DSA keys are vulnerable to the index calculus algorithm for computing discrete
    logarithms over the underlying finite field. With a 1024-bit modulus, an attacker can
    recover the private key and then forge signatures on arbitrary messages, enabling them
    to impersonate the key holder for code signing, authentication, or certificate issuance.
- question: Why does this rule flag below 2048 while SEC-024 (PyCryptodome) also flags below 2048?
  answer: >
    Both SEC-021 and SEC-024 use 2048 bits as the threshold, aligning with the NIST SP 800-131A
    minimum. The only difference is the library being targeted: SEC-021 targets the `cryptography`
    library's `dsa.generate_private_key(key_size=...)` API, while SEC-024 targets PyCryptodome's
    `DSA.generate(bits)` API where key size is a positional argument.
- question: Is DSA still acceptable for compliance purposes?
  answer: >
    Yes, 2048-bit DSA remains acceptable under most compliance frameworks through 2030. However,
    NIST SP 800-131A notes that DSA is losing support across implementations. OpenSSH deprecated
    DSA host keys in version 7.0 (2015). Check your compliance framework's current approved
    algorithm list before committing to DSA for new systems.
