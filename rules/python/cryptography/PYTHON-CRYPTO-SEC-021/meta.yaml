id: PYTHON-CRYPTO-SEC-021
name: Insufficient DSA Key Size (cryptography lib)
short_description: DSA key size is less than 2048 bits. NIST SP 800-131A requires 2048-bit minimum.
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-021
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- cryptography
- dsa
- key-size
- CWE-326
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Detects DSA key generation using `dsa.generate_private_key()` from the `cryptography` library
  where the `key_size` argument is less than 2048 bits. This rule uses a `.where("key_size", lt(2048))`
  predicate and fires only on provably undersized keys; it does not flag 2048-bit or larger keys.
  DSA with small keys is vulnerable to discrete logarithm attacks: with a 1024-bit modulus an
  attacker can recover the private key and then forge arbitrary signatures on any message.
  NIST SP 800-131A formally deprecated 1024-bit DSA in 2013 and requires 2048-bit minimum.
  Note that DSA itself is being phased out in favour of ECDSA — even at 2048 bits, DSA requires
  careful nonce management (a reused nonce leaks the private key as demonstrated in Sony PlayStation
  3 key extraction). For new systems prefer ECDSA with SECP256R1 or EdDSA.
message: DSA key size is less than 2048 bits. Use at least 2048-bit DSA keys, or prefer ECDSA/EdDSA for new systems.
secure_example: |
  from cryptography.hazmat.primitives.asymmetric import dsa, ec
  from cryptography.hazmat.backends import default_backend

  # SECURE: DSA 2048-bit key (NIST minimum)
  private_key = dsa.generate_private_key(
      key_size=2048,
      backend=default_backend()
  )

  # SECURE: DSA 3072-bit key (recommended for post-2030)
  private_key = dsa.generate_private_key(
      key_size=3072,
      backend=default_backend()
  )

  # PREFERRED: ECDSA P-256 — replaces DSA for new systems, immune to nonce reuse issues
  private_key = ec.generate_private_key(ec.SECP256R1(), backend=default_backend())
recommendations:
- Use key_size=2048 as the absolute minimum; use key_size=3072 for systems expected to operate beyond 2030.
- Consider replacing DSA with ECDSA (SECP256R1) or EdDSA for new applications — smaller keys, faster operations, and no nonce-reuse catastrophe.
- If DSA must be used, ensure the per-signature nonce (k) is generated with a cryptographically secure random number generator; a reused nonce leaks the private key.
- Audit all DSA key material in your infrastructure and schedule rotation of any keys below 2048 bits.
