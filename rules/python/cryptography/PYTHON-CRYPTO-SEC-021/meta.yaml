id: PYTHON-CRYPTO-SEC-021
name: Insufficient DSA Key Size
short_description: DSA key size is less than 2048 bits. Use at least 2048-bit keys.
severity: HIGH
category: cryptography
language: python
ruleset: python/PYTHON-CRYPTO-SEC-021
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- cryptography
- dsa
- key-size
- audit
- CWE-326
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: Detects DSA key generation with key_size less than 2048 bits in the cryptography library.
  NIST SP 800-131A requires 2048-bit minimum for DSA keys.
message: DSA key size is less than 2048 bits. Use at least 2048-bit keys.
secure_example: "from cryptography.hazmat.primitives.asymmetric import rsa, dsa, ec\nfrom cryptography.hazmat.backends\
  \ import default_backend\n\n# SECURE: RSA-3072 or higher\nprivate_key = rsa.generate_private_key(\n\
  \    public_exponent=65537,\n    key_size=3072,\n    backend=default_backend()\n)\n\n# SECURE: DSA-2048\
  \ or higher\nprivate_key = dsa.generate_private_key(\n    key_size=2048,\n    backend=default_backend()\n\
  )\n\n# SECURE: Strong elliptic curve (P-256 or higher)\nprivate_key = ec.generate_private_key(\n   \
  \ ec.SECP256R1(),  # NIST P-256\n    backend=default_backend()\n)\n\n# SECURE: PyCryptodome RSA-3072\n\
  from Crypto.PublicKey import RSA\nkey = RSA.generate(3072)"
recommendations: []
references:
