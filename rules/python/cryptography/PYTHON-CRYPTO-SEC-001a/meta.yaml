# Rule Identity
id: PYTHON-CRYPTO-SEC-001a
name: RC4 (ARC4) Cipher Usage via PyCryptodome
short_description: Detects use of the RC4 stream cipher through PyCryptodome's ARC4 module, which has known keystream biases and is prohibited by RFC 7465.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-001a

# Vulnerability Details
cwe:
