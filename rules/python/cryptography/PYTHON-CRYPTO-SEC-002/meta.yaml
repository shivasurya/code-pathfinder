# Rule Identity
id: PYTHON-CRYPTO-SEC-002
name: Blowfish Cipher Usage via cryptography Library
short_description: Detects use of the Blowfish cipher through the cryptography library, which has a 64-bit block size making it vulnerable to Sweet32 birthday attacks after approximately 32GB of data.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-002

# Vulnerability Details
cwe:
