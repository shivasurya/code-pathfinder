faq:
- question: Why does this rule flag AES.MODE_GCM if GCM is the recommended mode?
  answer: >
    This is an intentional audit-level rule. The engine matches all `AES.new()` calls because
    it cannot currently filter by the mode constant value. This means safe GCM calls are
    flagged alongside dangerous ECB calls. The intent is to ensure all AES usage is reviewed.
    For confirmed GCM, EAX, SIV, or CCM calls, suppress the finding with an inline annotation
    after verifying the usage is correct.
- question: Why can't the engine filter by mode constant?
  answer: >
    The engine currently lacks a `not_in` qualifier that would allow excluding specific
    argument values. Until that capability is available, this rule must audit all AES.new()
    calls. The known gap is documented in the ruleset roadmap. When the qualifier is implemented,
    this rule will be updated to flag only unauthenticated modes precisely.
- question: What is the difference between MODE_GCM and MODE_EAX?
  answer: >
    Both GCM and EAX are authenticated encryption modes (AEAD) providing confidentiality and
    integrity. GCM is based on GHASH and is hardware-accelerated on modern CPUs (PCLMULQDQ
    instruction), making it faster in most environments. EAX is based on CMAC, is slightly
    simpler to implement correctly (no nonce length restrictions), and avoids potential
    multi-key GCM weaknesses. For most applications GCM is the practical choice due to
    hardware support; EAX is a good alternative when simplicity is preferred.
- question: Is MODE_CBC ever acceptable in PyCryptodome?
  answer: >
    Yes, but only when paired with HMAC in Encrypt-then-MAC construction: encrypt first,
    then compute HMAC-SHA256 over (IV || ciphertext), store both. On decryption, verify the
    HMAC before any decryption call. The analysis engine cannot detect the HMAC pairing, so
    CBC usage will always be flagged by this rule. Consider migrating to GCM to eliminate
    the audit overhead.
- question: What is MODE_SIV and when should I use it?
  answer: >
    SIV (Synthetic IV) is a nonce-misuse-resistant authenticated encryption mode. Unlike GCM,
    which produces completely broken output if a nonce is ever reused, SIV degrades gracefully
    under nonce reuse — it still provides integrity, only losing IND-CPA security for repeated
    messages. SIV is recommended when deterministic encryption is needed (e.g., encrypting
    database values where nonce storage is impractical) or when nonce generation cannot be
    guaranteed to be unique.
- question: How do I migrate from AES.MODE_ECB to GCM in PyCryptodome?
  answer: >
    Replace `cipher = AES.new(key, AES.MODE_ECB)` with `cipher = AES.new(key, AES.MODE_GCM)`.
    Change `ciphertext = cipher.encrypt(data)` to `ciphertext, tag = cipher.encrypt_and_digest(data)`.
    Store the nonce (`cipher.nonce`) alongside the ciphertext and tag. For decryption, create a
    new cipher with the stored nonce and call `cipher.decrypt_and_verify(ciphertext, tag)` which
    raises `ValueError` if the tag is invalid. Note that existing ECB-encrypted data cannot be
    decrypted with GCM — you need to decrypt old data with ECB and re-encrypt with GCM.
- question: Does this rule cover DES or 3DES in PyCryptodome?
  answer: >
    No — this rule specifically targets `AES.new()`. DES and 3DES usage is covered by separate
    rules in the weak algorithm category. Both DES (56-bit) and 3DES (112-bit effective) are
    deprecated by NIST SP 800-131A and should be replaced with AES-256-GCM.
