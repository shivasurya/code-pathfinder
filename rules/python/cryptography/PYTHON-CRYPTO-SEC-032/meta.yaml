id: PYTHON-CRYPTO-SEC-032
name: AES Cipher Mode Audit (PyCryptodome)
short_description: Audit all AES.new() calls — verify the cipher mode is MODE_GCM, MODE_EAX, MODE_SIV, or MODE_CCM. Unauthenticated modes (MODE_ECB, MODE_CBC without HMAC) must not be used.
severity: MEDIUM
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-032
cwe:
- id: CWE-327
  name: Use of a Broken or Risky Cryptographic Algorithm
  url: https://cwe.mitre.org/data/definitions/327.html
tags:
- python
- pycryptodome
- cipher-mode
- unauthenticated
- aes
- audit
- CWE-327
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Audit rule that flags all calls to `AES.new()` from PyCryptodome to prompt review of the
  cipher mode argument. This rule matches `PyCryptoAES.method("new")` without filtering on the
  mode constant because the analysis engine cannot currently distinguish `AES.MODE_GCM` from
  `AES.MODE_ECB` or `AES.MODE_CBC` when the mode is passed as a positional or keyword argument.
  This is a known engine limitation (the `not_in` qualifier for argument value exclusion is not
  yet available).

  PyCryptodome's AES.new() supports both secure and insecure modes in the same API:
  MODE_GCM, MODE_EAX, MODE_SIV, and MODE_CCM provide authenticated encryption (AEAD) and are
  safe for new code. MODE_ECB is deterministic and leaks plaintext patterns — it is a hard
  vulnerability (see SEC-030). MODE_CBC, MODE_CTR, MODE_CFB, and MODE_OFB provide confidentiality
  only and require a separate HMAC for integrity (see SEC-031).

  All AES.new() calls are flagged here as an audit checkpoint. Expected false positives include
  code using MODE_GCM or MODE_EAX correctly — verify the mode and suppress findings where
  authenticated modes are used. Findings using MODE_ECB or unauthenticated modes without HMAC
  are confirmed vulnerabilities.
message: >
  Audit: review the AES cipher mode used here. MODE_GCM/EAX/SIV/CCM are safe (AEAD).
  MODE_ECB must not be used. MODE_CBC/CTR/CFB/OFB require a separate HMAC for authentication.
secure_example: |
  from Crypto.Cipher import AES
  import os

  # SECURE: AES-GCM — authenticated encryption, provides confidentiality + integrity
  key = os.urandom(32)
  cipher = AES.new(key, AES.MODE_GCM)
  ct, tag = cipher.encrypt_and_digest(b"sensitive data")
  nonce = cipher.nonce
  # Decrypt: AES.new(key, AES.MODE_GCM, nonce=nonce).decrypt_and_verify(ct, tag)

  # SECURE: AES-EAX — authenticated encryption, simpler nonce handling than GCM
  cipher = AES.new(key, AES.MODE_EAX)
  ct, tag = cipher.encrypt_and_digest(b"sensitive data")

  # SECURE: AES-SIV — nonce-misuse-resistant authenticated encryption
  key_siv = os.urandom(32)
  cipher = AES.new(key_siv, AES.MODE_SIV)
  ct, tag = cipher.encrypt_and_digest(b"sensitive data")

  # NOT SECURE — flag for immediate review:
  # cipher = AES.new(key, AES.MODE_ECB)           # ECB: leaks patterns, never use
  # cipher = AES.new(key, AES.MODE_CBC, iv=iv)    # CBC: needs HMAC for integrity
recommendations:
- Use AES.MODE_GCM with `encrypt_and_digest()` for all new PyCryptodome encryption — it provides confidentiality and authentication in a single call.
- Use AES.MODE_EAX as an alternative to GCM — it has a simpler nonce handling model and is also authenticated.
- Never use AES.MODE_ECB for any structured or multi-block data — replace it immediately with GCM or EAX.
- If MODE_CBC must be used (protocol compatibility), pair it with an explicit HMAC-SHA256 over (iv || ciphertext) using a separate MAC key and verify before decrypting.
- For migrating from MODE_CBC to GCM, note that GCM ciphertexts are longer by the tag length (16 bytes by default) — account for this in storage or wire format.
