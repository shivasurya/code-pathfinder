# Rule Identity
id: PYTHON-CRYPTO-SEC-005
name: DES Cipher Usage via PyCryptodome
short_description: Detects use of single DES through PyCryptodome, which has only a 56-bit key that has been publicly brute-forceable since 1999 and is disallowed by FIPS 46-3 (withdrawn 2005).

