faq:
- question: Why is ECB bad if AES itself is secure?
  answer: >
    AES is a secure block cipher — it provides a strong pseudorandom permutation for each
    128-bit block in isolation. ECB mode applies AES independently to each block with no
    interaction between blocks. This means two identical 16-byte plaintext blocks encrypted
    with the same key always produce identical ciphertext blocks. An attacker can detect
    block repetitions, infer structure, and partially recover plaintext through pattern
    analysis — all without breaking AES itself. The mode is the vulnerability, not the cipher.
- question: Is there any safe use of ECB mode?
  answer: >
    ECB is safe only for encrypting a single block of truly random data (e.g., wrapping a
    random AES key). For any structured data, multi-block data, or data containing attacker-
    influenced values, ECB is insecure. In practice, the only correct answer is to replace
    ECB with GCM or CTR+HMAC — there is no scenario where you should choose ECB for new code.
- question: Does ECB provide any authentication?
  answer: >
    No. ECB provides only confidentiality (and weak confidentiality at that). An attacker can
    rearrange, replace, or duplicate ciphertext blocks without any detection. This enables
    block substitution attacks where an attacker can swap encrypted records or replay encrypted
    tokens without knowing the key.
- question: Is CBC safer than ECB?
  answer: >
    Yes — CBC adds an XOR with the previous ciphertext block (chaining), which breaks the
    identical-block pattern leakage. However, CBC without a MAC is still vulnerable to padding
    oracle attacks (POODLE, Lucky13) and ciphertext manipulation. See SEC-031 for audit
    coverage of unauthenticated CBC usage.
- question: What is the ECB penguin?
  answer: >
    The ECB penguin is a famous demonstration where the Linux mascot (Tux) is encrypted with
    AES-ECB. The resulting ciphertext, when rendered as an image, still clearly shows the
    penguin outline because identical blocks of pixels produce identical encrypted blocks.
    The original image by Philip Levis and adapted as a cryptography teaching tool makes the
    vulnerability immediately intuitive.
- question: Are there CVEs related to ECB misuse?
  answer: >
    Yes. Notable examples include Adobe's 2013 password database breach (150M+ accounts
    encrypted with 3DES-ECB, allowing password frequency analysis from ciphertext alone)
    and numerous token-based authentication systems where ECB-encrypted session tokens
    allowed forging of privileged session identifiers.
