id: PYTHON-CRYPTO-SEC-030
name: ECB Mode Usage (cryptography lib)
short_description: ECB mode is deterministic and leaks plaintext patterns. Use AES-GCM or AES-CTR+HMAC instead.
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-030
cwe:
- id: CWE-327
  name: Use of a Broken or Risky Cryptographic Algorithm
  url: https://cwe.mitre.org/data/definitions/327.html
