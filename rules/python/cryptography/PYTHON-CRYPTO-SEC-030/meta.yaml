- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Detects usage of ECB (Electronic Codebook) mode via `modes.ECB()` from the `cryptography`
  library. ECB is the simplest block cipher mode and is fundamentally insecure for any
  practical use: it encrypts each block of plaintext independently, so identical plaintext
  blocks always produce identical ciphertext blocks under the same key. This deterministic
  property means ECB encryption preserves patterns in the plaintext and provides no semantic
  security.

  The "ECB penguin" is the canonical demonstration: encrypting a bitmap image with ECB mode
  produces a ciphertext image where the penguin outline is still clearly visible, despite
  using AES (a strong cipher). ECB provides no protection against chosen-plaintext attacks
  and allows partial plaintext recovery through pattern analysis. ECB also provides no
  ciphertext integrity or authentication, making it vulnerable to arbitrary block substitution
  without detection.

  This is a hard vulnerability rule, not an audit rule. There is no legitimate use of ECB
  mode for encrypting non-trivial data — replace it with AES-GCM (confidentiality +
  authentication in one primitive) or AES-CTR with HMAC (Encrypt-then-MAC).
message: ECB mode is deterministic and leaks plaintext patterns. Replace with AES-GCM for authenticated encryption or AES-CTR+HMAC for Encrypt-then-MAC.
secure_example: |
  from cryptography.hazmat.primitives.ciphers.aead import AESGCM
  import os

  # SECURE: AES-GCM provides confidentiality + authentication in one primitive
  key = AESGCM.generate_key(bit_length=256)
  aesgcm = AESGCM(key)
  nonce = os.urandom(12)
  ct = aesgcm.encrypt(nonce, b"sensitive data", associated_data=None)
  # Tampered ciphertext raises InvalidTag on decrypt — no silent corruption

  # SECURE: AES-CTR + HMAC (Encrypt-then-MAC) if you need raw cipher control
  from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes
  from cryptography.hazmat.primitives import hmac, hashes
  key_enc = os.urandom(32)
  key_mac = os.urandom(32)
  nonce = os.urandom(16)
  cipher = Cipher(algorithms.AES(key_enc), modes.CTR(nonce))
  enc = cipher.encryptor()
  ct = enc.update(b"sensitive data") + enc.finalize()
  h = hmac.HMAC(key_mac, hashes.SHA256())
  h.update(nonce + ct)
  tag = h.finalize()
  # Verify tag before decrypting
recommendations:
- Replace `modes.ECB()` with `AESGCM` from `cryptography.hazmat.primitives.ciphers.aead` — it provides authenticated encryption (confidentiality + integrity) in a single API.
- If you need unauthenticated stream encryption, use `modes.CTR()` and add a separate HMAC over the ciphertext (Encrypt-then-MAC pattern). Never decrypt before verifying the MAC.
- For PyCryptodome callers, use `AES.new(key, AES.MODE_GCM)` and call `encrypt_and_digest()` to get both ciphertext and authentication tag.
- Never use ECB mode for any real data — even a single block. Databases, file encryption, key wrapping, and token generation that use ECB are all vulnerable.
