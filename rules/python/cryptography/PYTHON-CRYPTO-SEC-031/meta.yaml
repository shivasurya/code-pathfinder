author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Audit rule that flags usage of CBC, CTR, CFB, and OFB cipher modes from the `cryptography`
  library via `modes.CBC()`, `modes.CTR()`, `modes.CFB()`, and `modes.OFB()`. These modes
  provide confidentiality but do NOT provide ciphertext authentication or integrity protection.
  Without a separate message authentication code (MAC), an attacker who can observe or
  manipulate ciphertext can mount padding oracle attacks (CBC), bit-flipping attacks (CTR/CFB/OFB),
  or replay attacks — all without knowing the encryption key.

  This is an audit rule, not a hard vulnerability rule. CBC with a correct Encrypt-then-MAC
  construction using HMAC-SHA256 is cryptographically sound, but the analysis engine cannot
  currently detect whether an HMAC is applied to the ciphertext after encryption. Therefore
  all four modes are flagged for manual review. False positives are expected for code that
  correctly combines these modes with HMAC — the recommended action is to verify the HMAC
  is present and suppress the finding if the implementation is correct.

  For new code, the simplest correct choice is AES-GCM via `AESGCM` from
  `cryptography.hazmat.primitives.ciphers.aead` — it provides both confidentiality and
  authentication in a single primitive with no risk of HMAC omission.
message: >
  Audit: CBC/CTR/CFB/OFB mode provides confidentiality only. Verify that HMAC is applied
  over the ciphertext (Encrypt-then-MAC), or migrate to AES-GCM for authenticated encryption.
secure_example: |
  from cryptography.hazmat.primitives.ciphers.aead import AESGCM
  import os

  # PREFERRED: AES-GCM provides confidentiality + authentication, no HMAC needed
  key = AESGCM.generate_key(bit_length=256)
  aesgcm = AESGCM(key)
  nonce = os.urandom(12)
  ct = aesgcm.encrypt(nonce, b"sensitive data", associated_data=b"header")

  # ACCEPTABLE: CBC + HMAC (Encrypt-then-MAC) — verify MAC BEFORE decrypting
  from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes
  from cryptography.hazmat.primitives import hmac, hashes, padding
  import os

  key_enc = os.urandom(32)
  key_mac = os.urandom(32)
  iv = os.urandom(16)
  padder = padding.PKCS7(128).padder()
  padded = padder.update(b"sensitive data") + padder.finalize()
  cipher = Cipher(algorithms.AES(key_enc), modes.CBC(iv))
  enc = cipher.encryptor()
  ct = enc.update(padded) + enc.finalize()
  h = hmac.HMAC(key_mac, hashes.SHA256())
  h.update(iv + ct)
  tag = h.finalize()
  # Store (iv, ct, tag) and verify tag before decrypting

  # SECURE: ChaCha20Poly1305 — modern AEAD alternative to AES-GCM
  from cryptography.hazmat.primitives.ciphers.aead import ChaCha20Poly1305
  key = ChaCha20Poly1305.generate_key()
  nonce = os.urandom(12)
  chacha = ChaCha20Poly1305(key)
  ct = chacha.encrypt(nonce, b"sensitive data", associated_data=None)
recommendations:
- Migrate to `AESGCM` from `cryptography.hazmat.primitives.ciphers.aead` for new code — it provides authenticated encryption with no risk of forgetting the MAC.
- If CBC is required (e.g., for protocol compatibility), use Encrypt-then-MAC with HMAC-SHA256. Always verify the MAC before decrypting — never decrypt-then-verify.
- For CTR/CFB/OFB modes, add an HMAC over (nonce || ciphertext) before transmitting. Verify the HMAC on receipt before decryption.
- Consider ChaCha20Poly1305 as an alternative AEAD if AES hardware acceleration is unavailable.
- Do not use CBC for TLS-like record protocols — use TLS 1.3 which mandates AEAD-only cipher suites.
