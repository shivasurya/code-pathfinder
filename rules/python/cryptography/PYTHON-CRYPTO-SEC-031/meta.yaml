id: PYTHON-CRYPTO-SEC-031
name: Unauthenticated Cipher Mode Audit (cryptography lib)
short_description: CBC/CTR/CFB/OFB mode detected — these modes provide confidentiality but NOT authentication. Verify HMAC is applied or migrate to GCM.
severity: MEDIUM
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-031
cwe:
- id: CWE-327
  name: Use of a Broken or Risky Cryptographic Algorithm
  url: https://cwe.mitre.org/data/definitions/327.html
