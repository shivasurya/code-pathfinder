faq:
- question: Is CBC safe if I use it with HMAC?
  answer: >
    Yes — CBC used with Encrypt-then-MAC (ETM) where HMAC-SHA256 covers the IV and ciphertext
    is cryptographically sound. The critical requirements are: (1) use Encrypt-THEN-MAC, not
    MAC-then-Encrypt; (2) verify the MAC before performing any decryption; (3) use separate
    keys for encryption and MAC. The analysis engine flags CBC because it cannot detect
    whether HMAC is correctly applied, not because CBC+HMAC is inherently broken.
- question: What is a padding oracle attack and why does it affect CBC?
  answer: >
    In CBC mode, decryption of each block depends on the previous ciphertext block via XOR.
    If a decryption endpoint reveals whether padding is valid (through different error messages,
    timing differences, or exceptions), an attacker can perform a byte-by-byte oracle attack
    to decrypt any ciphertext block without the key. Famous examples include POODLE
    (CVE-2014-3566) and Lucky13. Using Encrypt-then-MAC and rejecting invalid MACs before
    any decryption eliminates this attack surface.
- question: What is a bit-flipping attack and why does it affect CTR/CFB/OFB?
  answer: >
    CTR, CFB, and OFB modes produce keystream that is XORed with plaintext. An attacker who
    can modify a specific bit in the ciphertext will flip the corresponding bit in the
    decrypted plaintext in a predictable way — without knowing the key. Without a MAC, an
    attacker can modify ciphertext to produce controlled plaintext changes at known positions
    (e.g., flipping an "admin=false" flag to "admin=true" in an encrypted cookie).
- question: Why does this rule flag CTR mode if CTR is commonly recommended?
  answer: >
    CTR mode itself provides good confidentiality. The flag is not about CTR being broken
    but about CTR lacking authentication. If an application uses CTR mode without HMAC,
    it is vulnerable to bit-flipping attacks on decrypted data. The rule flags CTR as an
    audit checkpoint to confirm HMAC is present. CTR+HMAC is a valid construction.
- question: Why does this rule flag both CBC and CTR together?
  answer: >
    All four modes (CBC, CTR, CFB, OFB) share the property of providing confidentiality
    without authentication. While CBC is also vulnerable to padding oracle attacks (an
    additional risk CTR avoids), both families require separate MAC protection. A single
    audit rule covering all four avoids missing any unauthenticated mode usage.
- question: Should I use AES-GCM or AES-CBC+HMAC for new applications?
  answer: >
    For new applications use AES-GCM via AESGCM — it is simpler (no separate MAC key,
    no risk of incorrect ETM ordering), hardware-accelerated on modern CPUs (AES-NI + PCLMULQDQ),
    and the standard choice in TLS 1.3, modern SSH, and cloud cryptography APIs. CBC+HMAC
    is acceptable when protocol compatibility requires it but introduces implementation
    complexity that GCM avoids.
- question: What is the difference between MAC-then-Encrypt and Encrypt-then-MAC?
  answer: >
    Encrypt-then-MAC (ETM) applies HMAC to the ciphertext after encryption — the MAC covers
    the ciphertext and IV. Verification rejects tampered ciphertext before any decryption
    occurs, eliminating padding oracle attack surface. MAC-then-Encrypt applies HMAC to
    plaintext before encryption — the MAC is then encrypted. Verification requires decryption
    first, which re-exposes padding oracle vulnerabilities. Always use Encrypt-then-MAC.
