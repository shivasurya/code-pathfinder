id: PYTHON-CRYPTO-SEC-024
name: Insufficient DSA Key Size (PyCryptodome)
short_description: DSA key size is less than 2048 bits in PyCryptodome. Use DSA.generate(2048) or higher.
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-024
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- pycryptodome
- dsa
- key-size
- CWE-326
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Detects DSA key generation using `DSA.generate(bits)` from PyCryptodome where the first
  positional argument (key size in bits) is less than 2048. This rule uses a
  `.where(0, lt(2048))` predicate targeting position 0 — it fires only on provably undersized
  keys and does not flag 2048-bit or larger keys.

  DSA with small keys is vulnerable to discrete logarithm attacks. A 1024-bit DSA key can
  have its private key recovered through index calculus methods, enabling an attacker to forge
  arbitrary signatures. NIST SP 800-131A formally deprecated 1024-bit DSA in 2013 and requires
  2048-bit minimum. Beyond the key size risk, DSA signing requires a cryptographically random
  per-signature nonce (k): a reused nonce across two signatures algebraically exposes the private
  key regardless of key size, as demonstrated in the 2010 Sony PlayStation 3 master key extraction.
  For new applications, prefer ECDSA (ECC.generate(curve='P-256')) or avoid DSA entirely.
message: DSA key size is less than 2048 bits. Use DSA.generate(2048) or prefer ECDSA/EdDSA for new systems.
secure_example: |
  from Crypto.PublicKey import DSA, ECC

  # SECURE: DSA 2048-bit key (NIST SP 800-131A minimum)
  key = DSA.generate(2048)

  # SECURE: DSA 3072-bit key (recommended for post-2030)
  key = DSA.generate(3072)

  # PREFERRED: ECC P-256 replaces DSA for new systems
  key = ECC.generate(curve='P-256')

  # PREFERRED: ECC P-384 for high-value signing keys
  key = ECC.generate(curve='P-384')
recommendations:
- Use DSA.generate(2048) as the absolute minimum; use DSA.generate(3072) for systems requiring protection beyond 2030.
- Consider replacing DSA with ECC (curve='P-256' or 'P-384') for new applications — smaller keys, faster operations, and immune to nonce-reuse catastrophe when using EdDSA.
- If DSA must be used, ensure the per-signature nonce (k) is generated from a CSPRNG; never reuse a nonce across two signatures with the same key.
- Audit all DSA key material and schedule rotation of any keys below 2048 bits.
