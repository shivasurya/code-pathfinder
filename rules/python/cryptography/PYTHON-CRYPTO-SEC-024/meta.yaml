faq:
- question: Does this rule flag DSA.generate(2048)?
  answer: >
    No. The rule uses `.where(0, lt(2048))` which only fires when the bits argument is
    strictly less than 2048. DSA.generate(2048) does NOT trigger this rule.
- question: What key size should I use for new DSA applications?
  answer: >
    Use DSA.generate(2048) as the minimum, or DSA.generate(3072) for data requiring
    protection beyond 2030. However, for any new system seriously consider replacing DSA
    with ECC.generate(curve='P-256') — it is faster, has smaller signatures, and if using
    Ed25519-style deterministic signing avoids the nonce-reuse vulnerability entirely.
- question: How does this rule differ from SEC-021 (DSA in the cryptography lib)?
  answer: >
    Both rules flag DSA keys below 2048 bits. The difference is the target library and API:
    SEC-021 targets `cryptography`'s `dsa.generate_private_key(key_size=...)` named-argument
    API, while SEC-024 targets PyCryptodome's `DSA.generate(bits)` positional-argument API
    and uses `.where(0, lt(2048))` to check position 0.
- question: What attack does a small DSA key enable?
  answer: >
    Small DSA keys are vulnerable to the index calculus algorithm for computing discrete
    logarithms. With a 1024-bit modulus an attacker can recover the private key and forge
    signatures on arbitrary messages — enabling code signing bypass, authentication
    impersonation, or certificate forgery depending on how the key is used.
- question: Why is DSA particularly dangerous compared to RSA?
  answer: >
    Beyond key size, DSA has a catastrophic nonce-reuse vulnerability: if the per-signature
    random value k is ever reused across two signatures (even with a large key), an attacker
    can algebraically derive the private key from those two signatures. This happened to Sony
    in 2010 and to Bitcoin wallet implementations that used flawed RNGs. RSA signing does not
    have this property. EdDSA (Ed25519) mitigates it by deriving k deterministically.
- question: How does this rule detect the key size when it is a positional argument?
  answer: >
    PyCryptodome's DSA.generate() accepts key size as position 0. The rule uses `.where(0, lt(2048))`
    to filter on the first positional argument. If the key size is passed as a variable whose
    value cannot be statically resolved, this rule may not fire (under-approximation).
    Use literal integer values for key sizes in production code to ensure static detectability.
