faq:
- question: Why does this rule flag my SECP256R1 code if P-256 is secure?
  answer: >
    This is an intentional audit-level rule. The analysis engine matches all calls to
    `ec.generate_private_key()` because it cannot currently inspect the curve object to
    distinguish SECP256R1 from SECP192R1 at analysis time. Findings here require human
    review — confirm the curve is an approved NIST curve and suppress the finding with an
    inline annotation if your organization's policy permits it.
- question: Which curves are safe to use?
  answer: >
    NIST-approved curves safe for new systems: SECP256R1 (P-256), SECP384R1 (P-384),
    SECP521R1 (P-521). Deprecated curves that must NOT be used: SECP192R1 (P-192) and
    SECP224R1 (P-224). For key agreement X25519 is widely recommended; for signatures
    Ed25519 is preferred in modern protocols.
- question: What is the security level provided by different curves?
  answer: >
    SECP192R1: 96-bit security (deprecated). SECP224R1: 112-bit security (deprecated after 2030).
    SECP256R1: 128-bit security (approved). SECP384R1: 192-bit security (approved).
    SECP521R1: 260-bit security (approved). X25519/Ed25519: approximately 128-bit security (approved).
- question: Are non-NIST curves like Brainpool curves safe?
  answer: >
    Brainpool curves (brainpoolP256r1, etc.) are standardized by IETF and used in European
    government contexts, but are not FIPS-approved by NIST and may not satisfy US federal
    compliance requirements. Evaluate against your specific compliance framework.
- question: Why should I prefer EC over RSA for new systems?
  answer: >
    EC provides equivalent security with much shorter keys: SECP256R1 (256-bit) matches
    the security of 3072-bit RSA. Shorter keys mean faster key generation, smaller signatures,
    and lower bandwidth. EC is the recommended approach in TLS 1.3, modern SSH, and FIDO2.
- question: What attack does a weak EC curve enable?
  answer: >
    Weak curves with insufficient security parameters are vulnerable to the Pohlig-Hellman
    algorithm and index calculus variants. For SECP192R1 an attacker can compute discrete
    logarithms and recover the private key, enabling signature forgery and decryption of
    ECDH-established sessions.
