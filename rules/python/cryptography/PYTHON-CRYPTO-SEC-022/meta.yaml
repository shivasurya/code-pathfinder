id: PYTHON-CRYPTO-SEC-022
name: EC Key Generation Audit (cryptography lib)
short_description: Audit all EC key generation calls — verify the curve is SECP256R1, SECP384R1, or stronger. Weak curves like SECP192R1 must not be used.
severity: MEDIUM
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-022
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- cryptography
- ec
- elliptic-curve
- key-size
- audit
- CWE-326
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Audit rule that flags all calls to `ec.generate_private_key()` in the `cryptography` library
  to prompt review of the curve argument. Unlike SEC-020 and SEC-021, this is not a precise
  detection rule — it matches `CryptoEC.method("generate_private_key")` without filtering on
  the curve type, because the analysis engine cannot currently inspect the curve object passed
  as an argument to distinguish approved curves from deprecated ones. The intent is to surface
  all EC key generation for mandatory human review.

  Not all curves are equally secure. SECP192R1 (NIST P-192) provides only 96-bit security and
  is deprecated by NIST SP 800-131A. SECP224R1 (112-bit security) is also deprecated for use
  after 2030. By contrast, SECP256R1 (128-bit), SECP384R1 (192-bit), and SECP521R1 (260-bit)
  are all NIST-approved. This rule generates expected false positives for code using approved
  curves — treat findings as a mandatory audit checkpoint rather than confirmed vulnerabilities.
message: >
  Audit: verify the elliptic curve used here is SECP256R1, SECP384R1, or SECP521R1. Weak
  curves (SECP192R1, SECP224R1) are deprecated by NIST SP 800-131A and must not be used.
secure_example: |
  from cryptography.hazmat.primitives.asymmetric import ec
  from cryptography.hazmat.backends import default_backend

  # SECURE: NIST P-256 (SECP256R1) — 128-bit security, widely supported
  private_key = ec.generate_private_key(ec.SECP256R1(), backend=default_backend())

  # SECURE: NIST P-384 (SECP384R1) — 192-bit security, recommended for high-value keys
  private_key = ec.generate_private_key(ec.SECP384R1(), backend=default_backend())

  # SECURE: NIST P-521 (SECP521R1) — 260-bit security, for maximum assurance
  private_key = ec.generate_private_key(ec.SECP521R1(), backend=default_backend())

  # NOT SECURE — deprecated by NIST SP 800-131A, only 96-bit security
  # private_key = ec.generate_private_key(ec.SECP192R1())  # DO NOT USE
recommendations:
- Use SECP256R1 (NIST P-256) as the baseline for new EC keys — it is universally supported and provides 128-bit security.
- Use SECP384R1 or SECP521R1 for high-value keys or applications requiring compliance with NSA CNSA 2.0.
- Never use SECP192R1 or SECP224R1 — both are deprecated by NIST SP 800-131A.
- For new applications, consider X25519 for key agreement and Ed25519 for signatures — both are modern audited curves with no parameter-based weaknesses.
- Document the curve selection rationale in your security design document for each EC key generation call site.
