id: PYTHON-CRYPTO-SEC-020
name: Insufficient RSA Key Size (cryptography lib)
short_description: RSA key size is less than 2048 bits. NIST minimum is 2048 bits; 3072+ recommended for new systems.
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-020
cwe:
- id: CWE-326
  name: Inadequate Encryption Strength
  url: https://cwe.mitre.org/data/definitions/326.html
tags:
- python
- cryptography
- rsa
- key-size
- CWE-326
- OWASP-A02
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: >
  Detects RSA key generation using `rsa.generate_private_key()` from the `cryptography` library
  where the `key_size` argument is less than 2048 bits. This rule uses a `.where("key_size", lt(2048))`
  predicate so it fires only on provably undersized keys and does not flag 2048-bit or larger
  keys. RSA keys shorter than 2048 bits are vulnerable to integer factorization: a 1024-bit
  RSA key can be factored with sustained effort and widely available cloud compute. NIST formally
  deprecated 1024-bit RSA in 2013 (SP 800-131A) and requires 2048-bit minimum through 2030,
  after which 3072-bit keys will be the minimum for new systems. Use 3072-bit or 4096-bit RSA
  for new applications, or prefer ECDSA with SECP256R1/SECP384R1 which provides equivalent
  security with significantly shorter keys.
message: RSA key size is less than 2048 bits. Use at least 2048-bit keys (3072+ recommended for new systems per NIST SP 800-57).
secure_example: |
  from cryptography.hazmat.primitives.asymmetric import rsa, ec
  from cryptography.hazmat.backends import default_backend

  # SECURE: RSA 3072-bit key (NIST minimum after 2030)
  private_key = rsa.generate_private_key(
      public_exponent=65537,
      key_size=3072,
      backend=default_backend()
  )

  # SECURE: RSA 4096-bit key (long-lived certificates)
  private_key = rsa.generate_private_key(
      public_exponent=65537,
      key_size=4096,
      backend=default_backend()
  )

  # SECURE: EC P-384 — equivalent to 7680-bit RSA, preferred for new systems
  private_key = ec.generate_private_key(ec.SECP384R1(), backend=default_backend())
recommendations:
- Use RSA key_size=3072 or key_size=4096 for any new application.
- NIST SP 800-57 equates 2048-bit RSA to only 112-bit security; 3072-bit RSA provides 128-bit security.
- Prefer ECDSA (SECP256R1 or SECP384R1) over RSA for new systems — same security level with shorter keys and faster operations.
- Audit existing certificates and key material to identify keys below 2048 bits and schedule rotation.
- Set a key expiry policy so that any 2048-bit keys currently in use are rotated before NIST's 2030 deprecation deadline.
