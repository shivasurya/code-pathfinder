faq:
- question: Does this rule flag 2048-bit RSA keys?
  answer: >
    No. The rule uses `.where("key_size", lt(2048))` which only fires when the key_size
    argument is strictly less than 2048 bits. A key_size=2048 call does NOT trigger this rule.
    See PYTHON-CRYPTO-SEC-023 for the stricter PyCryptodome rule that flags below 3072.
- question: What key size should I use for new applications?
  answer: >
    Use 3072-bit RSA for any new system. NIST equates 2048-bit RSA to 112-bit symmetric security
    and states that 112-bit is acceptable only until 2030. For long-lived keys or certificates,
    use 4096-bit RSA or switch to ECDSA with SECP384R1 (equivalent to 7680-bit RSA).
- question: Why does this rule flag below 2048 while SEC-023 flags below 3072?
  answer: >
    SEC-020 targets the `cryptography` library and applies the NIST 2013 minimum of 2048 bits
    as the hard floor. SEC-023 targets PyCryptodome and uses 3072 bits as the threshold,
    reflecting the NIST recommendation for systems expected to operate beyond 2030. You can
    configure your organization's acceptable threshold accordingly.
- question: Is a 1024-bit RSA key actually exploitable?
  answer: >
    Yes. The RSA-1024 challenge was factored in academic research environments. With modern
    cloud compute, a dedicated attacker with sufficient budget can factor 1024-bit moduli.
    The cost continues to decrease as hardware improves. NIST deprecated 1024-bit RSA in 2013
    precisely because it no longer provides adequate security margins.
- question: Can I suppress this finding if I'm using 1024-bit keys for testing only?
  answer: >
    Test code that generates weak keys can be suppressed using inline annotations supported
    by the engine. However, ensure that test keys cannot be accidentally reused in production.
    A better practice is to use 2048-bit or higher keys even in tests to prevent key reuse.
- question: What attack does a small RSA key enable?
  answer: >
    Insufficient RSA key sizes are vulnerable to the General Number Field Sieve (GNFS)
    factorization algorithm. Once an attacker factors the RSA modulus into its prime components,
    they can reconstruct the private key and decrypt all past ciphertext encrypted under that
    key (no forward secrecy), forge signatures, and impersonate the key holder.
- question: Does this rule check the public_exponent value?
  answer: >
    No. This rule only checks key_size. The public exponent should always be 65537 (0x10001).
    Using a small exponent like 3 or 17 introduces separate vulnerabilities (Coppersmith
    attacks) that are covered by other rules in this ruleset.
