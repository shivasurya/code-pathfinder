# Rule Identity
id: PYTHON-CRYPTO-SEC-003
name: IDEA Cipher Usage via cryptography Library
short_description: Detects use of the IDEA cipher through the cryptography library, which has a 64-bit block size making it vulnerable to Sweet32 birthday attacks and is deprecated in modern cryptographic standards.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-003

# Vulnerability Details
cwe:
