# Rule Identity
id: PYTHON-CRYPTO-SEC-002a
name: Blowfish Cipher Usage via PyCryptodome
short_description: Detects use of the Blowfish cipher through PyCryptodome, which has a 64-bit block size making it vulnerable to Sweet32 birthday attacks after approximately 32GB of data.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-002a

# Vulnerability Details
cwe:
