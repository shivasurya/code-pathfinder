# Rule Identity
id: PYTHON-CRYPTO-SEC-004
name: RC2 (ARC2) Cipher Usage via PyCryptodome
short_description: Detects use of the RC2/ARC2 cipher through PyCryptodome, which has a weak key schedule and an effective key length that can be reduced to 40 bits by protocol negotiation, making it vulnerable to brute-force attacks.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-004

