# Rule Identity
id: PYTHON-CRYPTO-SEC-001
name: RC4 (ARC4) Cipher Usage via cryptography Library
short_description: Detects use of the RC4 stream cipher through the cryptography library's ARC4 algorithm, which has known keystream biases and is prohibited by RFC 7465.

# Classification
severity: HIGH
category: cryptography
language: python
ruleset: python/cryptography/PYTHON-CRYPTO-SEC-001

# Vulnerability Details
cwe:
