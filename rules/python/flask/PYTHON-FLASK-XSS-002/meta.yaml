# Rule Identity
id: PYTHON-FLASK-XSS-002
name: Flask Explicit Unescape with Markup
short_description: Detects use of Markup() or markupsafe.Markup() which marks strings as safe HTML, bypassing Jinja2's autoescaping and introducing XSS risk if applied to user-controlled content.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-XSS-002

# Vulnerability Details
