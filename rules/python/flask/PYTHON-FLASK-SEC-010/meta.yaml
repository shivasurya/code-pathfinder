# Rule Identity
id: PYTHON-FLASK-SEC-010
name: Flask NaN Injection via float()
short_description: User input from Flask request parameters flows to float() which can produce NaN or Inf values. Validate and reject non-finite float values with math.isnan() and math.isinf().

