# Rule Identity
id: PYTHON-FLASK-SEC-012
name: Flask Open Redirect
short_description: User input from Flask request parameters flows to redirect() without URL validation. Validate redirect targets against an allowlist or use url_for() to generate trusted application-internal URLs.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-012

