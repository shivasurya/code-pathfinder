# Rule Identity
id: PYTHON-FLASK-AUDIT-003
name: Flask Bound to All Interfaces
short_description: Detects Flask applications binding the development server to 0.0.0.0, exposing it to every network interface instead of localhost only.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-003

# Vulnerability Details
cwe:
  - id: CWE-668
    name: Exposure of Resource to Wrong Sphere
    url: https://cwe.mitre.org/data/definitions/668.html

owasp:
  - id: A05:2021
    name: Security Misconfiguration
    url: https://owasp.org/Top10/A05_2021-Security_Misconfiguration/

tags:
  - python
