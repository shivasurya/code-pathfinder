# Rule Identity
id: PYTHON-FLASK-SEC-003
name: Flask SQL Injection via Tainted String
short_description: Finds user input reaching raw SQL queries in Flask apps where parameterized queries should be used instead.

# Classification
severity: CRITICAL
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-003

