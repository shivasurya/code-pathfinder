# FAQ (SEO-optimized for target personas)
faq:
  - question: How does this rule detect SQL injection across multiple Python files?
    answer: |
      Code Pathfinder uses inter-procedural taint analysis to track user input across function
      calls and file boundaries. If a Flask route in app.py receives request.args.get('id') and
      passes it to a database helper in db.py that calls cursor.execute(), the full data flow is
      traced and flagged. This catches the real-world pattern where routes, services, and data
      layers live in separate files — not just toy single-file examples.

  - question: How do I run this rule in my CI/CD pipeline?
    answer: |
      Add Code Pathfinder to your CI workflow and run:
      pathfinder ci --ruleset python/flask/PYTHON-FLASK-SEC-003 --project .
      It outputs SARIF, JSON, or CSV and can post inline review comments directly on GitHub
      pull requests. The scan runs in seconds and requires no database or runtime — it analyzes
      source code statically.

  - question: Does this rule produce false positives on parameterized queries?
    answer: |
      No. This rule uses .tracks(0) parameter targeting, which means it only flags taint
      reaching the first argument of cursor.execute() — the SQL query string. The second
      argument (the parameter tuple in cursor.execute(sql, (params,))) is correctly recognized
      as the safe parameterization mechanism and is excluded from analysis. This eliminates
      the most common source of false positives in SQL injection detection.

  - question: Which database drivers and ORMs does this rule support?
    answer: |
      This rule covers SQLite (sqlite3), MySQL (mysql-connector-python, PyMySQL), and
      PostgreSQL (psycopg2) through type-aware QueryType matching. The wildcard pattern
      *Cursor matches any cursor-like object across database drivers. For ORM-based queries,
      see the companion rules PYTHON-DJANGO-SEC-002 (Django ORM .raw()) and
      PYTHON-DJANGO-SEC-003 (Django ORM .extra()).

  - question: What compliance standards require SQL injection testing?
    answer: |
      SQL injection testing is required or recommended by PCI DSS v4.0 (Requirement 6.2.4),
      OWASP Top 10 (A03:2021 Injection), NIST SP 800-53 (SI-10), SOC 2 Type II (CC6.1),
      ISO 27001 (A.14.2.5), and the EU Cyber Resilience Act. CWE-89 is ranked #3 in the
      2023 CWE Top 25 Most Dangerous Software Weaknesses. Running this rule as part of your
      SAST pipeline provides auditable evidence of injection testing for compliance reviews.

  - question: Can I customize this rule for my project's specific sources and sinks?
    answer: |
      Yes. The rule is written in Code Pathfinder's Python SDK — you can fork it and modify
      the from_sources list to add your project's custom input methods, add framework-specific
      sinks to to_sinks, or add your validation functions to sanitized_by. The rule file is
      a standard Python file that you can version-control alongside your application code.

  - question: How is this different from grep or regex-based SQL injection detection?
    answer: |
      Grep-based tools match patterns in source code text — they cannot determine whether
      user input actually reaches a SQL query. Code Pathfinder performs data flow analysis,
      tracing variables from HTTP request sources through assignments, function calls, and
      file boundaries to database sinks. It understands that sanitized input (passed through
      escape functions) is safe, and that parameterized queries are not vulnerable. This
      produces far fewer false positives while catching real vulnerabilities that pattern
      matching misses entirely.

