# Content
description: |
  This rule detects SQL injection vulnerabilities in Flask applications where user-controlled
  input from HTTP request parameters flows into raw SQL query execution without parameterized
  queries. When user input is concatenated or interpolated directly into SQL strings and passed
  to database cursor execute methods, attackers can manipulate query logic to extract, modify,
  or destroy data.

  SQL injection remains the most prevalent and dangerous web application vulnerability,
  consistently ranking in the OWASP Top 10 and CWE Top 25 most dangerous software weaknesses.
  In Flask applications, this commonly occurs when developers construct SQL queries using string
  concatenation or f-strings with data obtained from request.args, request.form, or
  request.get_json(), then pass the resulting string to cursor.execute().

  Code Pathfinder detects this vulnerability using inter-procedural taint analysis with
  parameter-level precision. The .tracks(0) constraint ensures only the first argument to
  execute() (the SQL query string) is flagged — the second argument (parameter tuple) is
  correctly recognized as the safe parameterization mechanism, eliminating false positives.

message: "User input flows to SQL execution without parameterization. Use parameterized queries."

security_implications:
  - title: Data Exfiltration
    description: |
      Attackers can use UNION-based injection, blind injection, or out-of-band techniques to
      extract entire database contents including credentials, personal data, and business secrets.
      A single vulnerable endpoint can expose every table in the database.
  - title: Authentication Bypass
    description: |
      Login forms vulnerable to SQL injection allow attackers to bypass authentication entirely
      by injecting conditions that always evaluate to true (e.g., ' OR 1=1 --). This grants
      unauthorized access to any user account including administrators.
  - title: Data Manipulation
    description: |
      INSERT, UPDATE, and DELETE statements can be injected to modify or destroy records, corrupt
      referential integrity, plant backdoor accounts, or alter financial transactions.
  - title: Remote Code Execution
    description: |
      On certain database systems (PostgreSQL with COPY, MySQL with INTO OUTFILE, MSSQL with
      xp_cmdshell), SQL injection can escalate to operating system command execution, giving
      attackers full control of the server.

secure_example: |
  from flask import Flask, request
  import sqlite3

  app = Flask(__name__)

  @app.route('/users/search')
  def search_users():
      username = request.args.get('username')
      conn = sqlite3.connect('app.db')
      cursor = conn.cursor()
      # SAFE: Parameterized query prevents injection
      cursor.execute("SELECT * FROM users WHERE name = ?", (username,))
      return {'results': cursor.fetchall()}

  # Alternative: Use an ORM like SQLAlchemy
  from sqlalchemy import select
  result = db.session.execute(select(User).filter_by(name=username))

recommendations:
  - Use parameterized queries with placeholders (?, %s, :param) instead of string concatenation
  - Use an ORM like SQLAlchemy or Flask-SQLAlchemy instead of raw SQL
  - Apply input validation and type checking before database operations
  - Use stored procedures with parameterized inputs for complex queries
  - Implement least-privilege database accounts that cannot DROP or ALTER tables
  - Enable SQL query logging to detect injection attempts in production

detection_scope: |
  This rule performs inter-procedural taint analysis (scope=global) tracking data from Flask
  request sources (request.args.get, request.form.get, request.values.get, request.get_json,
  request.cookies.get, request.headers.get) to database cursor execute/executemany sinks.
  The .tracks(0) parameter targeting ensures only the SQL query argument (position 0) is
  considered — parameterized tuple arguments at position 1 are correctly excluded.
  Recognized sanitizers include escape() and escape_string() functions.

