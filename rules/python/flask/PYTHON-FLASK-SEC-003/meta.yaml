# FAQ (drives SEO)
faq:
  - question: What is SQL injection in Flask?
    answer: |
      SQL injection occurs when user-supplied input is inserted directly into a SQL query
      string without proper sanitization or parameterization. In Flask applications, this
      typically happens when request.args.get() or request.form.get() values are concatenated
      into SQL strings passed to cursor.execute(). Attackers can inject malicious SQL fragments
      to read, modify, or delete data.
  - question: How do I prevent SQL injection in Flask?
    answer: |
      Use parameterized queries with placeholder syntax: cursor.execute("SELECT * FROM users
      WHERE name = ?", (username,)). The database driver handles escaping automatically.
      Alternatively, use an ORM like SQLAlchemy which generates parameterized queries by default.
      Never construct SQL strings using string concatenation, f-strings, or .format() with
      user input.
  - question: Does this rule detect cross-file SQL injection?
    answer: |
      Yes. This rule uses inter-procedural taint analysis (scope=global) to track tainted data
      across function and file boundaries. For example, if user input is received in app.py and
      passed through a function call to a database query in db.py, Code Pathfinder traces the
      full data flow and detects the vulnerability.
  - question: Why does this rule use .tracks(0)?
    answer: |
      The .tracks(0) parameter targeting tells the analysis engine that only the first argument
      to cursor.execute() is security-sensitive. In parameterized queries like
      cursor.execute(sql, (params,)), the second argument is the safe parameter tuple. Without
      .tracks(0), passing user input as the parameter tuple would trigger a false positive.
  - question: What databases does this rule cover?
    answer: |
      This rule covers SQLite (sqlite3.Cursor), MySQL (mysql.connector, PyMySQL), and
      PostgreSQL (psycopg2) through type-aware matching. The QueryType pattern *Cursor also
      matches any cursor-like object, providing broad coverage across database drivers.

