# Rule Identity
id: PYTHON-FLASK-001
name: Flask Debug Mode Enabled
short_description: Detects Flask applications started with debug=True, which enables the interactive Werkzeug debugger and must never run in production.

# Classification
severity: HIGH
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-001

