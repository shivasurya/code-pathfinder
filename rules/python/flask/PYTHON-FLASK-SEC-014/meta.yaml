# Rule Identity
id: PYTHON-FLASK-SEC-014
name: Flask Server-Side Template Injection (SSTI)
short_description: User input from Flask request parameters flows to render_template_string() as part of the template source. Pass user data as template variables, never in the template string itself.

# Classification
severity: CRITICAL
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-014

