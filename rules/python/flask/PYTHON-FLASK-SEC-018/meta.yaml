# Rule Identity
id: PYTHON-FLASK-SEC-018
name: Flask Hashids with Secret Key as Salt
short_description: Detects Hashids initialized with app.secret_key as the salt, which exposes Flask's secret key because the Hashids salt is recoverable through cryptanalysis.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-018

# Vulnerability Details
cwe:
