# Rule Identity
id: PYTHON-FLASK-SEC-011
name: Flask SSRF via Tainted URL Host
short_description: User input from Flask request parameters is used to construct the host component of an outbound HTTP request URL. Validate the host against an explicit allowlist before making server-side requests.

# Classification
severity: HIGH
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-011

