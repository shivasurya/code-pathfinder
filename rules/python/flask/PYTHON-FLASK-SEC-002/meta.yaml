# Rule Identity
id: PYTHON-FLASK-SEC-002
name: Flask Command Injection via subprocess
short_description: User input from Flask request parameters flows to subprocess functions with shell=True or as a command string. Use list arguments without shell=True.

# Classification
severity: CRITICAL
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-002

# Vulnerability Details
cwe:
  - id: CWE-78
    name: "Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    url: https://cwe.mitre.org/data/definitions/78.html

