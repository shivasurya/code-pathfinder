# FAQ
faq:
  - question: Is jsonify() with user data a security risk?
    answer: |
      Directly using jsonify() on user data, the risk depends on context. jsonify()
      sets Content-Type: application/json, so browsers will not render the JSON as HTML
      and execute injected scripts in the response itself. The risk is in how downstream
      code consumes the JSON -- if JavaScript inserts the values into the DOM with
      innerHTML, XSS occurs. The rule flags jsonify() flows to ensure developers review
      how the returned values are used in frontend code.

  - question: How is this different from PYTHON-FLASK-SEC-008?
    answer: |
      SEC-008 focuses exclusively on make_response() used for HTML content -- where
      XSS in the response body is the primary concern. SEC-015 has broader scope,
      covering both make_response() and jsonify() to catch the full range of patterns
      where unsanitized user input appears in application responses. Running both
      rules provides complementary coverage.

  - question: We use a React/Vue SPA that consumes our Flask JSON API. Does this rule apply?
    answer: |
      The Flask rule catches the server-side pattern (unsanitized data in responses).
      DOM-based XSS from React/Vue components that unsafely render API data (e.g.,
      using dangerouslySetInnerHTML) is a client-side concern. Both should be addressed:
      escape data on the server for HTML contexts, and use textContent or safe React
      rendering on the client.

  - question: What is the difference between html.escape() and markupsafe.escape()?
    answer: |
      Both escape <, >, &, ", and ' to HTML entities. markupsafe.escape() returns a
      Markup object (a subclass of str) that is marked as safe for HTML rendering --
      Jinja2 will not double-escape it in templates. html.escape() returns a plain
      str. For use in make_response() with manual HTML construction, both are equivalent.
      In Jinja2 template contexts, prefer markupsafe.escape() to avoid double-escaping.

  - question: Can I use json.dumps() instead of jsonify() for JSON responses?
    answer: |
      json.dumps() produces a JSON string but does not set the Content-Type header.
      If you use make_response(json.dumps(data)), Flask defaults to text/html as the
      Content-Type, causing browsers to render the JSON as HTML. Always set
      Content-Type: application/json explicitly when using json.dumps() with
      make_response(), or use jsonify() which does this automatically.

  - question: "Does this rule fire on error response patterns like make_response({'error': user_message}, 400)?"
    answer: |
      Yes, if user_message traces back to a Flask request source. Error responses
      that reflect user-supplied values (e.g., "Invalid value: " + request.args.get('x'))
      are a common source of reflected XSS. The fix is the same: escape the value
      for HTML contexts or ensure the response uses application/json Content-Type.

  - question: How do I handle rich text input that users intend to include HTML in?
    answer: |
      Use bleach.clean() with an allowlist of permitted HTML tags and attributes.
      Define the most restrictive allowlist that meets the feature requirement --
      typically only formatting tags (b, em, u, p, ul, li) with no event handler
      attributes and no script, iframe, or object tags. Test the allowlist against
      OWASP's XSS filter evasion cheat sheet before deploying.

