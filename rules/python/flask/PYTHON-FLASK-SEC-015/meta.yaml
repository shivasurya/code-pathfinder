# Rule Identity
id: PYTHON-FLASK-SEC-015
name: Flask Unsanitized Input in Response
short_description: User input from Flask request parameters flows to make_response() or jsonify() without escaping. Sanitize HTML output with markupsafe.escape(); ensure JSON responses set the correct Content-Type to prevent browser HTML rendering.

# Classification
severity: MEDIUM
category: flask
language: python
