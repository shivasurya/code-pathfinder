# Rule Identity
id: PYTHON-FLASK-AUDIT-010
name: Flask WTF CSRF Disabled
short_description: Detects Flask configuration that explicitly disables Flask-WTF CSRF protection by setting WTF_CSRF_ENABLED to False.

# Classification
severity: HIGH
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-010

# Vulnerability Details
cwe:
  - id: CWE-352
    name: Cross-Site Request Forgery (CSRF)
    url: https://cwe.mitre.org/data/definitions/352.html

owasp:
  - id: A01:2021
    name: Broken Access Control
    url: https://owasp.org/Top10/A01_2021-Broken_Access_Control/

