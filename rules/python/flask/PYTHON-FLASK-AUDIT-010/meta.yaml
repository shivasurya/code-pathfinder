# FAQ
faq:
  - question: Why is WTF_CSRF_ENABLED = False high severity if it is commonly used in tests?
    answer: |
      The severity reflects the impact when this configuration reaches production -- which is
      the most common way this vulnerability is introduced. Developers disable CSRF for testing
      convenience and the setting leaks into a shared config file or environment variable that
      production also uses. The fix (using TestingConfig isolation or Flask-WTF's test helpers)
      is straightforward and eliminates the risk.

  - question: How do I handle CSRF tokens in a JSON API?
    answer: |
      JSON APIs using header-based token authentication (Bearer tokens, API keys) are not
      typically vulnerable to CSRF because the browser's same-origin policy prevents
      cross-site JavaScript from reading the token and including it in a custom header. Use
      Flask-WTF's @csrf.exempt decorator on individual JSON API routes to exempt them from
      CSRF validation while keeping the rest of the application protected.

  - question: How does this rule's match_position pattern work?
    answer: |
      Python translates app.config["WTF_CSRF_ENABLED"] = False into a call to
      app.config.__setitem__("WTF_CSRF_ENABLED", False). The match_position={0: "WTF_CSRF_ENABLED"}
      constraint checks that the first positional argument (position 0) is the string
      "WTF_CSRF_ENABLED". This matches the key regardless of what value is being assigned,
      flagging any time the WTF_CSRF_ENABLED key is manipulated for review.

  - question: What is the safest way to disable CSRF in tests?
    answer: |
      Create a TestingConfig class with WTF_CSRF_ENABLED = False and load it only in the test
      runner via app.config.from_object(TestingConfig). Never load TestingConfig from an
      environment variable or file that production reads. Alternatively, use Flask-WTF's
      generate_csrf() to generate tokens in test requests, which avoids disabling CSRF at all.

  - question: How do I run this rule in CI/CD?
    answer: |
      Run: pathfinder ci --ruleset python/flask/PYTHON-FLASK-AUDIT-010 --project .
      The rule outputs SARIF, JSON, or CSV and can post inline pull request comments on GitHub.

  - question: Does this rule also detect CSRF_ENABLED = False for other CSRF libraries?
    answer: |
      No. This rule is specific to Flask-WTF's WTF_CSRF_ENABLED configuration key. Other
      CSRF libraries (flask-seasurf, manual CSRF implementations) use different configuration
      keys and would require separate rules.

  - question: Can I use @csrf.exempt globally to disable CSRF instead?
    answer: |
      No. Applying @csrf.exempt to all routes is functionally equivalent to WTF_CSRF_ENABLED =
      False and should be treated with the same concern. Route-level exemptions for specific
      JSON API endpoints are appropriate; blanket exemption is not.

