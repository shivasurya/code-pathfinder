# FAQ
faq:
  - question: Is there any safe way to use pickle with user-supplied data?
    answer: |
      No. The Python documentation explicitly states: "The pickle module is not secure.
      Only unpickle data you trust." There is no restriction or sandboxing mechanism
      that makes pickle.loads() safe for attacker-supplied data. The __reduce__ protocol
      is fundamental to how pickle works, and it allows arbitrary callable invocation.
      The only safe approach is to not use pickle for data that comes from HTTP requests.

  - question: yaml.safe_load() is recognized as safe. What does it restrict?
    answer: |
      yaml.safe_load() uses the SafeLoader which only allows YAML nodes that map to
      basic Python types: str, int, float, list, dict, bool, None, datetime, bytes.
      It does not process !!python/object, !!python/object/apply, or any other
      Python-specific YAML tags that the full Loader uses. Crafted YAML with Python
      object tags raises a ConstructorError rather than executing code.

  - question: We receive base64-encoded pickle data from mobile clients. How do we migrate?
    answer: |
      Migrate the mobile clients to send JSON instead of base64-encoded pickle. This
      requires a protocol version bump and a compatibility period where both formats
      are accepted (verifying the JSON path with a flag before removing the pickle path).
      If you absolutely cannot change the mobile client format immediately, sign the
      pickle payloads with HMAC using a server-controlled key and only deserialize
      payloads with valid signatures -- this prevents external attackers from injecting
      arbitrary payloads while the migration proceeds.

  - question: Does this rule cover all variants of yaml.load()?
    answer: |
      The sinks include yaml.load() and yaml.unsafe_load(). yaml.load() without an
      explicit Loader argument triggers a warning in recent PyYAML versions and uses
      the FullLoader by default (which has some mitigations but is not fully safe).
      yaml.unsafe_load() is the explicitly dangerous variant. Both are tracked.

  - question: We use jsonpickle for session serialization. What should we replace it with?
    answer: |
      Replace jsonpickle with Flask's built-in session mechanism (flask.session) which
      uses itsdangerous for signed cookie serialization. For server-side sessions, use
      flask-session with Redis or database backend storing JSON-encoded session data.
      If you need to serialize complex Python objects, define an explicit JSON schema
      and write custom serialization/deserialization logic -- never rely on formats that
      can reconstruct arbitrary objects from untrusted data.

  - question: Can I add a __reduce__ allowlist to make pickle safe?
    answer: |
      Python's RestrictedUnpickler pattern attempts to limit which classes can be
      instantiated during pickling. However, there are known bypasses that reach
      dangerous callables through allowed classes via attribute chains. No known
      RestrictedUnpickler implementation has been proven secure against a determined
      attacker. The Python security advisory team's position is that pickle should
      not be used with untrusted data regardless of restrictions applied.

  - question: How does HMAC signing prevent deserialization attacks?
    answer: |
      If you sign serialized data with HMAC using a server-side secret key, the attacker
      cannot produce a valid signature for a crafted payload without knowing the secret.
      Verification with hmac.compare_digest() (timing-safe comparison) before deserialization
      ensures only data that originated from your server is deserialized. This is the
      pattern used by Flask's signed cookie sessions and itsdangerous.

