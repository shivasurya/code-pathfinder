id: PYTHON-FLASK-SEC-013
name: Flask Insecure Deserialization
short_description: User input flows to unsafe deserialization (pickle/yaml). Use json.loads() or yaml.safe_load().
severity: CRITICAL
category: flask
language: python
ruleset: python/PYTHON-FLASK-SEC-013
cwe:
- id: CWE-502
  name: Deserialization of Untrusted Data
  url: https://cwe.mitre.org/data/definitions/502.html
tags:
- python
- flask
- deserialization
- pickle
- yaml
- rce
- OWASP-A08
- CWE-502
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: "This rule detects insecure deserialization vulnerabilities in Flask applications where\n\
  user-controlled input flows into dangerous deserialization functions across multiple Python\nserialization\
  \ libraries. The following deserialization sinks are tracked:\n\n- **pickle.loads() / pickle.load()**:\
  \ Python's native binary serialization format. By\n  design, pickle can instantiate arbitrary Python\
  \ objects and execute code during\n  deserialization via the __reduce__ protocol.\n\n- **yaml.load()\
  \ / yaml.unsafe_load()**: PyYAML's default loader can construct arbitrary\n  Python objects from YAML\
  \ tags (!!python/object, !!python/object/apply), enabling code\n  execution through crafted YAML documents.\n\
  \n- **marshal.loads() / marshal.load()**: Python's internal serialization for .pyc files.\n  Not intended\
  \ for untrusted data and can cause crashes or undefined behavior.\n\n- **jsonpickle.decode()**: JSON-based\
  \ serialization that preserves Python object types,\n  including the ability to reconstruct arbitrary\
  \ objects during decoding.\n\n- **shelve.open()**: Persistent dictionary backed by pickle, inheriting\
  \ all pickle\n  deserialization risks."
message: User input flows to unsafe deserialization (pickle/yaml). Use json.loads() or yaml.safe_load().
secure_example: "from flask import Flask, request\nimport json\nimport yaml\n\napp = Flask(__name__)\n\
  \n@app.route('/api/import', methods=['POST'])\ndef import_data():\n    # SAFE: Use JSON for untrusted\
  \ data (cannot execute code)\n    data = json.loads(request.get_data())\n    return {'imported': data}\n\
  \n@app.route('/api/config', methods=['POST'])\ndef load_config():\n    config_yaml = request.form.get('config')\n\
  \    # SAFE: yaml.safe_load() only allows basic YAML types\n    config = yaml.safe_load(config_yaml)\n\
  \    return {'config': config}"
