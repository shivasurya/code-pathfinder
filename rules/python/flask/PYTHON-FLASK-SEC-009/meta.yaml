# Rule Identity
id: PYTHON-FLASK-SEC-009
name: Flask CSV Injection
short_description: User input from Flask request parameters flows to csv.writer.writerow() or writerows() without formula character sanitization. Strip or escape leading =, +, -, @ characters to prevent spreadsheet formula injection.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-009

