description: This module contains three distinct injection detection rules for Flask applications targeting
message: User input flows to CSV writer. Sanitize by removing leading =, +, -, @ characters.
secure_example: "from flask import Flask, request\nimport csv, io, requests, math\n\napp = Flask(__name__)\n\
  \ndef sanitize_csv_value(value):\n    \\\"\\\"\\\"Strip leading formula characters from CSV values.\\\
  \"\\\"\\\"\n    if isinstance(value, str) and value and value[0] in ('=', '+', '-', '@'):\n        return\
  \ \"'\" + value  # Prefix with single quote to prevent formula execution\n    return value\n\n@app.route('/export')\n\
  def export_csv():\n    name = request.args.get('name')\n    writer = csv.writer(io.StringIO())\n   \
  \ # SAFE: Sanitize before writing to CSV\n    writer.writerow([sanitize_csv_value(name), 'data'])\n\n\
  @app.route('/convert')\ndef convert():\n    value = request.args.get('value')\n    num = float(value)\n\
  \    # SAFE: Reject NaN and Inf values\n    if math.isnan(num) or math.isinf(num):\n        return {'error':\
  \ 'Invalid number'}, 400\n    return {'result': num}\n\nALLOWED_HOSTS = {'api.example.com', 'cdn.example.com'}\n\
  \n@app.route('/proxy')\ndef proxy():\n    host = request.args.get('host')\n    # SAFE: Validate host\
  \ against allowlist\n    if host not in ALLOWED_HOSTS:\n        return {'error': 'Host not allowed'},\
  \ 403\n    response = requests.get(f'https://{host}/api/data')\n    return response.text"
