# Rule Identity
id: PYTHON-FLASK-AUDIT-004
name: Flask CORS Wildcard Origin
short_description: Detects Flask-CORS configured with origins="*", allowing any domain to make cross-origin requests to the application.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-004

# Vulnerability Details
cwe:
  - id: CWE-942
