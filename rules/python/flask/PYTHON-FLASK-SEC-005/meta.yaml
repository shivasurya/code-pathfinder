# Rule Identity
id: PYTHON-FLASK-SEC-005
name: Flask Code Injection via exec()
short_description: User input from Flask request parameters flows to exec() or compile(). exec() cannot be safely sanitized -- redesign the feature to avoid dynamic code execution.

# Classification
severity: CRITICAL
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-005

