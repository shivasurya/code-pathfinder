# Rule Identity
id: PYTHON-FLASK-SEC-001
name: Flask Command Injection via os.system
short_description: User input from Flask request parameters flows to os.system() or os.popen(). Sanitize with shlex.quote() or switch to subprocess with list arguments.

# Classification
severity: CRITICAL
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-001

