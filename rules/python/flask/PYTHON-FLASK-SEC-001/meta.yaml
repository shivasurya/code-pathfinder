# FAQ
faq:
  - question: Why does this rule flag os.popen() but not subprocess.run()?
    answer: |
      os.popen() passes its argument directly to the system shell as a command string,
      so any shell metacharacters in user input are interpreted. subprocess.run() with
      a list of arguments bypasses the shell entirely -- the OS exec() call receives
      the program name and arguments as separate tokens, so there is nothing for a
      shell to interpret. The rule tracks taint to the shell-invoking functions only.

  - question: I use shlex.quote() before calling os.system(). Will this still fire?
    answer: |
      No. shlex.quote() is a recognized sanitizer. If the tainted value passes through
      shlex.quote() before reaching os.system(), the flow is considered sanitized and
      no finding is reported. Make sure the quoting happens on the actual value that
      reaches the shell call -- wrapping an unrelated variable does not help.

  - question: How does this rule detect injection across multiple files?
    answer: |
      The rule uses global scope, meaning it follows data flow across file boundaries.
      If request.args.get('host') is called in routes.py, stored in a variable, passed
      to a utility function in helpers.py, and that function calls os.system(), the
      full chain is flagged. This is the common real-world pattern -- route handlers
      delegate to utility modules.

  - question: Does this rule generate false positives on test files?
    answer: |
      It can if test files use hardcoded strings that look like request sources. In
      practice, test fixtures usually use string literals, not request.args.get(),
      so there is typically no flow to flag. If you have test utilities that call
      os.system() with controlled data, add a # noqa comment or exclude the test
      directory in your pathfinder configuration.

  - question: What CVSS score should I assign to a confirmed finding?
    answer: |
      A confirmed os.system() injection from an unauthenticated HTTP endpoint scores
      CVSS 3.1 Critical (9.8-10.0): Attack Vector Network, Attack Complexity Low,
      Privileges Required None, User Interaction None, Scope Changed, all CIA impacts
      High. Reduce the score if authentication is required or if the endpoint is only
      accessible from the internal network.

  - question: Does this cover os.popen2() and os.popen3()?
    answer: |
      Yes. The sinks include os.popen(), os.popen2(), os.popen3(), and os.popen4().
      These are legacy functions removed in Python 3 but still present in Python 2
      codebases. The rule covers all variants to handle both Python 2 and Python 3
      projects.

  - question: How do I suppress a finding I have reviewed and accepted as low risk?
    answer: |
      Add a # pathfinder: ignore PYTHON-FLASK-SEC-001 comment on the line where the
      sink is called. Document why the finding is accepted (e.g., the input is validated
      against a strict allowlist of known-safe values). Do not suppress findings without
      written justification -- suppressions are reviewed during security audits.

