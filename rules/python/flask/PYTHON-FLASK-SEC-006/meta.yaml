# Rule Identity
id: PYTHON-FLASK-SEC-006
name: Flask SSRF via requests Library
short_description: User input from Flask request parameters flows to outbound HTTP request URLs via the requests library. Validate and allowlist target hosts before making server-side requests.

# Classification
severity: HIGH
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-006

