# Rule Identity
id: PYTHON-FLASK-SEC-017
name: Flask Insecure Static File Serve
short_description: Detects use of send_file() and send_from_directory() which serve files from the server's file system and are vulnerable to path traversal when the filename argument comes from user input.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-SEC-017

# Vulnerability Details
