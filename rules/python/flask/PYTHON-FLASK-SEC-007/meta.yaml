# Rule Identity
id: PYTHON-FLASK-SEC-007
name: Flask Path Traversal via open()
short_description: User input from Flask request parameters flows to open() or io.open() without path sanitization. Use werkzeug secure_filename() and verify the resolved path stays within the intended directory.

# Classification
severity: HIGH
category: flask
language: python
