# Rule Identity
id: PYTHON-FLASK-AUDIT-009
name: Flask Cookie Without Secure Flags
short_description: Detects set_cookie() calls with secure=False or httponly=False, which expose session and authentication cookies to theft via network eavesdropping or JavaScript access.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-009

# Vulnerability Details
cwe:
  - id: CWE-614
    name: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute
    url: https://cwe.mitre.org/data/definitions/614.html

owasp:
  - id: A05:2021
    name: Security Misconfiguration
    url: https://owasp.org/Top10/A05_2021-Security_Misconfiguration/

tags:
