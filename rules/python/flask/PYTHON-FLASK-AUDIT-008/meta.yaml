# Rule Identity
id: PYTHON-FLASK-AUDIT-008
name: Flask render_template_string Usage
short_description: Detects any use of render_template_string(), which renders Jinja2 templates from Python strings and is inherently adjacent to Server-Side Template Injection (SSTI) vulnerabilities.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-008

