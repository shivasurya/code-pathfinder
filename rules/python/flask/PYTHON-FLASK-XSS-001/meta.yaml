# Rule Identity
id: PYTHON-FLASK-XSS-001
name: Flask Direct Use of Jinja2
short_description: Detects direct use of jinja2.Environment or jinja2.Template, which bypasses Flask's automatic HTML autoescaping and can lead to XSS vulnerabilities.

# Classification
severity: MEDIUM
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-XSS-001

# Vulnerability Details
