id: PYTHON-FLASK-SEC-008
name: Flask XSS via Raw HTML Concatenation
short_description: User input concatenated into HTML response. Use render_template() or markupsafe.escape().
severity: HIGH
category: flask
language: python
ruleset: python/PYTHON-FLASK-SEC-008
cwe:
- id: CWE-79
  name: Improper Neutralization of Input During Web Page Generation
  url: https://cwe.mitre.org/data/definitions/79.html
tags:
- python
- flask
- xss
- html
- owasp-a07
- cwe-79
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'These rules detect Cross-Site Scripting (XSS) vulnerabilities in Flask applications where

  user-controlled input is reflected in HTTP responses without proper output encoding. Two'
message: User input concatenated into HTML response. Use render_template() or markupsafe.escape().
secure_example: "from flask import Flask, request, render_template\nfrom markupsafe import escape\n\n\
  app = Flask(__name__)\n\n@app.route('/greet')\ndef greet():\n    name = request.args.get('name')\n \
  \   # SAFE Option 1: Use Jinja2 template (auto-escapes by default)\n    return render_template('greet.html',\
  \ name=name)\n\n@app.route('/greet-inline')\ndef greet_inline():\n    name = request.args.get('name')\n\
  \    # SAFE Option 2: Explicitly escape user input\n    safe_name = escape(name)\n    return f'<h1>Hello,\
  \ {safe_name}!</h1>'"
