# Content
description: |
  This rule detects reflected and stored Cross-Site Scripting (XSS) in Flask applications
  where user-controlled input from HTTP request parameters flows into make_response() as
  raw HTML content without output encoding. Flask's make_response() returns an HTTP
  response with exactly the content you provide -- it applies no escaping. When user
  input is embedded into an HTML body string and returned via make_response(), script
  tags, event handlers, and other executable HTML in the user-supplied value run in
  the victim's browser with the application's origin.

  This vulnerability is distinct from XSS through Jinja2 templates. render_template()
  and render_template_string() with {{ variable }} syntax apply autoescaping by default.
  make_response() has no template layer -- it is a raw HTTP response builder. Code that
  constructs HTML with f-strings or concatenation and passes the result to make_response()
  is vulnerable even if the developer considers the data "processed."

  The taint analysis traces user input from Flask request sources through string
  operations and function calls to the body argument of make_response() at position 0.
  Flows through html.escape(), markupsafe.escape(), Markup.escape(), or bleach.clean()
  are recognized as sanitizers because they convert HTML special characters to entity
  references that browsers display as text rather than executing as markup.

message: "User input flows to make_response() as raw HTML. Escape with html.escape() or markupsafe.escape() before inserting into HTML content."

security_implications:
  - title: Session Hijacking via Cookie Theft
    description: |
      Injected JavaScript reads document.cookie and sends the session identifier to an
      attacker-controlled server. The attacker uses the stolen session token to impersonate
      the victim in subsequent requests. Even with HttpOnly cookies (which prevent JS
      access), an attacker running injected scripts can make authenticated requests on
      behalf of the victim within the same browser session.
  - title: Credential Harvesting via DOM Manipulation
    description: |
      Injected scripts rewrite login forms, redirect form action URLs to attacker servers,
      or overlay fake UI elements over the real page. Victims submit real credentials to
      the attacker's infrastructure with no indication of the attack. This is particularly
      effective in single-page applications where the URL does not change on navigation.
  - title: Malware Distribution and Drive-by Exploitation
    description: |
      Stored XSS in make_response() paths that render user-generated content turns the
      Flask application into a malware distribution platform. Every visitor to the
      affected endpoint receives injected scripts that can exploit browser vulnerabilities,
      install extensions, or silently exfiltrate browser-stored credentials.
  - title: CSRF Token Theft Enabling State-Change Attacks
    description: |
      Scripts injected via XSS run in the application's origin and have full DOM access.
      CSRF tokens embedded in form hidden fields are readable by injected JavaScript.
      With the CSRF token, the attacker constructs and submits authenticated forms on
      behalf of the victim, bypassing the CSRF protection entirely.

secure_example: |
  from flask import Flask, request, make_response
  from markupsafe import escape
  import html

  app = Flask(__name__)

  @app.route('/greet')
  def greet():
      name = request.args.get('name', '')
      # SAFE: markupsafe.escape() converts <, >, &, ", ' to HTML entities
      safe_name = escape(name)
      html_content = f'<html><body><h1>Hello, {safe_name}!</h1></body></html>'
      response = make_response(html_content)
      response.headers['Content-Type'] = 'text/html; charset=utf-8'
      # Defense-in-depth: Content Security Policy limits script execution
      response.headers['Content-Security-Policy'] = "default-src 'self'"
      return response

  @app.route('/search')
  def search():
      query = request.args.get('q', '')
      # SAFE: html.escape() from stdlib -- identical effect to markupsafe.escape()
      safe_query = html.escape(query)
      body = f'<p>Results for: {safe_query}</p>'
      return make_response(body, 200)

recommendations:
  - Apply html.escape() or markupsafe.escape() to every user-supplied string before inserting it into HTML content passed to make_response().
  - Prefer render_template() with file-based Jinja2 templates over make_response() with hand-built HTML strings -- Jinja2 autoescaping handles entity encoding automatically for {{ variable }} expressions.
  - Set an explicit Content-Type: text/html; charset=utf-8 header -- a response served as text/plain cannot execute injected scripts even if they are present in the body.
  - Add a Content-Security-Policy header with a restrictive script-src directive to limit the impact of any XSS that bypasses output encoding.
  - Set HttpOnly and Secure flags on session cookies to reduce the value of session theft via injected JavaScript.

detection_scope: |
  Scope: global (cross-file taint tracking across the entire project).

  Sources: Flask HTTP input methods -- request.args.get(), request.form.get(),
  request.values.get(), request.get_json() -- all of which can deliver strings
  containing HTML markup and JavaScript payloads.

  Sinks: make_response(). The .tracks(0) parameter targets the response body
  argument at position 0. The HTTP status code argument and headers dict at
  other positions are not tracked by this rule.

  Sanitizers: html.escape(), markupsafe.escape(), Markup.escape(), and
  bleach.clean() are recognized as sanitizing transformations. A user input
  value that passes through any of these functions before reaching make_response()
  is treated as safe from HTML injection. bleach.clean() is only a safe
  sanitizer when configured with a restricted tag allowlist.

  The rule follows tainted strings through f-string interpolation, concatenation,
  format() calls, and cross-file function calls, catching HTML assembly patterns
  in utility or rendering modules that receive input from Flask route handlers.

