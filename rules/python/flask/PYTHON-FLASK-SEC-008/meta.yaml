# FAQ
faq:
  - question: Jinja2 autoescaping is enabled. Why does XSS still occur through make_response()?
    answer: |
      Jinja2 autoescaping only applies inside render_template() and render_template_string()
      when variables are inserted via {{ }} syntax. make_response() bypasses the Jinja2
      engine entirely -- it is a raw HTTP response builder. Whatever string you pass as
      the body is sent verbatim. If that string was built with f-strings or concatenation
      containing user input, there is no escaping layer.

  - question: How is this different from PYTHON-FLASK-SEC-015?
    answer: |
      SEC-008 targets make_response() specifically -- a common pattern for constructing
      custom HTML responses outside the template engine. SEC-015 targets both make_response()
      and jsonify() with a broader focus on any response type that reflects unsanitized
      user data. Run both rules together for complete XSS coverage across response patterns.

  - question: Does setting Content-Type to application/json prevent XSS?
    answer: |
      If the Content-Type header is application/json, modern browsers will not render
      the response as HTML and injected script tags will not execute in that context.
      However, if the Content-Type is text/html (Flask's default for make_response()),
      the browser renders the response as HTML. Always set Content-Type explicitly
      when using make_response() to avoid accidental HTML rendering.

  - question: Can I use bleach.clean() to strip dangerous HTML while allowing some tags?
    answer: |
      Yes, with caveats. bleach.clean() with a restrictive allowlist (e.g., only p, b,
      em, ul, li with no event handler attributes) is a valid sanitizer for rich text
      content. The safety depends entirely on the allowlist configuration. A misconfigured
      allowlist that permits onclick or javascript: scheme URLs reintroduces XSS.
      Use the most restrictive allowlist that meets your feature requirements.

  - question: Is Content-Security-Policy a sufficient fix for XSS?
    answer: |
      CSP is defense-in-depth, not a primary fix. A strict CSP (no unsafe-inline,
      no unsafe-eval, trusted script-src) limits the impact of XSS but does not
      eliminate the injection. The primary fix is output encoding -- escape user
      data before inserting it into HTML. CSP provides a second line of defense
      for bypasses. Implement both.

  - question: We return JSON from make_response() for API endpoints. Does this rule still fire?
    answer: |
      It fires if the first argument to make_response() is tainted, regardless of the
      intended content type. If you set Content-Type: application/json explicitly, the
      browser will not render it as HTML. To avoid the finding, either set Content-Type
      correctly (and document that), or use jsonify() instead of make_response() for
      JSON responses -- jsonify() sets the correct Content-Type automatically.

  - question: How does this rule handle multi-step HTML construction across functions?
    answer: |
      The taint analysis follows data through assignments, return values, string
      operations, and cross-file function calls. If request.args.get() in routes.py
      produces a value that flows into a build_html() helper in render.py that returns
      an HTML string passed to make_response() in the route handler, the full chain
      is flagged. The .tracks(0) setting ensures only the body argument is analyzed.

