# Rule Identity
id: PYTHON-FLASK-AUDIT-005
name: Flask url_for with _external=True
short_description: Detects url_for() called with _external=True, which generates absolute URLs using the Host header and can be abused for open redirect or host header injection attacks.

# Classification
severity: LOW
category: flask
language: python
ruleset: python/flask/PYTHON-FLASK-AUDIT-005

# Vulnerability Details
cwe:
  - id: CWE-601
    name: "URL Redirection to Untrusted Site ('Open Redirect')"
    url: https://cwe.mitre.org/data/definitions/601.html

owasp:
