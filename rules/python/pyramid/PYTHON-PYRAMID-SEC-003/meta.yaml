# Rule Identity
id: PYTHON-PYRAMID-SEC-003
name: Pyramid SQLAlchemy SQL Injection
short_description: Traces user input from Pyramid request parameters to SQLAlchemy query methods (.filter, .execute, .order_by) without parameterization.

# Classification
severity: CRITICAL
category: pyramid
status: disabled  # Engine limitation: chained method calls (session.query().filter()) not resolved yet
language: python
ruleset: python/pyramid/PYTHON-PYRAMID-SEC-003

# Vulnerability Details
cwe:
  - id: CWE-89
    name: "Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
    url: https://cwe.mitre.org/data/definitions/89.html

owasp:
