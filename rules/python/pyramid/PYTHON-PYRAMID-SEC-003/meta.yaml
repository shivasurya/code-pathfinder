# Content
description: |
  This rule traces user input from Pyramid request parameters directly into
  SQLAlchemy query methods (.filter(), .order_by(), .group_by(), .having(),
  .execute()) where raw SQL strings are constructed through concatenation or
  format strings.

  Pyramid applications commonly use SQLAlchemy as the ORM layer. When developers
  bypass SQLAlchemy's parameterized query interface and build SQL strings manually
  with user input, they create SQL injection vulnerabilities. The safe approach is
  to use SQLAlchemy's expression language with bound parameters.

  The rule recognizes bindparams() as a sanitizer. If the user input passes
  through a bindparams() call before reaching the query method, the finding is
  suppressed.

message: "User input flows to SQLAlchemy query without parameterization. Use bindparams() or the ORM expression API."

security_implications:
  - title: Data Exfiltration
    description: |
      SQL injection allows an attacker to extract your entire database contents.
      UNION-based injection pulls data from other tables. Blind injection extracts
      data one bit at a time. One vulnerable endpoint can leak every row in every
      table.
  - title: Authentication Bypass
    description: |
      SQL injection in login queries returns all users, logging the attacker in
      as the first result (usually admin). No credentials required.
  - title: Data Manipulation
    description: |
      Injected INSERT, UPDATE, or DELETE statements modify records, create backdoor
      accounts, or corrupt data. In financial applications, this means altered
      transactions.
  - title: Remote Code Execution via Database Features
    description: |
      Some databases support OS command execution. PostgreSQL has COPY and
      pg_read_file. SQLite has load_extension. SQL injection on these backends
      can escalate to full server compromise.

secure_example: |
  from sqlalchemy import text
  from pyramid.view import view_config

  @view_config(route_name='search', renderer='json')
  def search_view(request):
      name = request.params.get('name', '')
      # SECURE: Use parameterized query with bound parameters
      result = request.dbsession.execute(
          text("SELECT * FROM users WHERE name = :name"),
          {"name": name}
      )
      return {'users': [dict(row) for row in result]}

  # BETTER: Use SQLAlchemy ORM expressions
  @view_config(route_name='search_orm', renderer='json')
  def search_orm(request):
      name = request.params.get('name', '')
      users = request.dbsession.query(User).filter(User.name == name).all()
      return {'users': [u.to_dict() for u in users]}

recommendations:
  - Use SQLAlchemy's ORM expression API (Model.query.filter(Model.field == value)) instead of raw SQL strings
  - When raw SQL is necessary, use text() with named parameters and pass values as a dict
  - Never concatenate or f-string user input into SQL queries
  - Use bindparams() to safely bind user values into SQLAlchemy text() expressions
  - Configure SQLAlchemy logging in development to inspect generated queries for concatenated user input

detection_scope: |
  This rule traces data from Pyramid request sources (request.params.get,
  request.GET.get, request.POST.get, request.matchdict.get, request.json_body.get)
  to SQLAlchemy query methods (*.filter, *.order_by, *.group_by, *.having,
  *.execute). Sanitizers include bindparams() and *.bindparams(). Uses scope="local"
  for intra-procedural analysis within view functions.

