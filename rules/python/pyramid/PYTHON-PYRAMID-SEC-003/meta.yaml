# FAQ
faq:
  - question: Does SQLAlchemy's ORM prevent SQL injection automatically?
    answer: |
      Yes, when used correctly. SQLAlchemy's expression language
      (Model.query.filter(Model.field == value)) generates parameterized queries
      automatically. The risk arises when developers use text() with string
      concatenation or pass raw SQL strings to .filter() or .execute().

  - question: Is SQLAlchemy text() safe?
    answer: |
      text() itself is safe when used with named parameters:
      text("SELECT * FROM users WHERE name = :name") with {"name": user_input}.
      It becomes dangerous when combined with string concatenation:
      text(f"SELECT * FROM users WHERE name = '{user_input}'").

  - question: Does this rule catch .filter() with raw strings?
    answer: |
      Yes. The rule tracks user input flowing to .filter(), .order_by(),
      .group_by(), .having(), and .execute(). If the input reaches any of these
      methods through string concatenation, it produces a finding.

  - question: What about SQLAlchemy's .filter_by() method?
    answer: |
      filter_by() uses keyword arguments (filter_by(name=value)) which are always
      parameterized. This rule does not flag filter_by() calls because they are
      inherently safe.

  - question: How do I run this rule in CI/CD?
    answer: |
      Run: pathfinder ci --ruleset python/pyramid --project .

