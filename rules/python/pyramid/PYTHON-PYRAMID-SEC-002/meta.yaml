id: PYTHON-PYRAMID-SEC-002
name: Pyramid Direct Response XSS
short_description: User input flows directly to Response(). Use templates with auto-escaping.
severity: HIGH
category: pyramid
language: python
ruleset: python/PYTHON-PYRAMID-SEC-002
cwe:
- id: CWE-79
  name: Improper Neutralization of Input During Web Page Generation
  url: https://cwe.mitre.org/data/definitions/79.html
tags:
- python
- pyramid
- xss
- response
- owasp-a03
- cwe-79
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'These rules detect common security vulnerabilities in Python Pyramid web applications,

  covering three critical categories: CSRF protection bypass, Cross-Site Scripting (XSS)

  via direct response construction, and SQL injection through SQLAlchemy raw queries.'
message: User input flows directly to Response(). Use templates with auto-escaping.
secure_example: "from pyramid.config import Configurator\nfrom pyramid.response import Response\nfrom\
  \ markupsafe import escape\nfrom sqlalchemy import text\n\n# SECURE: CSRF protection enabled (default)\n\
  config = Configurator()\nconfig.set_default_csrf_options(require_csrf=True, token='csrf_token')\n\n\
  # SECURE: Escape user input or use templates with auto-escaping\n@view_config(route_name='greet', renderer='templates/greet.jinja2')\n\
  def greet(request):\n    name = request.params.get('name', '')\n    return {'name': name}  # Jinja2\
  \ auto-escapes by default\n\n# Or if using Response directly:\n@view_config(route_name='greet')\ndef\
  \ greet_safe(request):\n    name = escape(request.params.get('name', ''))\n    return Response(f'<h1>Hello,\
  \ {name}!</h1>')\n\n# SECURE: Parameterized SQL queries\n@view_config(route_name='search')\ndef search(request):\n\
  \    query = request.params.get('q', '')\n    results = DBSession.query(User).filter(\n        User.name.like(f'%{query}%')\
  \  # ORM method - safe\n    ).all()\n    # Or with raw SQL using bindparams:\n    stmt = text(\"SELECT\
  \ * FROM users WHERE name LIKE :q\").bindparams(q=f'%{query}%')\n    return {'results': results}"
