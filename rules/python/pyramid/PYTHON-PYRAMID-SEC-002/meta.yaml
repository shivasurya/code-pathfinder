# Rule Identity
id: PYTHON-PYRAMID-SEC-002
name: Pyramid Direct Response XSS
short_description: Traces user input from Pyramid request objects to Response() constructors, enabling reflected cross-site scripting.

# Classification
severity: HIGH
category: pyramid
language: python
ruleset: python/pyramid/PYTHON-PYRAMID-SEC-002

# Vulnerability Details
cwe:
  - id: CWE-79
    name: "Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
    url: https://cwe.mitre.org/data/definitions/79.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

tags:
  - python
  - pyramid
