# Rule Identity
id: PYTHON-LANG-SEC-030
name: Insecure MD5 Hash Usage
short_description: MD5 is cryptographically broken and unsuitable for security-sensitive purposes. Use SHA-256 or SHA-3 instead.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-030

# Vulnerability Details
cwe:
