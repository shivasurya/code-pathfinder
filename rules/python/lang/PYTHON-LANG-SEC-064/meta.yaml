# Rule Identity
id: PYTHON-LANG-SEC-064
name: telnetlib Usage Detected
short_description: telnetlib.Telnet() transmits all data including credentials in plaintext. Replace with SSH (paramiko) for remote command execution.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-064

# Vulnerability Details
cwe:
