# Content
description: |
  aiopg is an asyncio-based wrapper around psycopg2 for async PostgreSQL access. Like
  psycopg2, aiopg uses %s placeholders for parameterized queries. SQL injection occurs
  when user data is embedded in the SQL string via string formatting operations instead
  of being passed as separate parameters.

  aiopg's async cursor.execute() and cursor.executemany() methods accept a SQL template
  string as the first argument and a tuple or list of parameters as the second argument.
  When only the first argument is used and it contains user-controlled content via
  string formatting, SQL injection is possible.

message: "aiopg cursor.execute() with string-formatted SQL detected. Use parameterized queries: cursor.execute(sql, (param,)) with %s placeholders."

security_implications:
  - title: Database Exfiltration via Async Injection
    description: |
      SQL injection via aiopg in async web applications allows UNION SELECT and other
      injection techniques to read data from any PostgreSQL table with the database
      user's read permissions.
  - title: Authentication Bypass
    description: |
      Async login endpoints using aiopg with string-formatted SQL can be bypassed
      with SQL injection payloads, granting unauthorized access.
  - title: Data Modification via Async Requests
    description: |
      High-concurrency async applications handling many requests simultaneously allow
      an attacker to submit multiple injection payloads concurrently, potentially
      performing multiple data modifications or deletions in rapid succession.
  - title: PostgreSQL Privilege Escalation
    description: |
      If the database user has superuser privileges, SQL injection can leverage
      PostgreSQL's COPY TO/FROM PROGRAM and pg_read_file() for OS-level access.

secure_example: |
  import aiopg

  # INSECURE: String formatting in SQL
  # await cursor.execute(f"SELECT * FROM users WHERE username = '{username}'")

  # SECURE: Parameterized queries with %s placeholders (psycopg2 style)
  async def get_user(pool: aiopg.Pool, username: str) -> dict:
      async with pool.acquire() as conn:
          async with conn.cursor() as cursor:
              await cursor.execute(
                  "SELECT id, username, email FROM users WHERE username = %s",
                  (username,)
              )
              row = await cursor.fetchone()
              if row is None:
                  return {}
              return {"id": row[0], "username": row[1], "email": row[2]}

  async def list_orders(pool: aiopg.Pool, user_id: int, status: str) -> list:
      async with pool.acquire() as conn:
          async with conn.cursor() as cursor:
              await cursor.execute(
                  "SELECT id, total FROM orders WHERE user_id = %s AND status = %s",
                  (user_id, status)
              )
              return await cursor.fetchall()

recommendations:
  - Always use aiopg's parameterized query syntax with %s placeholders and pass values as the second argument tuple to cursor.execute().
  - Never construct SQL strings with f-strings, % operator, or .format() when user data is involved.
  - Use aiopg.Pool for efficient connection management in high-concurrency async applications.
  - Validate and type-check user inputs before passing them as SQL parameters.
  - Use SQLAlchemy with aiopg backend for ORM-level parameterization and additional query building safety.

detection_scope: |
  This rule performs taint analysis tracing user-controlled data through string formatting
  operations to aiopg cursor.execute() and cursor.executemany() call sites. The first SQL
  string argument is the sink for injection.

