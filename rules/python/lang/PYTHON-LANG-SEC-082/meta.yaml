# Rule Identity
id: PYTHON-LANG-SEC-082
name: aiopg SQL Injection via String Formatting
short_description: SQL query built with string formatting passed to aiopg cursor.execute() enables SQL injection. Use parameterized queries with %s placeholders.

# Classification
severity: CRITICAL
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-082

