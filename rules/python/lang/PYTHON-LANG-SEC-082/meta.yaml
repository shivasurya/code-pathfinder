# FAQ
faq:
  - question: Does aiopg use the same query syntax as psycopg2?
    answer: |
      Yes. aiopg is a thin async wrapper around psycopg2's connection and cursor objects.
      It uses the same %s placeholder syntax for parameterized queries and the same
      parameter passing convention: cursor.execute(sql, (param1, param2)).
      The async/await syntax is the primary difference from psycopg2.

  - question: Is aiopg still actively maintained?
    answer: |
      aiopg is in maintenance mode. For new async PostgreSQL projects, asyncpg is generally
      preferred for its higher performance and native async design. However, projects using
      aiopg should still fix SQL injection vulnerabilities using parameterized queries.

  - question: How do I migrate from aiopg to asyncpg for new projects?
    answer: |
      asyncpg uses $1, $2 numbered placeholders instead of %s, and values are passed as
      positional arguments: conn.execute(sql, val1, val2) instead of cursor.execute(sql, (val1, val2)).
      asyncpg is direct (no cursor object by default). The parameterization concept is
      identical, only the syntax differs.

  - question: Can I use SQLAlchemy async with aiopg?
    answer: |
      SQLAlchemy 1.4+ supports async engines with aiopg as the backend via
      create_async_engine("postgresql+aiopg://..."). Using SQLAlchemy's ORM or Core
      query building with parameterized text() constructs is the safest approach for
      complex query patterns.

  - question: Does this rule detect injection in aiopg connection pools?
    answer: |
      Yes. Whether the SQL string is built from user input and passed to a cursor from
      a pool connection or a direct connection, the taint analysis follows the data flow
      to the cursor.execute() sink.

  - question: Are aiopg executemany() calls also vulnerable?
    answer: |
      executemany() is safe when the SQL template is parameterized with %s placeholders.
      It becomes vulnerable if the SQL string itself is constructed from user input using
      string formatting, even if the second argument provides some parameters. Ensure
      the SQL template string is always a static literal.

