# Rule Identity
id: PYTHON-LANG-SEC-005
name: Non-literal Dynamic Import Detected
short_description: __import__() or importlib.import_module() with a non-literal argument can import arbitrary modules when called with untrusted input.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-005

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

