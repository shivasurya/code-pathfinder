# Rule Identity
id: PYTHON-LANG-SEC-033
name: SHA-224 or SHA3-224 Weak Hash Usage
short_description: SHA-224 and SHA3-224 provide only 112-bit collision resistance, which is below the 128-bit minimum recommended by NIST for new applications.

# Classification
severity: LOW
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-033

# Vulnerability Details
cwe:
