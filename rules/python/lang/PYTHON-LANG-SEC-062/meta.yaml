# Rule Identity
id: PYTHON-LANG-SEC-062
name: Insecure urllib Request Object Usage
short_description: urllib.request.Request() and OpenerDirector used with HTTP URLs transmit data in plaintext. Verify HTTPS URLs are used.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-062

# Vulnerability Details
cwe:
  - id: CWE-319
    name: Cleartext Transmission of Sensitive Information
    url: https://cwe.mitre.org/data/definitions/319.html

owasp:
  - id: A02:2021
    name: Cryptographic Failures
    url: https://owasp.org/Top10/A02_2021-Cryptographic_Failures/

tags:
  - python
