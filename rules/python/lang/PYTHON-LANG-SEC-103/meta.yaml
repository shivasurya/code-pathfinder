# Rule Identity
id: PYTHON-LANG-SEC-103
name: Regex DoS Risk
short_description: Detects re.compile(), re.match(), re.search(), and re.findall() calls that should be audited for catastrophic backtracking patterns.

# Classification
severity: LOW
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-103

