# Rule Identity
id: PYTHON-LANG-SEC-001
name: Dangerous eval() Usage Detected
short_description: eval() executes arbitrary Python expressions from strings, enabling remote code execution when called with untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-001

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

