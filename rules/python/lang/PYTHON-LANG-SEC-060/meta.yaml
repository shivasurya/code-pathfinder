# Rule Identity
id: PYTHON-LANG-SEC-060
name: HTTP Request Without TLS (requests library)
short_description: HTTP URLs in requests calls transmit data in plaintext without encryption. Use HTTPS URLs for sensitive data transmission.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-060

# Vulnerability Details
cwe:
  - id: CWE-319
    name: Cleartext Transmission of Sensitive Information
    url: https://cwe.mitre.org/data/definitions/319.html

owasp:
  - id: A02:2021
    name: Cryptographic Failures
    url: https://owasp.org/Top10/A02_2021-Cryptographic_Failures/

