# Rule Identity
id: PYTHON-LANG-SEC-051
name: Weak SSL/TLS Protocol Version
short_description: SSLContext configured with SSLv2, SSLv3, TLSv1.0, or TLSv1.1 uses deprecated protocols with known vulnerabilities. Use TLS 1.2 or TLS 1.3.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-051

# Vulnerability Details
cwe:
  - id: CWE-326
    name: Inadequate Encryption Strength
    url: https://cwe.mitre.org/data/definitions/326.html

owasp:
  - id: A02:2021
    name: Cryptographic Failures
    url: https://owasp.org/Top10/A02_2021-Cryptographic_Failures/

tags:
  - python
  - ssl
