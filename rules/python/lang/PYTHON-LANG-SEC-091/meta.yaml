# Rule Identity
id: PYTHON-LANG-SEC-091
name: Insecure xml.dom.minidom Usage (XXE)
short_description: xml.dom.minidom is vulnerable to XML External Entity (XXE) attacks. Use defusedxml.minidom for safe XML parsing.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-091

# Vulnerability Details
cwe:
