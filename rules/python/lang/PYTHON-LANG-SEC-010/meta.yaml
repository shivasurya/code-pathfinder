# Rule Identity
id: PYTHON-LANG-SEC-010
name: Dangerous os.system() or os.popen() Call
short_description: os.system() and os.popen() execute shell commands via /bin/sh, enabling command injection when arguments contain untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-010

# Vulnerability Details
cwe:
  - id: CWE-78
    name: "Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    url: https://cwe.mitre.org/data/definitions/78.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

