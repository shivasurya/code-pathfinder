# Rule Identity
id: PYTHON-LANG-SEC-023
name: Dangerous subinterpreters run_string() Usage
short_description: subinterpreters.run_string() executes arbitrary Python code strings in sub-interpreters, enabling code injection when called with untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-023

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

