id: PYTHON-LANG-SEC-023
name: Dangerous subinterpreters run_string
short_description: subinterpreters.run_string() detected. Avoid executing untrusted code strings.
severity: HIGH
category: lang
language: python
ruleset: python/PYTHON-LANG-SEC-023
cwe:
- id: CWE-95
  name: Improper Neutralization of Directives in Dynamically Evaluated Code
  url: https://cwe.mitre.org/data/definitions/95.html
tags:
- python
- subinterpreters
- code-execution
- cwe-95
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'The subprocess module is Python''s recommended interface for spawning child

  processes. However, when subprocess calls use shell=True or accept unsanitized

  user input as command arguments, they become vulnerable to OS command injection.

  The asyncio module provides asynchronous equivalents (create_subprocess_shell)

  that carry the same risks. Python''s experimental subinterpreters API allows

  executing arbitrary code strings in isolated interpreters.'
message: subinterpreters.run_string() detected. Avoid executing untrusted code strings.
secure_example: "import subprocess\n# Pass arguments as a list (no shell interpretation)\nsubprocess.run([\"\
  grep\", user_input, \"log\"], check=True)\n# Use asyncio exec variant (no shell)\nawait asyncio.create_subprocess_exec(\"\
  grep\", user_input, \"log\")\n# Validate and restrict allowed commands\nALLOWED_COMMANDS = {\"ls\",\
  \ \"grep\", \"wc\"}\nif cmd not in ALLOWED_COMMANDS:\n    raise ValueError(\"Command not allowed\")"
recommendations: []
