# Rule Identity
id: PYTHON-LANG-SEC-040
name: Pickle Deserialization of Untrusted Data
short_description: pickle.loads() and pickle.load() execute arbitrary Python code during deserialization. Never unpickle data from untrusted sources.

# Classification
severity: HIGH
category: lang
