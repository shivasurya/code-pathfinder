# Rule Identity
id: PYTHON-LANG-SEC-101
name: Insecure File Permissions via os.chmod
short_description: os.chmod() or os.fchmod() sets overly permissive file permissions that allow unauthorized read, write, or execute access.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-101

