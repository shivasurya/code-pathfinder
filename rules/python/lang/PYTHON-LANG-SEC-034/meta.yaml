# Rule Identity
id: PYTHON-LANG-SEC-034
name: MD5 Used for Password Hashing
short_description: MD5 is being used to hash passwords. MD5 is cryptographically broken and orders of magnitude too fast for password hashing. Use bcrypt, scrypt, or argon2.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-034

# Vulnerability Details
cwe:
  - id: CWE-916
    name: Use of Password Hash With Insufficient Computational Effort
