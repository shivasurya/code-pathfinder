# Rule Identity
id: PYTHON-LANG-SEC-011
name: Dangerous os.exec*() Call
short_description: os.exec*() replaces the current process image with a new program, enabling arbitrary program execution when arguments are untrusted.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-011

