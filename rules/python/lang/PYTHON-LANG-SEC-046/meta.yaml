# Rule Identity
id: PYTHON-LANG-SEC-046
name: dill Deserialization Detected
short_description: dill.loads() and dill.load() extend pickle with broader serialization capabilities and can execute arbitrary code when deserializing untrusted data.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-046

