# Rule Identity
id: PYTHON-LANG-SEC-012
name: Dangerous os.spawn*() Call
short_description: os.spawn*() spawns a new process and can execute arbitrary programs when the executable path or arguments are derived from untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-012

# Vulnerability Details
cwe:
