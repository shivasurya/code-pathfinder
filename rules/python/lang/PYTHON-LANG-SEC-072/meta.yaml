# Rule Identity
id: PYTHON-LANG-SEC-072
name: Paramiko exec_command() Usage
short_description: paramiko exec_command() runs commands on a remote host. Audit that command arguments are not derived from untrusted input to prevent command injection.

# Classification
severity: MEDIUM
category: lang
language: python
