# Rule Identity
id: PYTHON-LANG-SEC-094
name: csv.writer Audit (Formula Injection Risk)
short_description: csv.writer() detected. Audit CSV output for formula injection (CSV injection) if data is exported to spreadsheet applications.

# Classification
severity: LOW
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-094

# Vulnerability Details
cwe:
  - id: CWE-1236
    name: Improper Neutralization of Formula Elements in a CSV File
    url: https://cwe.mitre.org/data/definitions/1236.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

