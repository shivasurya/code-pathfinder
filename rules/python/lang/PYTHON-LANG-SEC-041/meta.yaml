# Rule Identity
id: PYTHON-LANG-SEC-041
name: PyYAML Unsafe Load Function
short_description: yaml.load() and yaml.unsafe_load() can execute arbitrary Python objects during YAML parsing. Use yaml.safe_load() instead.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-041

# Vulnerability Details
cwe:
  - id: CWE-502
    name: Deserialization of Untrusted Data
    url: https://cwe.mitre.org/data/definitions/502.html

owasp:
  - id: A08:2021
    name: Software and Data Integrity Failures
    url: https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/

tags:
  - python
