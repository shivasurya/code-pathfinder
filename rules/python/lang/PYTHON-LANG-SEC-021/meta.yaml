# Rule Identity
id: PYTHON-LANG-SEC-021
name: subprocess Called with shell=True
short_description: subprocess called with shell=True passes the command through the system shell, enabling command injection when any part of the command contains untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-021

# Vulnerability Details
cwe:
  - id: CWE-78
    name: "Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    url: https://cwe.mitre.org/data/definitions/78.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

