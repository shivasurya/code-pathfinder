# Rule Identity
id: PYTHON-LANG-SEC-022
name: Dangerous asyncio Shell Execution
short_description: asyncio.create_subprocess_shell() passes the command through the system shell, enabling command injection when arguments contain untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-022

# Vulnerability Details
cwe:
  - id: CWE-78
    name: "Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
    url: https://cwe.mitre.org/data/definitions/78.html

