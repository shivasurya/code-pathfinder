# Rule Identity
id: PYTHON-LANG-SEC-020
name: Dangerous subprocess Usage
short_description: subprocess calls detected. Ensure command arguments are not user-controlled to prevent OS command injection.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-020

