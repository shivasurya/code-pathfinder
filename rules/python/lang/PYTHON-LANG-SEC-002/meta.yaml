# Rule Identity
id: PYTHON-LANG-SEC-002
name: Dangerous exec() Usage Detected
short_description: exec() executes arbitrary Python statements from strings or code objects, enabling remote code execution when called with untrusted input.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-002

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

