# Rule Identity
id: PYTHON-LANG-SEC-006
name: Dangerous typing.get_type_hints() Usage
short_description: typing.get_type_hints() evaluates string annotations as Python expressions, enabling code execution when annotation strings contain untrusted content.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-006

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

