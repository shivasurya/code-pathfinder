# Rule Identity
id: PYTHON-LANG-SEC-003
name: Dangerous code.InteractiveConsole Usage
short_description: code.InteractiveConsole and code.interact() enable arbitrary Python code execution and should not be exposed to untrusted users.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-003

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

