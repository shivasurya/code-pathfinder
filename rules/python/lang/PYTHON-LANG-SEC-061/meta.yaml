# Rule Identity
id: PYTHON-LANG-SEC-061
name: Insecure urllib.request.urlopen() Usage
short_description: urllib.request.urlopen() over HTTP transmits data in plaintext. Verify HTTPS URLs are used and SSL context is properly configured.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-061

# Vulnerability Details
cwe:
  - id: CWE-319
    name: Cleartext Transmission of Sensitive Information
    url: https://cwe.mitre.org/data/definitions/319.html

owasp:
