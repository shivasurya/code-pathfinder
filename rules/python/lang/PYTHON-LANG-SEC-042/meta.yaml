# Rule Identity
id: PYTHON-LANG-SEC-042
name: jsonpickle Deserialization Detected
short_description: jsonpickle.decode() can execute arbitrary Python code during deserialization. Use the standard json module for untrusted data.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-042

