# Rule Identity
id: PYTHON-LANG-SEC-013
name: Shell Command with Wildcard Character
short_description: os.system() calls containing wildcard characters (*) may lead to unintended file inclusion or command injection through wildcard expansion.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-013

