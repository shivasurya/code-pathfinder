# Rule Identity
id: PYTHON-LANG-SEC-052
name: Deprecated ssl.wrap_socket() Usage
short_description: ssl.wrap_socket() is deprecated since Python 3.7 and should be replaced with SSLContext.wrap_socket() for proper TLS configuration.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-052

