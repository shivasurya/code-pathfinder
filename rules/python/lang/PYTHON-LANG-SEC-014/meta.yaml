# Rule Identity
id: PYTHON-LANG-SEC-014
name: Python Reverse Shell Pattern Detected
short_description: Reverse shell pattern detected using socket connections with subprocess or exec(). This is a strong indicator of malicious code or a backdoor.

# Classification
severity: CRITICAL
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-014

