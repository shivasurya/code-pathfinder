# Rule Identity
id: PYTHON-LANG-SEC-073
name: multiprocessing Connection.recv() Usage
short_description: multiprocessing.Connection.recv() uses pickle internally and is not safe for receiving data from untrusted connections.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-073

# Vulnerability Details
cwe:
  - id: CWE-502
    name: Deserialization of Untrusted Data
    url: https://cwe.mitre.org/data/definitions/502.html

owasp:
