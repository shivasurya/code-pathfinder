# Rule Identity
id: PYTHON-LANG-SEC-100
name: UUID Version 1 Leaks MAC Address
short_description: uuid.uuid1() embeds the host MAC address in the generated UUID, leaking hardware identity information.

# Classification
severity: LOW
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-100

# Vulnerability Details
cwe:
  - id: CWE-200
    name: "Exposure of Sensitive Information to an Unauthorized Actor"
    url: https://cwe.mitre.org/data/definitions/200.html

owasp:
  - id: A05:2021
    name: Security Misconfiguration
    url: https://owasp.org/Top10/A05_2021-Security_Misconfiguration/

