# Rule Identity
id: PYTHON-LANG-SEC-043
name: ruamel.yaml Unsafe Loader Configuration
short_description: ruamel.yaml configured with typ='unsafe' can instantiate arbitrary Python objects during YAML parsing. Use typ='safe' or the default round-trip loader.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-043

# Vulnerability Details
cwe:
  - id: CWE-502
    name: Deserialization of Untrusted Data
    url: https://cwe.mitre.org/data/definitions/502.html

owasp:
  - id: A08:2021
    name: Software and Data Integrity Failures
    url: https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/

tags:
