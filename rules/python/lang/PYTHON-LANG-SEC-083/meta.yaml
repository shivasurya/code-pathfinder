# FAQ
faq:
  - question: What is pg8000 and how does it differ from psycopg2?
    answer: |
      pg8000 is a pure-Python PostgreSQL driver with no C extension dependency. psycopg2
      uses a C extension for performance. pg8000 is preferred in environments where
      installing C extensions is restricted (e.g., some PaaS platforms, restricted
      container environments). Both implement DB-API 2.0 and use %s parameterization.
      SQL injection risks and mitigations are identical.

  - question: Does pg8000 support named parameters in addition to positional %s?
    answer: |
      pg8000 supports both %s (positional) and %(name)s (named dictionary-based)
      parameterization, as defined by DB-API 2.0. Named parameters:
      cursor.execute("SELECT * FROM t WHERE id = %(id)s", {"id": user_id}).
      Both are safe as long as the SQL template string is a static literal.

  - question: Is SQLAlchemy compatible with pg8000?
    answer: |
      Yes. SQLAlchemy supports pg8000 as a backend via the postgresql+pg8000:// connection
      string. Using SQLAlchemy's ORM or Core with bound parameters is the recommended
      approach for complex applications, as it provides additional parameterization
      guarantees at the ORM level.

  - question: How does Google Cloud SQL use pg8000?
    answer: |
      Google Cloud's Cloud SQL Python Connector supports pg8000 as the underlying
      PostgreSQL driver, especially in environments where psycopg2's C extension
      cannot be installed. Cloud SQL connector handles connection credentials and
      SSL; pg8000 handles query execution. SQL injection mitigations are the same.

  - question: Does this rule apply to pg8000.native.Connection as well as the legacy interface?
    answer: |
      Yes. Both pg8000's legacy DBAPI interface and the native interface use similar
      parameterization. The native interface may use different method names but the
      security principle (parameterize all user input) remains the same.

  - question: What happens if I accidentally use Python's % operator on the SQL string?
    answer: |
      cursor.execute("SELECT * FROM t WHERE id = %s" % user_id) applies Python's string
      formatting to the SQL string before passing it to pg8000. This is NOT parameterization
      — it embeds the value directly in the SQL string, enabling injection. Always pass the
      parameters as a separate argument: cursor.execute("... %s", (user_id,)).

