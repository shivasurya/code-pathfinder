# Content
description: |
  pg8000 is a pure-Python PostgreSQL driver that implements DB-API 2.0. Like psycopg2,
  it uses %s placeholders for parameterized queries. SQL injection occurs when user data
  is embedded in the SQL string using string formatting operations.

  pg8000's cursor.execute() and cursor.executemany() accept a SQL template as the first
  argument and a tuple of parameters as the optional second argument. When only the SQL
  string is provided and it contains user data embedded via f-strings or string concatenation,
  SQL injection is possible.

  pg8000 is commonly used in cloud environments and Google Cloud's Python client libraries
  due to its pure-Python nature (no C extension dependency). SQL injection via pg8000
  is equally dangerous regardless of the deployment environment.

message: "pg8000 cursor.execute() with string-formatted SQL detected. Use parameterized queries: cursor.execute(sql, (param,)) with %s placeholders."

security_implications:
  - title: PostgreSQL Data Exfiltration
    description: |
      SQL injection via pg8000 allows UNION SELECT and other techniques to read from
      any PostgreSQL table. Cloud-deployed applications using pg8000 for managed
      PostgreSQL (Cloud SQL, RDS) are fully vulnerable to data exfiltration.
  - title: Cloud Database Compromise
    description: |
      In Google Cloud or AWS environments, injected SQL in pg8000 queries can access
      all data the database user has permissions to read, potentially including data
      from multiple tenants in a shared database architecture.
  - title: Authentication Bypass
    description: |
      Login queries built with string formatting via pg8000 can be bypassed with standard
      SQL injection payloads, granting unauthorized database access.
  - title: Row-Level Security Bypass
    description: |
      PostgreSQL's row-level security (RLS) policies can be bypassed by SQL injection
      that changes the query structure, allowing access to rows that RLS would normally
      restrict.

secure_example: |
  import pg8000.native

  # INSECURE: String formatting in SQL
  # cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")

  # SECURE: Parameterized queries with %s placeholders
  def get_user_by_id(conn: pg8000.native.Connection, user_id: int) -> dict:
      cursor = conn.cursor()
      cursor.execute(
          "SELECT id, username, email FROM users WHERE id = %s",
          (user_id,)
      )
      row = cursor.fetchone()
      if row is None:
          return {}
      return {"id": row[0], "username": row[1], "email": row[2]}

  def search_records(conn: pg8000.native.Connection,
                     category: str, limit: int) -> list:
      cursor = conn.cursor()
      cursor.execute(
          "SELECT id, title, content FROM records WHERE category = %s LIMIT %s",
          (category, limit)
      )
      return cursor.fetchall()

recommendations:
  - Always use pg8000's parameterized query syntax with %s placeholders and pass values as a tuple argument to cursor.execute().
  - Never construct SQL strings using f-strings, % operator, or .format() with user-supplied values.
  - Validate and sanitize input types (ensure integer IDs are actually integers) before passing them as SQL parameters.
  - Grant the PostgreSQL database user the minimum privileges required by the application.
  - Use an ORM such as SQLAlchemy with pg8000 as the backend for additional query building safety.

detection_scope: |
  This rule performs taint analysis tracing user-controlled data through string formatting
  to pg8000 cursor.execute() and cursor.executemany() call sites. The first SQL string
  argument is the injection sink.

