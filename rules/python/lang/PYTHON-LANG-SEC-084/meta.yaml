# Rule Identity
id: PYTHON-LANG-SEC-084
name: Formatted SQL Query Passed to cursor.execute()
short_description: SQL query built with string formatting detected. String-formatted SQL strings are a common SQL injection vector. Use parameterized queries.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-084

# Vulnerability Details
cwe:
  - id: CWE-89
    name: "Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
    url: https://cwe.mitre.org/data/definitions/89.html

