id: PYTHON-LANG-SEC-070
name: Socket Bind to All Interfaces
short_description: Socket bound to 0.0.0.0 (all interfaces). Bind to specific interface in production.
severity: MEDIUM
category: lang
language: python
ruleset: python/PYTHON-LANG-SEC-070
cwe:
- id: CWE-200
  name: Exposure of Sensitive Information to an Unauthorized Actor
  url: https://cwe.mitre.org/data/definitions/200.html
tags:
- python
- socket
- bind
- network
- cwe-200
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Network-facing Python applications must properly authenticate remote hosts,

  restrict listening interfaces, sanitize remote commands, and safely handle

  deserialized data from network connections. This module detects insecure socket

  binding patterns, SSH host key verification bypass, unvalidated remote command

  execution over SSH, and unsafe deserialization through multiprocessing connections.'
message: Socket bound to 0.0.0.0 (all interfaces). Bind to specific interface in production.
secure_example: "import socket, paramiko\n# Bind to localhost only for internal services\nsock = socket.socket()\n\
  sock.bind((\"127.0.0.1\", 8080))\n# Verify SSH host keys explicitly\nclient = paramiko.SSHClient()\n\
  client.load_system_host_keys()\nclient.set_missing_host_key_policy(paramiko.RejectPolicy())\nclient.connect(host)\n\
  # Validate commands before remote execution\nALLOWED_COMMANDS = {\"ls\", \"df\", \"uptime\"}\nif cmd\
  \ not in ALLOWED_COMMANDS:\n    raise ValueError(\"Unauthorized command\")\nclient.exec_command(cmd)\n\
  # Use authenticated Pipe() for multiprocessing\nparent_conn, child_conn = multiprocessing.Pipe()"
