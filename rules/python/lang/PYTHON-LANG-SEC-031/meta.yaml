# Rule Identity
id: PYTHON-LANG-SEC-031
name: Insecure SHA-1 Hash Usage
short_description: SHA-1 is cryptographically weak due to practical collision attacks. Use SHA-256 or SHA-3 for security-sensitive hashing.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-031

# Vulnerability Details
cwe:
