# Rule Identity
id: PYTHON-LANG-SEC-080
name: psycopg2 SQL Injection via String Formatting
short_description: SQL query built with string formatting passed to psycopg2 cursor.execute() enables SQL injection. Use parameterized queries with %s placeholders.

# Classification
severity: CRITICAL
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-080

# Vulnerability Details
cwe:
  - id: CWE-89
