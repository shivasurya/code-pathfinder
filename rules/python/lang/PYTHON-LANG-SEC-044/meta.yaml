# Rule Identity
id: PYTHON-LANG-SEC-044
name: marshal Deserialization Detected
short_description: marshal.loads() and marshal.load() are not secure against erroneous or malicious data and should not be used to deserialize untrusted input.

# Classification
severity: MEDIUM
category: lang
