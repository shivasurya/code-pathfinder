# FAQ
faq:
  - question: How does asyncpg's parameterization syntax differ from psycopg2?
    answer: |
      asyncpg uses PostgreSQL's native parameterization syntax: $1, $2, $3 for numbered
      positional parameters. psycopg2 uses %s for positional parameters. asyncpg values
      are passed as additional positional arguments: conn.execute(sql, val1, val2) rather
      than psycopg2's tuple: cursor.execute(sql, (val1, val2)).

  - question: Does asyncpg's binary protocol make SQL injection less likely?
    answer: |
      asyncpg uses PostgreSQL's binary protocol and prepared statements for parameterized
      queries, which is more efficient than psycopg2's text protocol. However, if the SQL
      string itself is constructed with user input (before parameterization), injection is
      still possible. The binary protocol does not prevent injection in the SQL string.

  - question: How do I handle dynamic column names or table names in asyncpg?
    answer: |
      asyncpg does not have an equivalent to psycopg2.sql.Identifier for safe dynamic
      identifiers. For dynamic identifiers, validate the column/table name against an
      explicit allowlist of known-valid names (from schema introspection or hardcoded
      constants), then use string formatting only with the validated name.

  - question: Is connection.execute() vs conn.fetch() safer for parameterization?
    answer: |
      All asyncpg query methods (execute, fetch, fetchrow, fetchval, executemany) support
      parameterization identically. The choice between them depends on whether you need
      the result rows, a single row, a single value, or just the execution status.
      All are equally safe when used with proper parameterization.

  - question: How do I use asyncpg with SQLAlchemy for async queries?
    answer: |
      SQLAlchemy 1.4+ with its async extension (create_async_engine with asyncpg backend)
      provides ORM-level parameterization. SQLAlchemy's query building with bind parameters
      is safe. Use SQLAlchemy's text() construct with bindparams() for raw SQL queries
      rather than string formatting.

  - question: Does this rule detect SQL injection in FastAPI endpoints using asyncpg?
    answer: |
      Yes. Code Pathfinder traces taint from FastAPI path parameters, query parameters,
      and request body fields through variable assignments to asyncpg execute() calls.
      Inter-procedural analysis catches patterns where request parameters are passed to
      service layer functions that then build and execute SQL queries.

