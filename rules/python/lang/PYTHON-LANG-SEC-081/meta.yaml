# Content
description: |
  asyncpg is a high-performance asyncio-based PostgreSQL driver for Python. It uses
  PostgreSQL's native binary protocol and supports parameterized queries with $1, $2, ...
  numbered placeholders (unlike psycopg2's %s style).

  SQL injection occurs when user-supplied data is embedded in the query string via string
  formatting (f-strings, % operator, .format()) rather than being passed as separate
  arguments to execute(). The async nature does not reduce the injection risk.

  asyncpg's execute(), fetch(), fetchrow(), fetchval(), and executemany() methods all
  support parameterized queries by passing values as positional arguments after the SQL
  string: conn.execute("SELECT * FROM users WHERE id = $1", user_id).

message: "asyncpg execute() with string-formatted SQL detected. Use parameterized queries: conn.execute(sql, param1, param2) with $1, $2 placeholders."

security_implications:
  - title: Database Records Exfiltration
    description: |
      UNION SELECT injection with asyncpg can retrieve data from any table in the
      PostgreSQL database. In async web applications handling many concurrent requests,
      a single injection vulnerability can be exploited at high concurrency.
  - title: Authentication Bypass in Async Web Apps
    description: |
      FastAPI, aiohttp, and Starlette applications using asyncpg for database access
      are vulnerable to login bypass if authentication queries are built with string
      formatting. The async nature amplifies impact through concurrent exploitation.
  - title: Concurrent Exploitation
    description: |
      Async applications handling thousands of concurrent connections allow an attacker
      to send many injection payloads simultaneously, enabling faster data extraction
      through time-based blind injection or error-based enumeration.
  - title: PostgreSQL System Function Access
    description: |
      As with psycopg2, successful SQL injection via asyncpg can access PostgreSQL system
      functions including pg_read_file() and COPY TO/FROM PROGRAM on superuser accounts,
      potentially escalating to OS command execution.

secure_example: |
  import asyncpg

  # INSECURE: String formatting in SQL
  # await conn.execute(f"SELECT * FROM users WHERE email = '{email}'")
  # await conn.fetch("SELECT * FROM orders WHERE id = " + str(order_id))

  # SECURE: Parameterized queries with $1, $2 placeholders
  async def get_user_by_email(conn: asyncpg.Connection, email: str) -> dict:
      row = await conn.fetchrow(
          "SELECT id, username, email FROM users WHERE email = $1",
          email
      )
      return dict(row) if row else {}

  async def search_products(conn: asyncpg.Connection,
                            category: str, min_price: float) -> list:
      rows = await conn.fetch(
          "SELECT id, name, price FROM products "
          "WHERE category = $1 AND price >= $2 ORDER BY price",
          category, min_price
      )
      return [dict(row) for row in rows]

  # SECURE: Use a connection pool in async applications
  async def get_user_orders(pool: asyncpg.Pool, user_id: int) -> list:
      async with pool.acquire() as conn:
          rows = await conn.fetch(
              "SELECT id, total, status FROM orders WHERE user_id = $1",
              user_id
          )
          return [dict(row) for row in rows]

recommendations:
  - Always use asyncpg's parameterized query syntax with $1, $2, ... placeholders and pass values as positional arguments after the SQL string.
  - Never construct SQL strings with f-strings, % operator, or .format() when user-supplied values are involved.
  - Use asyncpg.Pool for connection pooling in high-concurrency async applications to efficiently manage database connections.
  - Validate and type-check user inputs before using them as SQL parameters as an additional layer of defense.
  - Grant the PostgreSQL database user the minimum required privileges appropriate for the application's data access needs.

detection_scope: |
  This rule performs taint analysis tracing user-controlled data through string formatting
  operations to asyncpg connection.execute(), connection.fetch(), connection.fetchrow(),
  connection.fetchval(), and connection.executemany() call sites. The first argument
  (SQL string) is the sink.

