# Rule Identity
id: PYTHON-LANG-SEC-081
name: asyncpg SQL Injection via String Formatting
short_description: SQL query built with string formatting passed to asyncpg connection.execute() enables SQL injection. Use parameterized queries with $1, $2 placeholders.

# Classification
severity: CRITICAL
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-081

# Vulnerability Details
cwe:
