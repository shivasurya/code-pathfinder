# Rule Identity
id: PYTHON-LANG-SEC-104
name: logging.config.listen() Eval Risk
short_description: Detects logging.config.listen() which opens a socket that accepts and executes arbitrary logging configuration, enabling remote code execution.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-104

# Vulnerability Details
cwe:
  - id: CWE-95
    name: "Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
    url: https://cwe.mitre.org/data/definitions/95.html

owasp:
  - id: A03:2021
    name: Injection
    url: https://owasp.org/Top10/A03_2021-Injection/

tags:
  - python
