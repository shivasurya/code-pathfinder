# Rule Identity
id: PYTHON-LANG-SEC-063
name: FTP Without TLS (ftplib.FTP)
short_description: ftplib.FTP() transmits data and credentials in plaintext. Use ftplib.FTP_TLS() or SFTP (via paramiko) for secure file transfer.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-063

# Vulnerability Details
cwe:
