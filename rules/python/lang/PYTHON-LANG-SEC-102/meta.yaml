# Rule Identity
id: PYTHON-LANG-SEC-102
name: Hardcoded Password in Default Function Argument
short_description: A function defines a default argument whose name suggests a password or secret but whose value is a hardcoded string literal.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-102

# Vulnerability Details
cwe:
  - id: CWE-259
    name: "Use of Hard-coded Password"
    url: https://cwe.mitre.org/data/definitions/259.html

owasp:
  - id: A07:2021
