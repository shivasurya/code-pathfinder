id: PYTHON-LANG-SEC-102
name: Hardcoded Password in Default Argument
short_description: Hardcoded password detected in function default argument. Use environment variables
  or secrets manager.
severity: HIGH
category: lang
language: python
ruleset: python/PYTHON-LANG-SEC-102
cwe:
- id: CWE-259
  name: Use of Hard-coded Password
  url: https://cwe.mitre.org/data/definitions/259.html
tags:
- python
- hardcoded-password
- credentials
- cwe-259
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This module covers a range of security concerns that span multiple vulnerability

  categories. These include predictable UUID generation that leaks host information,

  overly permissive file permissions that expose sensitive files, hardcoded

  credentials in source code, regular expression patterns susceptible to

  denial-of-service through catastrophic backtracking, unsafe logging configuration

  listeners that evaluate arbitrary code, and logging statements that may

  inadvertently record sensitive credentials.'
message: Hardcoded password detected in function default argument. Use environment variables or secrets
  manager.
secure_example: "import uuid, os, re\n# Use uuid4 for cryptographically random UUIDs\nsession_id = str(uuid.uuid4())\n\
  # Restrictive file permissions (owner read/write only)\nos.chmod(\"/app/config.ini\", 0o600)\n# Load\
  \ passwords from environment or secrets manager\ndef connect_db(host, password=None):\n    password\
  \ = password or os.environ[\"DB_PASSWORD\"]\n# Use atomic groups or possessive quantifiers to prevent\
  \ backtracking\npattern = re.compile(r\"a+$\")  # Simplified non-vulnerable pattern\n# Never log credentials\n\
  logging.info(f\"User {user} logged in successfully\")"
