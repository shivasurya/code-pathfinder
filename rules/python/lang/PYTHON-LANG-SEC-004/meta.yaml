id: PYTHON-LANG-SEC-004
name: Dangerous globals() Usage
short_description: globals() passed to a function. This may allow arbitrary attribute access.
severity: MEDIUM
category: lang
language: python
ruleset: python/PYTHON-LANG-SEC-004
cwe:
- id: CWE-96
  name: Improper Neutralization of Directives in Statically Saved Code
  url: https://cwe.mitre.org/data/definitions/96.html
tags:
- python
- globals
- code-injection
- cwe-96
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Python provides several built-in functions and modules that evaluate or execute

  arbitrary code at runtime, including eval(), exec(), code.InteractiveConsole, and

  dynamic imports via __import__() or importlib.import_module(). When these functions

  receive untrusted input, attackers can achieve full remote code execution (RCE) on

  the host system.'
message: globals() passed to a function. This may allow arbitrary attribute access.
secure_example: "# Use ast.literal_eval for safe literal parsing\nimport ast\nresult = ast.literal_eval(user_expr)\n\
  \n# Whitelist allowed modules for dynamic imports\nALLOWED_MODULES = {\"json\", \"math\", \"datetime\"\
  }\nif module_name in ALLOWED_MODULES:\n    mod = __import__(module_name)"
