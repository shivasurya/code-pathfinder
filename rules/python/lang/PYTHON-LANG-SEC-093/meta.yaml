# Rule Identity
id: PYTHON-LANG-SEC-093
name: Mako Template Usage Detected
short_description: Mako templates execute Python expressions without sandboxing. Ensure templates are from trusted sources and user input is not rendered as template code.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-093

# Vulnerability Details
cwe:
