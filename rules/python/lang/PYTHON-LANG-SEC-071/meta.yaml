# Rule Identity
id: PYTHON-LANG-SEC-071
name: Paramiko Implicit Host Key Trust (AutoAddPolicy)
short_description: paramiko.AutoAddPolicy() and WarningPolicy() automatically accept unknown SSH host keys, enabling man-in-the-middle attacks on SSH connections.

# Classification
severity: HIGH
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-071

# Vulnerability Details
cwe:
  - id: CWE-295
    name: Improper Certificate Validation
    url: https://cwe.mitre.org/data/definitions/295.html

owasp:
  - id: A02:2021
    name: Cryptographic Failures
    url: https://owasp.org/Top10/A02_2021-Cryptographic_Failures/

tags:
  - python
  - paramiko
