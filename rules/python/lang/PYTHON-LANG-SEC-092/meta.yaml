id: PYTHON-LANG-SEC-092
name: Insecure xmlrpc Usage
short_description: xmlrpc is vulnerable to XXE. Use defusedxml.xmlrpc instead.
severity: MEDIUM
category: lang
language: python
ruleset: python/PYTHON-LANG-SEC-092
cwe:
- id: CWE-611
  name: Improper Restriction of XML External Entity Reference
  url: https://cwe.mitre.org/data/definitions/611.html
tags:
- python
- xmlrpc
- xxe
- cwe-611
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Python''s standard library XML parsers (xml.etree.ElementTree, xml.dom.minidom,

  xml.sax, xml.dom.pulldom) are vulnerable to XML External Entity (XXE) attacks by

  default. XXE allows attackers to read local files, perform server-side request

  forgery (SSRF), and in some configurations achieve remote code execution through

  crafted XML documents. The xmlrpc module is similarly vulnerable. Mako templates

  execute embedded Python expressions without sandboxing, enabling server-side

  template injection (SSTI). CSV writers that do not sanitize cell values may allow

  formula injection in spreadsheet applications.'
message: xmlrpc is vulnerable to XXE. Use defusedxml.xmlrpc instead.
secure_example: "# Use defusedxml for safe XML parsing\nimport defusedxml.ElementTree as ET\ntree = ET.parse(user_uploaded_xml)\
  \  # XXE protection enabled\nimport defusedxml.minidom\ndoc = defusedxml.minidom.parseString(user_xml_string)\n\
  # Restrict Mako templates to trusted sources only\nfrom mako.template import Template\nt = Template(filename=\"\
  /app/templates/report.html\")  # Trusted file, not user input\n# Sanitize CSV cell values to prevent\
  \ formula injection\ndef sanitize_csv_value(value):\n    if isinstance(value, str) and value and value[0]\
  \ in \"=+-@\":\n        return \"'\" + value  # Prefix with single quote\n    return value"
