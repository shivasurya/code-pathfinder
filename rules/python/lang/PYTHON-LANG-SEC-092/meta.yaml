# Rule Identity
id: PYTHON-LANG-SEC-092
name: Insecure xmlrpc Usage (XXE Risk)
short_description: xmlrpc.client.ServerProxy and xmlrpc.server modules are vulnerable to XXE attacks via malicious XML-RPC payloads. Use defusedxml.xmlrpc for protection.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-092

# Vulnerability Details
cwe:
  - id: CWE-611
    name: Improper Restriction of XML External Entity Reference
    url: https://cwe.mitre.org/data/definitions/611.html

owasp:
  - id: A05:2021
    name: Security Misconfiguration
    url: https://owasp.org/Top10/A05_2021-Security_Misconfiguration/

