# Rule Identity
id: PYTHON-LANG-SEC-045
name: shelve Module Usage Detected
short_description: shelve.open() uses pickle internally for value serialization and is not safe for storing or retrieving data from untrusted sources.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-045

# Vulnerability Details
cwe:
