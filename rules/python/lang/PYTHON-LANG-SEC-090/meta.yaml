# Rule Identity
id: PYTHON-LANG-SEC-090
name: Insecure XML Parsing (XXE Vulnerability)
short_description: xml.etree.ElementTree is vulnerable to XML External Entity (XXE) attacks. Use defusedxml for safe XML parsing.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-090

# Vulnerability Details
cwe:
