# Rule Identity
id: PYTHON-LANG-SEC-032
name: Insecure Hash via hashlib.new()
short_description: hashlib.new() with an insecure algorithm name (MD5, SHA1, SHA-224) creates a cryptographically weak hash. Use SHA-256 or SHA-3.

# Classification
severity: MEDIUM
category: lang
language: python
ruleset: python/lang/PYTHON-LANG-SEC-032

