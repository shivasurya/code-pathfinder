# Rule Identity
id: PYTHON-LAMBDA-SEC-013
name: Lambda SQL Injection via PyMySQL cursor.execute()
short_description: Lambda event data flows to PyMySQL cursor.execute() without parameterization, enabling SQL injection against RDS MySQL or Aurora MySQL backends via the pure-Python driver.

# Classification
severity: CRITICAL
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-013

