# Rule Identity
id: PYTHON-LAMBDA-SEC-014
name: Lambda SQL Injection via SQLAlchemy execute()
short_description: Lambda event data flows to SQLAlchemy session.execute() or connection.execute() without bound parameters, enabling SQL injection against any RDS backend.

