# Rule Identity
id: PYTHON-LAMBDA-SEC-005
name: Lambda Command Injection via asyncio.create_subprocess_exec()
short_description: Lambda event data flows to asyncio.create_subprocess_exec(), enabling argument injection in async Lambda handlers.

# Classification
severity: CRITICAL
category: aws_lambda
