# Rule Identity
id: PYTHON-LAMBDA-SEC-001
name: Lambda Command Injection via os.system()
short_description: Lambda event data flows to os.system(), enabling arbitrary OS command execution inside the Lambda execution environment.

# Classification
severity: CRITICAL
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-001

