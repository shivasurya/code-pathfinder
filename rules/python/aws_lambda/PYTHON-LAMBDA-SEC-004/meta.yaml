# Rule Identity
id: PYTHON-LAMBDA-SEC-004
name: Lambda Command Injection via asyncio.create_subprocess_shell()
short_description: Lambda event data flows to asyncio.create_subprocess_shell(), enabling OS command injection in async Lambda handlers.

# Classification
