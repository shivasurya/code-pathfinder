# Rule Identity
id: PYTHON-LAMBDA-SEC-012
name: Lambda SQL Injection via pymssql cursor.execute()
short_description: Lambda event data flows to pymssql cursor.execute() without parameterization, enabling SQL injection against RDS SQL Server backends.

