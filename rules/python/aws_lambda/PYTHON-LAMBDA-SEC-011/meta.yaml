# Rule Identity
id: PYTHON-LAMBDA-SEC-011
name: Lambda SQL Injection via psycopg2 cursor.execute()
short_description: Lambda event data flows to psycopg2 cursor.execute() without parameterization, enabling SQL injection against RDS PostgreSQL or Aurora PostgreSQL backends.

# Classification
