# FAQ
faq:
  - question: How does SEC-021 differ from SEC-020 for detecting XSS in Lambda functions?
    answer: |
      SEC-020 flags the case where event data flows directly from the Lambda event to the
      HTML response body. SEC-021 flags the intermediate step: when event data is used to
      build an HTML string variable (via f-strings or concatenation), and that tainted
      HTML string variable is then returned in the response body. SEC-021 catches the
      common pattern where HTML is assembled in helper functions or template utilities
      before being returned to the handler.

  - question: If I escape event data in a helper function, is the returned HTML string safe?
    answer: |
      Yes, if html.escape() is applied to every piece of event data before it is embedded
      in the HTML string within the helper, the returned string is safe to include in an
      HTML response. The key is that escaping must occur at the string construction site,
      not at the response return site. Escaping the entire assembled HTML string after
      construction does not work because it would escape the legitimate HTML tags.

  - question: Does Jinja2 autoescaping protect against this class of XSS in Lambda?
    answer: |
      Yes, if Jinja2 is configured with autoescape=True (or using select_autoescape())
      and variables are rendered with {{ variable }} syntax (not {{ variable | safe }}),
      Jinja2 escapes all variable values automatically when rendering templates. This
      prevents XSS from event data embedded in Jinja2 templates and is the recommended
      pattern for HTML generation in Lambda functions.

  - question: What about Lambda functions that generate HTML for SES email delivery?
    answer: |
      SES HTML emails are rendered by email clients, and unescaped HTML in email templates
      can enable XSS in email clients that render HTML. Apply the same html.escape() rule
      to all event data embedded in HTML email templates. Some email clients apply their
      own sanitization, but this varies by client and version. Do not rely on client-side
      sanitization.

  - question: Can this rule detect XSS when the HTML is stored in DynamoDB and retrieved later?
    answer: |
      The rule primarily tracks taint from the current Lambda invocation's event dictionary.
      For stored XSS where the payload was written to DynamoDB by a previous invocation,
      the taint originates from the DynamoDB read operation in the current invocation rather
      than the event. Comprehensive stored XSS detection requires taint tracking from
      database read operations, which is a separate analysis scope from event-based taint.

