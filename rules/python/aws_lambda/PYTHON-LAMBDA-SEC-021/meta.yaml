id: PYTHON-LAMBDA-SEC-021
name: Lambda Tainted HTML String
short_description: Lambda event data in HTML string construction. Use html.escape().
severity: MEDIUM
category: aws_lambda
language: python
ruleset: python/PYTHON-LAMBDA-SEC-021
cwe:
- id: CWE-79
  name: Improper Neutralization of Input During Web Page Generation
  url: https://cwe.mitre.org/data/definitions/79.html
tags:
- python
- aws
- lambda
- xss
- html-string
- OWASP-A03
- CWE-79
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'These rules detect Cross-Site Scripting (XSS), code injection, and unsafe deserialization

  vulnerabilities in AWS Lambda functions. When Lambda functions serve as API Gateway backends

  or process untrusted event data, these vulnerabilities can lead to client-side attacks,

  remote code execution, and full server-side compromise.'
message: Lambda event data in HTML string construction. Use html.escape().
secure_example: "import json\nimport html\nimport ast\n\ndef lambda_handler(event, context):\n    # SECURE:\
  \ HTML-escape user input before embedding in response\n    name = html.escape(event.get('name', ''))\n\
  \    body = f'<html><body><h1>Hello, {name}!</h1></body></html>'\n    return {\n        'statusCode':\
  \ 200,\n        'headers': {'Content-Type': 'text/html'},\n        'body': body\n    }\n\ndef process_handler(event,\
  \ context):\n    # SECURE: Use ast.literal_eval() for safe expression parsing\n    expression = event.get('calc',\
  \ '')\n    try:\n        result = ast.literal_eval(expression)  # Only parses literals\n    except (ValueError,\
  \ SyntaxError):\n        return {'statusCode': 400, 'body': 'Invalid expression'}\n\n    # SECURE: Use\
  \ JSON instead of pickle for deserialization\n    data = event.get('data', '{}')\n    try:\n       \
  \ obj = json.loads(data)  # Safe - no code execution\n    except json.JSONDecodeError:\n        return\
  \ {'statusCode': 400, 'body': 'Invalid JSON'}\n\n    # SECURE: Use allowlist for operations instead\
  \ of eval/exec\n    ALLOWED_OPS = {'add': lambda a, b: a + b, 'sub': lambda a, b: a - b}\n    op = event.get('operation',\
  \ '')\n    if op not in ALLOWED_OPS:\n        return {'statusCode': 400, 'body': 'Invalid operation'}\n\
  \n    return {'statusCode': 200, 'body': json.dumps({'result': str(result)})}"
