# Content
description: |
  This rule detects Cross-Site Scripting (XSS) vulnerabilities in AWS Lambda functions
  where untrusted event data is used to construct an HTML string via f-string interpolation
  or string concatenation, and the resulting tainted HTML string is subsequently returned
  as part of an API Gateway response.

  This rule differs from SEC-020 by focusing on the intermediate HTML string construction
  step rather than the direct response return. It catches the common Lambda pattern where
  HTML fragments are built in helper functions (e.g., render_user_card(), format_error_page())
  that combine event data with HTML templates, and the assembled string is returned from
  the helper and passed to the Lambda return value.

  Lambda functions triggered by API Gateway receive attacker-controllable event data
  in query parameters, path parameters, request bodies, and headers. Without a template
  engine that escapes variables by default, every f-string interpolation of event data
  into an HTML string is a potential XSS vector. The multi-step construction pattern
  (event data -> HTML fragment -> assembled page -> response body) makes these
  vulnerabilities easier to miss in code review.

message: "Lambda event data is used in HTML string construction without html.escape(). Escape all event data with html.escape() before embedding in HTML strings."

security_implications:
  - title: Reflected XSS via HTML Helper Function Output
    description: |
      HTML construction helpers that accept event data as parameters and return HTML
      strings without escaping embed the XSS vulnerability in a utility layer rather
      than the handler. This makes the vulnerability harder to find in code review
      and allows it to be reused across multiple Lambda handlers that call the helper.
  - title: Stored XSS via Database-Backed HTML Generation
    description: |
      Lambda functions that retrieve user-supplied data from DynamoDB or RDS and embed
      it in HTML strings without escaping enable stored XSS. An attacker stores a
      payload via one Lambda, and a victim retrieves it via another Lambda that renders
      it in HTML. The taint originates from the database read, not the current event.
  - title: Email Template Injection via HTML Strings
    description: |
      Lambda functions that generate HTML email templates (for SES or SNS email
      delivery) by embedding event data in HTML strings without escaping can deliver
      XSS payloads to email clients that render HTML. This is particularly dangerous
      because the malicious email appears to come from a trusted application domain.
  - title: Content Injection in API Error Pages
    description: |
      Error handling code that generates HTML error pages from exception messages or
      request data (e.g., "Error processing request: {event['body']}") is a common
      source of XSS via HTML string construction. Error pages rendered with unescaped
      event data are a frequent injection point.

secure_example: |
  import html
  import json

  def render_user_profile(username, bio, email):
      # SECURE: html.escape() applied to each value before embedding in HTML
      safe_username = html.escape(username)
      safe_bio = html.escape(bio)
      safe_email = html.escape(email)
      return f'''
      <div class="profile">
        <h2>{safe_username}</h2>
        <p>{safe_bio}</p>
        <a href="mailto:{safe_email}">{safe_email}</a>
      </div>'''

  def lambda_handler(event, context):
      params = event.get('queryStringParameters', {}) or {}
      username = params.get('username', '')
      bio = params.get('bio', '')
      email = params.get('email', '')

      # SECURE: HTML is built with escaped values in the helper function
      profile_html = render_user_profile(username, bio, email)
      full_page = f'<!DOCTYPE html><html><body>{profile_html}</body></html>'
      return {
          'statusCode': 200,
          'headers': {
              'Content-Type': 'text/html; charset=utf-8',
              'Content-Security-Policy': "default-src 'self'"
          },
          'body': full_page
      }

recommendations:
  - Apply html.escape() to every event data value at the point where it is first embedded in an HTML string, within the helper function or the handler, before any concatenation.
  - Audit all HTML construction helpers (render_*, format_*, generate_*) to ensure they apply html.escape() to all externally-sourced parameters.
  - Use a template engine (Jinja2 with autoescape=True) for HTML generation in Lambda layers to avoid manual escaping discipline.
  - Return JSON responses instead of HTML wherever possible; render HTML client-side with a framework that escapes content automatically.
  - Add Content-Security-Policy headers to all HTML responses as defense-in-depth against any escaping oversights.

detection_scope: |
  This rule performs inter-procedural taint analysis with global scope. Sources are
  Lambda event dictionary access calls: calls("event.get"), calls("event.__getitem__"),
  including event.get("body"), event.get("queryStringParameters"),
  event.get("pathParameters"), and event["headers"]. The rule tracks taint through
  f-string interpolation and string concatenation operations that produce HTML strings.
  The sink is any tainted HTML string variable that flows into the Lambda return value's
  'body' key (tracked via .tracks(0)). Sanitizers include html.escape() applied to
  individual values before embedding. The analysis follows taint through function return
  values, variable assignments, and module boundaries.

