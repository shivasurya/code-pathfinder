# Rule Identity
id: PYTHON-LAMBDA-SEC-021
name: Lambda XSS via Tainted HTML String Construction
short_description: Lambda event data is used in HTML string construction via f-strings or concatenation before being returned to API Gateway, enabling Cross-Site Scripting.

# Classification
severity: HIGH
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-021

# Vulnerability Details
cwe:
