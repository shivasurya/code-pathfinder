# Rule Identity
id: PYTHON-LAMBDA-SEC-002
name: Lambda Command Injection via subprocess
short_description: Lambda event data flows to subprocess with shell=True or as a string command, enabling OS command injection in the Lambda execution environment.

# Classification
severity: CRITICAL
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-002

