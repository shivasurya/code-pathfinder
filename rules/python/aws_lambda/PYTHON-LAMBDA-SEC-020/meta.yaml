# Rule Identity
id: PYTHON-LAMBDA-SEC-020
name: Lambda XSS via Tainted HTML Response Body
short_description: Lambda event data is embedded directly in an HTML response body returned to API Gateway, enabling Cross-Site Scripting attacks against end users.

# Classification
severity: HIGH
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-020

