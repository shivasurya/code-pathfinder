# Rule Identity
id: PYTHON-LAMBDA-SEC-010
name: Lambda SQL Injection via MySQL cursor.execute()
short_description: Lambda event data flows to MySQL cursor.execute() without parameterization, enabling SQL injection against RDS MySQL or Aurora MySQL backends.

# Classification
