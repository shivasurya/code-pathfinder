# Content
description: |
  This rule detects SQL injection vulnerabilities in AWS Lambda functions where
  untrusted event data flows into MySQL cursor.execute() calls without proper
  parameterization, enabling SQL injection against RDS MySQL, Aurora MySQL, or
  any MySQL-compatible backend.

  Lambda functions commonly connect to RDS MySQL or Aurora MySQL for CRUD operations
  triggered by API Gateway, SQS, SNS, or S3 events. The event dictionary fields
  (event.get("body"), event.get("queryStringParameters"), event["Records"]) are
  attacker-controllable in public-facing deployments. Unlike web frameworks that
  provide ORM layers, Lambda handlers often use raw MySQL client connections
  (mysql-connector-python, mysqlclient) where parameterization is the developer's
  explicit responsibility.

  When event data is concatenated or f-stringed into the SQL query string before
  being passed as the first argument to cursor.execute(), an attacker can inject
  arbitrary SQL: reading all database records, modifying or deleting data, bypassing
  authentication conditions, or escalating to file system access via MySQL's
  LOAD DATA INFILE and INTO OUTFILE on misconfigured RDS instances.

  The short-lived Lambda execution model does not limit the impact: a single injected
  UNION SELECT can exfiltrate an entire table in one invocation, and stacked queries
  (where supported) can alter data across the database.

message: "Lambda event data flows to MySQL cursor.execute() without parameterization. Pass user input as the second argument (parameters tuple), never in the SQL string."

security_implications:
  - title: Full Database Exfiltration via UNION SELECT
    description: |
      An attacker who controls the WHERE clause or any other SQL fragment can use
      UNION SELECT to read from any table in the RDS database, including user
      credentials, session tokens, financial records, and other sensitive data
      stored alongside the Lambda's application tables.
  - title: Authentication Bypass for Downstream Services
    description: |
      Lambda functions that query user records for downstream authentication (e.g.,
      checking API key validity, session token lookup) can be bypassed with ' OR
      '1'='1 payloads that cause the query to return all rows, granting the attacker
      the identity of any user in the system.
  - title: Data Manipulation via INSERT/UPDATE/DELETE
    description: |
      On MySQL configurations that support stacked queries or where the Lambda's
      database user has write permissions, an attacker can inject INSERT, UPDATE,
      or DELETE statements through cursor.execute(), modifying financial records,
      creating backdoor accounts, or corrupting application data.
  - title: Cascading Blast Radius via IAM and RDS
    description: |
      Lambda functions typically use a single database user with broad permissions
      for simplicity. SQL injection through the Lambda can affect all tables
      accessible to that user, and if the RDS instance is shared across Lambda
      functions or services, the blast radius extends to all data in the instance.

secure_example: |
  import json
  import mysql.connector

  def get_db_connection():
      return mysql.connector.connect(
          host='rds-host.cluster.us-east-1.rds.amazonaws.com',
          user='lambda_user',
          password='password',
          database='appdb'
      )

  def lambda_handler(event, context):
      body = json.loads(event.get('body', '{}'))
      user_id = body.get('user_id', '')

      # SECURE: Validate type before query
      try:
          user_id = int(user_id)
      except (ValueError, TypeError):
          return {'statusCode': 400, 'body': 'Invalid user ID'}

      conn = get_db_connection()
      cursor = conn.cursor()

      # SECURE: Pass user_id as a parameter tuple, never in the SQL string
      cursor.execute(
          "SELECT id, username, email FROM users WHERE id = %s",
          (user_id,)
      )
      row = cursor.fetchone()
      cursor.close()
      conn.close()
      return {'statusCode': 200, 'body': json.dumps(row)}

recommendations:
  - Always pass Lambda event data as the second argument to cursor.execute() as a tuple or list, never by concatenating it into the SQL string.
  - Validate and type-convert event fields before use (e.g., int() for numeric IDs) to eliminate injection risk for typed parameters.
  - Grant the Lambda's RDS database user the minimum necessary permissions (SELECT only for read operations, specific tables only) to limit blast radius.
  - Use AWS Secrets Manager to store and rotate RDS credentials rather than hardcoding them in environment variables.
  - Enable RDS Performance Insights and CloudWatch query logging to detect unusual query patterns that may indicate active exploitation.

detection_scope: |
  This rule performs inter-procedural taint analysis with global scope. Sources are
  Lambda event dictionary access calls: calls("event.get"), calls("event.__getitem__"),
  including event.get("body"), event.get("queryStringParameters"),
  event.get("pathParameters"), and event["Records"]. The sink is calls("*.execute")
  matching MySQL cursor objects (mysql.connector, mysqlclient) with the tainted SQL
  string tracked via .tracks(0) (the query string argument, not the parameters tuple).
  Sanitizers include explicit int() or float() type conversion. The analysis follows
  taint through string concatenation, f-string interpolation, variable assignments,
  and function boundaries.

