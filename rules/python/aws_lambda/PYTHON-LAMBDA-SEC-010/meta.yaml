# FAQ
faq:
  - question: How does Lambda SQL injection differ from traditional web application SQL injection?
    answer: |
      The injection mechanism is identical: untrusted input in the SQL string argument.
      The Lambda-specific difference is the attack surface: Lambda functions receive
      input from many AWS event sources (API Gateway, SQS, SNS, S3, DynamoDB Streams)
      and there is no framework ORM layer to encourage parameterized queries by default.
      Developers writing raw SQL in Lambda handlers must apply parameterization explicitly.
      The blast radius is also different: the same Lambda execution role may grant access
      to RDS and other AWS services, so a compromise can extend beyond the database.

  - question: Is it safe to use f-strings in SQL queries if the event data is validated first?
    answer: |
      No. Validation reduces but does not eliminate risk, and the appropriate fix is
      parameterization, not validation. The only safe pattern is to pass event data
      as the second argument to cursor.execute() as a tuple, regardless of whether
      the data has been validated. The database driver handles escaping correctly only
      when data is passed through the parameters mechanism.

  - question: What MySQL user permissions should a Lambda function's database user have?
    answer: |
      Apply least-privilege: grant only SELECT for read-only Lambda functions, and
      only SELECT/INSERT/UPDATE on specific tables for write operations. Never grant
      LOAD DATA, FILE, SUPER, or PROCESS privileges to application database users.
      Use a separate database user per Lambda function or function group, and store
      credentials in AWS Secrets Manager with automatic rotation.

  - question: Can this rule detect SQL injection across multiple Lambda helper modules?
    answer: |
      Yes. The rule performs inter-procedural analysis and follows taint from the
      event dictionary through utility functions, database helper modules, and return
      values across file boundaries. If event data flows through a get_user_id()
      helper into a build_query() function and then to cursor.execute(), the finding
      is still reported.

  - question: How should I connect to RDS from Lambda securely?
    answer: |
      Use AWS Secrets Manager to store RDS credentials and retrieve them at cold start
      with caching. Use RDS IAM authentication for Lambda functions where supported
      (MySQL with IAM database authentication enabled). Connect via a VPC with security
      groups that restrict the RDS port to only Lambda's security group. Use connection
      pooling libraries or RDS Proxy to manage connection limits given Lambda's
      per-invocation connection model.

