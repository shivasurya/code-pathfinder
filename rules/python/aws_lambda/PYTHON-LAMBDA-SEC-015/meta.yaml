# Rule Identity
id: PYTHON-LAMBDA-SEC-015
name: Lambda Tainted SQL String Construction
short_description: Lambda event data is used in SQL string construction via f-strings or concatenation before being passed to a database execute call, enabling SQL injection.

# Classification
severity: HIGH
category: aws_lambda
language: python
