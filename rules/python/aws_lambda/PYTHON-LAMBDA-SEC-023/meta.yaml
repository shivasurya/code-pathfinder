# Rule Identity
id: PYTHON-LAMBDA-SEC-023
name: Lambda Remote Code Execution via Pickle Deserialization
short_description: Lambda event data flows to pickle.loads() or pickle.load(), enabling arbitrary Python code execution during deserialization of attacker-controlled bytes.

# Classification
