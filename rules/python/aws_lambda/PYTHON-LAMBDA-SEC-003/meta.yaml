# Rule Identity
id: PYTHON-LAMBDA-SEC-003
name: Lambda Command Injection via os.spawn*()
short_description: Lambda event data flows to os.spawn*() functions, enabling process execution with attacker-controlled arguments in the Lambda execution environment.

# Classification
