# Rule Identity
id: PYTHON-LAMBDA-SEC-016
name: Lambda DynamoDB FilterExpression Injection
short_description: Lambda event data flows to a DynamoDB FilterExpression string, enabling expression manipulation in serverless DynamoDB scan and query operations.

# Classification
severity: HIGH
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-016

