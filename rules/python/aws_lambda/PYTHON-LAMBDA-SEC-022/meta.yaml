# Rule Identity
id: PYTHON-LAMBDA-SEC-022
name: Lambda Code Injection via eval() or exec()
short_description: Lambda event data flows to eval() or exec(), enabling arbitrary Python code execution with the full permissions of the Lambda execution environment.

# Classification
severity: CRITICAL
category: aws_lambda
language: python
ruleset: python/aws_lambda/PYTHON-LAMBDA-SEC-022

