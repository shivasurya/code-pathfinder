# Rule Identity
id: PYTHON-LAMBDA-SEC-006
name: Lambda Command Injection via loop.subprocess_exec()
short_description: Lambda event data flows to loop.subprocess_exec(), enabling argument injection through the asyncio event loop in Lambda handlers.

