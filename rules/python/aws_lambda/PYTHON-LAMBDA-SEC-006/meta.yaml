# FAQ
faq:
  - question: What is the difference between loop.subprocess_exec() and asyncio.create_subprocess_exec()?
    answer: |
      asyncio.create_subprocess_exec() is a high-level coroutine that internally calls
      loop.subprocess_exec() to create the subprocess transport. loop.subprocess_exec()
      is the low-level event loop method that requires a protocol factory and returns
      a (transport, protocol) tuple. Both do not invoke a shell, making them safer than
      their _shell counterparts. However, both are vulnerable to argument injection when
      event data reaches argument positions without validation.

  - question: Why would a Lambda function use loop.subprocess_exec() instead of the higher-level API?
    answer: |
      Developers use loop.subprocess_exec() directly when they need custom protocol
      implementations for stdin/stdout handling, or for advanced streaming use cases
      where the default Process API is insufficient. Some older Lambda code may also
      use this API before asyncio.create_subprocess_exec() was available. In most
      cases, the higher-level API is preferable.

  - question: How do I get the current event loop in a Lambda handler?
    answer: |
      In modern Python (3.10+), the preferred pattern is asyncio.get_event_loop() inside
      an async function. For subprocess operations, prefer asyncio.create_subprocess_exec()
      which handles the event loop internally. Avoid storing and reusing event loop
      references across Lambda invocations, as the execution environment may be reused
      with a different event loop state.

  - question: Can this rule detect injection when the loop is obtained via asyncio.get_running_loop()?
    answer: |
      Yes. The rule tracks taint to the subprocess_exec call regardless of how the loop
      object is obtained. Whether the loop is obtained via asyncio.get_event_loop(),
      asyncio.get_running_loop(), or stored in a variable, the taint tracking follows
      the event data to the subprocess_exec call site.

  - question: What AWS services are most at risk from Lambda command injection?
    answer: |
      The immediate risk is credential exfiltration: the execution role's IAM permissions
      determine what AWS APIs can be called with the stolen credentials. Lambda functions
      commonly have access to S3 (read/write), DynamoDB, SQS, SNS, Secrets Manager,
      and RDS. Functions inside a VPC can also reach private endpoints. Apply least-
      privilege IAM to limit the blast radius to only the specific resources the function
      requires.

