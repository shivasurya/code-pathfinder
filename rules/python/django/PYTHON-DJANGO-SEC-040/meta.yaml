status: disabled  # Sandbox detection not working - disabled until rule query is fixed
name: Django Path Traversal via open()
short_description: User input flows to open(), enabling path traversal attacks to read or write arbitrary files on the server.

# Classification
severity: HIGH
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-040

# Vulnerability Details
cwe:
