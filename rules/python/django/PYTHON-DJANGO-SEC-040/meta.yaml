# FAQ
faq:
  - question: Is os.path.basename() alone sufficient to prevent path traversal?
    answer: |
      os.path.basename() removes all directory components from a path, which prevents
      traversal sequences from being effective. However, it should be combined with
      os.path.realpath() verification when constructing the final path, because
      symbolic links can still escape the intended directory even with basename applied.
      The combination of basename + join + realpath + startswith check is the
      recommended pattern.

  - question: Can URL encoding (%2F, %2E%2E) bypass basename() protection?
    answer: |
      No. Django automatically URL-decodes request parameters before they reach view
      functions, so %2F becomes / before basename() sees it. basename() then strips
      the directory components. The combination is effective for URL-encoded traversal
      sequences. Null byte injection (%00) in filenames is also handled by the OS on
      modern Python versions.

  - question: Does Django's built-in file serving protect against this?
    answer: |
      Django's built-in serve() view (for development) and Django's file storage
      system use safe path handling. The vulnerability arises when developers write
      custom file serving endpoints that use open() directly with user-controlled
      filenames. Use Django's storage API and FileResponse for file serving instead.

  - question: What about files served from Django's MEDIA_ROOT?
    answer: |
      Files in MEDIA_ROOT are user-uploaded files. When serving them, Django's
      FileSystemStorage.url() generates safe URLs. The problem arises when code
      manually constructs file paths from MEDIA_ROOT plus user input without
      validation. Always use Django's storage API (default_storage.open()) rather
      than constructing raw file paths.

  - question: Can this vulnerability affect Django management commands?
    answer: |
      Yes. Management commands that accept file path arguments from user input
      (e.g., command line arguments that originate from a web interface or API) can
      be affected. Validate file paths in management commands with the same
      realpath-based approach used in views.

  - question: How do I handle legitimate file download endpoints that serve user-uploaded files?
    answer: |
      Store uploaded files with Django's FileField using upload_to with a callable
      that generates UUID-based names, preventing user control over the actual storage
      path. When serving, look up the FileField value from the database (which stores
      a safe, validated path) and serve it directly rather than accepting filenames
      from HTTP parameters.

