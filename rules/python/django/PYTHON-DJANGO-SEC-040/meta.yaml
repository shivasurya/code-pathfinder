# Content
description: |
  This rule detects path traversal vulnerabilities in Django applications where untrusted
  user input from HTTP request parameters flows into Python's built-in open() function
  without proper path validation.

  Path traversal (also called directory traversal) occurs when user-controlled input
  containing sequences like "../" or "%2F..%2F" is used to construct file paths, allowing
  attackers to escape the intended directory and access arbitrary files on the server's
  filesystem. This can expose Django's settings.py (containing SECRET_KEY and database
  credentials), /etc/passwd, SSH keys, environment files, and any other readable file.

  In write mode (open(path, 'w')), path traversal can allow attackers to overwrite
  configuration files, web content, or system files, potentially leading to code execution
  if they can write to a location loaded by Python or the web server.

message: "User input flows to open(). Validate file paths with os.path.basename() and os.path.realpath() to prevent directory traversal."

security_implications:
  - title: Sensitive File Disclosure
    description: |
      An attacker can read any file accessible to the Django process by providing
      paths like ../../settings.py, ../../.env, or ../../../etc/passwd. Django's
      SECRET_KEY, database passwords, API keys, and SSL certificates are all
      accessible if the process user has read permission.
  - title: Source Code and Configuration Exfiltration
    description: |
      Django application source code, including view logic, model definitions,
      and business logic, can be read through path traversal. This provides
      attackers with a roadmap for further attacks by revealing additional
      vulnerabilities, hardcoded secrets, and internal API structures.
  - title: File Overwrite Leading to Code Execution
    description: |
      If open() is called in write mode (open(path, 'w') or 'a'), an attacker
      can overwrite application files. Writing to .py files in the Django app
      directory on servers with auto-reload enabled triggers code execution.
      Writing to template files enables persistent XSS or phishing content.
  - title: Arbitrary File Deletion in Delete Operations
    description: |
      Path traversal in file deletion workflows (os.remove() or os.unlink() after
      open()) allows attackers to delete critical application or system files,
      causing denial of service or disabling security controls.

secure_example: |
  from django.http import FileResponse, Http404
  import os

  UPLOAD_DIR = '/var/www/app/uploads'

  def download_file(request):
      filename = request.GET.get('file', '')
      # SECURE step 1: Strip directory components to prevent traversal sequences
      safe_name = os.path.basename(filename)
      if not safe_name:
          raise Http404("File not found")
      # SECURE step 2: Construct full path within upload directory
      full_path = os.path.join(UPLOAD_DIR, safe_name)
      # SECURE step 3: Resolve symlinks and verify path stays within UPLOAD_DIR
      real_path = os.path.realpath(full_path)
      real_upload_dir = os.path.realpath(UPLOAD_DIR)
      if not real_path.startswith(real_upload_dir + os.sep):
          raise Http404("File not found")
      # SECURE step 4: Confirm file exists
      if not os.path.isfile(real_path):
          raise Http404("File not found")
      return FileResponse(open(real_path, 'rb'))

  def read_template_fragment(request):
      # SECURE ALTERNATIVE: Use an explicit allowlist for known files
      ALLOWED_FRAGMENTS = {'header', 'footer', 'sidebar'}
      fragment = request.GET.get('fragment', '')
      if fragment not in ALLOWED_FRAGMENTS:
          raise Http404("Fragment not found")
      filepath = os.path.join('/app/templates/fragments', f'{fragment}.html')
      with open(filepath) as f:
          return f.read()

recommendations:
  - Use os.path.basename() to strip directory components from user-supplied filenames before constructing paths.
  - After joining with the base directory, resolve the full path with os.path.realpath() and verify it starts with the expected base directory followed by os.sep.
  - Prefer an explicit allowlist of permitted filenames over pattern-based path validation, as allowlists eliminate entire categories of traversal techniques.
  - Use Django's FileResponse with validated file paths and set the as_attachment=True parameter to ensure proper Content-Disposition headers.
  - Store user-uploaded files using Django's FileField and ImageField which provide safe storage with UUID-based naming rather than user-controlled paths.

detection_scope: |
  This rule performs inter-procedural taint analysis with global scope. Sources include
  calls("request.GET.get"), calls("request.POST.get"), calls("request.GET.__getitem__"),
  calls("request.POST.__getitem__"), calls("request.body"), and calls("request.read").
  The sink is the first argument (path, tracked via .tracks(0)) of calls("open").
  Sanitizers include os.path.basename() which strips directory traversal sequences,
  followed by os.path.realpath() path canonicalization when the result is verified
  against the base directory. The rule follows taint across file and module boundaries.

