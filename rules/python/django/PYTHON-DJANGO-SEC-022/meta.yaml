# Rule Identity
id: PYTHON-DJANGO-SEC-022
name: Django globals() Misuse for Arbitrary Code Execution
short_description: User input is used to index globals(), enabling arbitrary function dispatch and potential code execution.

# Classification
severity: HIGH
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-022

