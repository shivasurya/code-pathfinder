# Rule Identity
id: PYTHON-DJANGO-SEC-006
name: Django Tainted SQL String Construction
short_description: User input is used to construct a SQL string that flows to a database execution function, enabling SQL injection via string building.

# Classification
severity: HIGH
category: django
language: python
