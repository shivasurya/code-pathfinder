# Rule Identity
id: PYTHON-DJANGO-SEC-010
name: Django Command Injection via os.system()
short_description: User input flows to os.system(), enabling arbitrary OS command execution with the privileges of the Django process.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-010

