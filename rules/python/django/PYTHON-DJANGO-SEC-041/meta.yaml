# Rule Identity
id: PYTHON-DJANGO-SEC-041
name: Django Path Traversal via os.path.join()
short_description: User input flows to os.path.join() leading to file operations, enabling path traversal to access files outside the intended directory.

# Classification
severity: HIGH
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-041

# Vulnerability Details
cwe:
