author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: "These rules detect common security misconfigurations and unsafe patterns in Django\napplications.\
  \ They cover three distinct vulnerability categories:\n\n1. **Insecure Cookie Settings (CWE-614)**:\
  \ Detects set_cookie() calls that may lack the\n   secure, httponly, or samesite flags. Without these\
  \ flags, cookies can be intercepted\n   over unencrypted connections, accessed by JavaScript (enabling\
  \ XSS-based session theft),\n   or sent in cross-site requests (enabling CSRF attacks).\n\n2. **CSRF\
  \ Exempt Decorator (CWE-352)**: Detects usage of Django's @csrf_exempt decorator,\n   which disables\
  \ Cross-Site Request Forgery protection on views. This allows attackers to\n   craft malicious pages\
  \ that trigger state-changing actions on behalf of authenticated\n   users without their consent.\n\n\
  3. **Insecure Deserialization (CWE-502)**: Detects request data flowing into unsafe\n   deserialization\
  \ functions (pickle, yaml.load, dill, shelve). These functions can execute\n   arbitrary code during\
  \ deserialization, making them critical attack vectors when used with\n   untrusted input."
message: Request data flows to unsafe deserialization. Use JSON instead of pickle/yaml.
secure_example: "from django.http import HttpResponse, JsonResponse\nfrom django.middleware.csrf import\
  \ CsrfViewMiddleware\nimport json\n\ndef set_preferences(request):\n    # SECURE: Cookie set with all\
  \ security flags\n    response = HttpResponse(\"Preferences saved\")\n    response.set_cookie(\n   \
  \     'session_id',\n        request.session.session_key,\n        secure=True,      # Only sent over\
  \ HTTPS\n        httponly=True,     # Not accessible via JavaScript\n        samesite='Lax',   # Prevents\
  \ cross-site sending\n        max_age=3600,     # 1 hour expiry\n    )\n    return response\n\n# SECURE:\
  \ No @csrf_exempt - CSRF protection enabled by default\ndef transfer_funds(request):\n    if request.method\
  \ != 'POST':\n        return HttpResponse(status=405)\n    amount = request.POST.get('amount')\n   \
  \ recipient = request.POST.get('recipient')\n    perform_transfer(request.user, recipient, amount)\n\
  \    return HttpResponse(\"Transfer complete\")\n\ndef load_data(request):\n    # SECURE: Use JSON instead\
  \ of pickle for untrusted data\n    try:\n        data = json.loads(request.body)\n    except json.JSONDecodeError:\n\
  \        return JsonResponse({'error': 'Invalid JSON'}, status=400)\n    return JsonResponse({'data':\
  \ data})"
