# Rule Identity
id: PYTHON-DJANGO-SEC-072
name: Django Insecure Deserialization of Request Data
short_description: User input flows to unsafe deserialization functions (pickle, yaml.load, dill, shelve), enabling arbitrary code execution during deserialization.

# Classification
