id: PYTHON-DJANGO-SEC-072
name: Django Insecure Deserialization of Request Data
short_description: Request data flows to unsafe deserialization. Use JSON instead of pickle/yaml.
severity: CRITICAL
category: django
language: python
ruleset: python/PYTHON-DJANGO-SEC-072
