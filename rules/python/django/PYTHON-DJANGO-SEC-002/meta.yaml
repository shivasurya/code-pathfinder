# Rule Identity
id: PYTHON-DJANGO-SEC-002
name: Django SQL Injection via QuerySet.raw()
short_description: User input flows to QuerySet.raw() without parameterization, enabling SQL injection through Django's ORM raw query interface.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-002

# Vulnerability Details
cwe:
