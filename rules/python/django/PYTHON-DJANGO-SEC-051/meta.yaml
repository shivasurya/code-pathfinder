# Rule Identity
id: PYTHON-DJANGO-SEC-051
name: Django mark_safe() Usage Audit
short_description: mark_safe() bypasses Django's automatic HTML escaping. Audit all usages to confirm content is properly sanitized before being marked safe.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-051

# Vulnerability Details
cwe:
  - id: CWE-79
    name: "Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
    url: https://cwe.mitre.org/data/definitions/79.html

