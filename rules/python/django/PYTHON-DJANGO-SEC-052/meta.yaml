# Content
description: |
  This audit rule flags all usages of the @html_safe decorator from django.utils.html
  in Django applications. html_safe() adds a __html__() method to a class that returns
  the class's __str__() output, signaling to Django's template engine that instances
  of the class should not be HTML-escaped when rendered in templates.

  Any class decorated with @html_safe whose __str__() method returns content that
  includes user-controlled data without proper escaping is an XSS vulnerability. The
  vulnerability is particularly subtle because the unsafe content appears in a class
  definition rather than at the point where user input is incorporated, making it
  harder to identify during code review.

  This rule flags all @html_safe usages for manual review to verify that the __str__()
  implementation either returns only static HTML or properly escapes any dynamic content.

message: "@html_safe marks class __str__ output as safe HTML. Verify __str__() properly escapes all dynamic content before being marked safe."

security_implications:
  - title: Class-Level XSS from Unsafe __str__ Methods
    description: |
      When an @html_safe class's __str__() method incorporates user-controlled data
      (e.g., self.name where name originates from user input), rendering instances
      of that class in Django templates produces unescaped output. The XSS payload
      is embedded in the object's string representation rather than in a direct
      variable, making it less obvious during template review.
  - title: Reusable Widget and Component XSS
    description: |
      @html_safe is commonly used in reusable UI components, widgets, and form
      fields. If a shared component accepts user data and renders it in __str__()
      without escaping, every view that uses that component inherits the XSS
      vulnerability, amplifying the attack surface.
  - title: Template Rendering Across Multiple Views
    description: |
      Objects of @html_safe classes are typically reused across many templates and
      views. A vulnerability in the class definition affects every template that
      renders instances of that class, potentially making the XSS available across
      the entire application.
  - title: Indirect Injection via Database-Stored Values
    description: |
      If an @html_safe class's __str__() method reads its content from model fields
      that store user-supplied data, the XSS payload is stored in the database and
      executes every time the object is rendered in a template.

secure_example: |
  from django.utils.html import html_safe, escape, format_html

  # SECURE: @html_safe on a class that only produces static HTML in __str__
  @html_safe
  class Icon:
      def __init__(self, icon_name):
          # SECURE: icon_name comes from an internal allowlist, not user input
          ALLOWED_ICONS = {'home', 'user', 'settings', 'search'}
          if icon_name not in ALLOWED_ICONS:
              raise ValueError(f"Unknown icon: {icon_name}")
          self.icon_name = icon_name

      def __str__(self):
          # Static SVG class names from validated allowlist -- safe to mark as safe
          return f'<svg class="icon icon-{self.icon_name}"><use href="#{self.icon_name}"/></svg>'

  # SECURE: When user data must be included, escape it explicitly
  @html_safe
  class UserBadge:
      def __init__(self, username, role):
          self.username = username  # User-controlled
          self.role = role          # From application logic

      def __str__(self):
          # format_html() escapes both username and role values
          return format_html(
              '<span class="badge role-{}">{}</span>',
              self.role, self.username
          )

recommendations:
  - Review every @html_safe class's __str__() method to verify all dynamic content is escaped with escape() or format_html() before being included in the returned string.
  - Prefer format_html() over f-strings in __str__() methods of @html_safe classes; format_html() automatically escapes all interpolated arguments.
  - Apply @html_safe only to classes whose __str__() output is entirely static HTML or whose dynamic portions come from trusted, pre-validated sources.
  - Consider whether the class genuinely needs @html_safe or whether the HTML generation can be moved to a template fragment that benefits from automatic escaping.
  - Add tests that verify @html_safe classes properly escape HTML-sensitive characters in user-controlled fields.

detection_scope: |
  This rule uses QueryType pattern matching rather than taint analysis. It matches all
  usages of the @html_safe decorator (both calls("html_safe") and DjangoDecorators
  patterns matching html_safe). This is an audit rule providing visibility into all
  @html_safe decorator usages for manual review. Use PYTHON-DJANGO-SEC-050 for
  taint-based XSS detection in CI. The .where() clause constrains matches to Python
  files in Django project structures.

