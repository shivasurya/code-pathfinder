# FAQ
faq:
  - question: What exactly does the @html_safe decorator do?
    answer: |
      @html_safe adds a __html__() method to the decorated class that returns
      str(self). Django's template engine checks for the presence of __html__() when
      deciding whether to escape an object. If __html__() exists, the template engine
      calls it and renders the result without escaping, treating the output as
      pre-validated safe HTML. Without __html__(), the template engine escapes str(self).

  - question: Is @html_safe safe to use at all?
    answer: |
      Yes, when used correctly. @html_safe is appropriate for classes whose __str__()
      method returns static HTML templates, SVG markup, or HTML where all dynamic
      values are escaped using escape() or format_html(). It is unsafe when __str__()
      incorporates user-controlled data without escaping. The key question for each
      @html_safe usage is: does __str__() ever include unescaped user-controlled content?

  - question: How is @html_safe different from mark_safe()?
    answer: |
      mark_safe() is a function that wraps a specific string instance and marks it
      safe. @html_safe is a class decorator that marks all instances of a class
      as safe by adding __html__(). The effect is similar: both bypass template
      auto-escaping. The difference is scope -- mark_safe() applies to one string,
      @html_safe applies to every instance of the decorated class.

  - question: Can I use @html_safe safely with model fields that store user content?
    answer: |
      Only if the __str__() method escapes the field values before rendering them.
      If __str__() returns f'<div>{self.user_content}</div>' where user_content is
      a model field filled from user input, that is XSS. If it returns
      format_html('<div>{}</div>', self.user_content), the field value is escaped
      and it is safe.

  - question: Where is @html_safe most commonly used in Django codebases?
    answer: |
      Primarily in custom form widgets, template tag return types, admin site
      customizations, and reusable UI component libraries. Django's own codebase
      uses @html_safe in several utility classes. Third-party packages also use it
      for rendering helper classes. All of these usages warrant review when this
      rule flags them.

