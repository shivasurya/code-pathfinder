# Rule Identity
id: PYTHON-DJANGO-SEC-052
name: Django html_safe() Decorator Usage Audit
short_description: html_safe() marks a class's __str__ output as safe HTML, bypassing auto-escaping. Audit all usages to confirm output is properly sanitized.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-052

