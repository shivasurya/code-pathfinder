# Rule Identity
id: PYTHON-DJANGO-SEC-050
name: Django XSS via Direct HttpResponse with User Input
short_description: User input flows directly to HttpResponse without HTML escaping, enabling Cross-Site Scripting (XSS) attacks.

# Classification
severity: HIGH
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-050

# Vulnerability Details
cwe:
  - id: CWE-79
    name: "Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
    url: https://cwe.mitre.org/data/definitions/79.html

