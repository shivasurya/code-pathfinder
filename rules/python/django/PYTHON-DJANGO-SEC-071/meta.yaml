# Content
description: |
  This audit rule flags all usages of Django's @csrf_exempt decorator, which disables
  Cross-Site Request Forgery (CSRF) protection for the decorated view.

  Django's CSRF middleware validates that state-changing POST, PUT, PATCH, and DELETE
  requests include a valid CSRF token, preventing attackers from crafting malicious
  pages that trigger actions on behalf of authenticated users. The @csrf_exempt
  decorator completely disables this validation for a specific view.

  Common legitimate reasons for @csrf_exempt include webhook endpoints that receive
  requests from external services that cannot include CSRF tokens, API endpoints
  that use token-based authentication (e.g., JWT, API keys) instead of session cookies,
  and public endpoints that do not perform state-changing actions for authenticated users.
  This rule surfaces all @csrf_exempt usages for review to confirm each exemption is
  documented and justified.

message: "@csrf_exempt disables CSRF protection. Ensure this view is authenticated via tokens rather than session cookies, or that no state-changing operations are performed."

security_implications:
  - title: CSRF Attack Enabling Unauthorized State Changes
    description: |
      A view marked @csrf_exempt that performs state-changing operations for
      authenticated users (fund transfers, password changes, account deletions) is
      vulnerable to CSRF. An attacker can craft a page that automatically submits
      a form to this endpoint when visited by an authenticated user, performing
      the action without the user's knowledge or consent.
  - title: Account Takeover via Email Change CSRF
    description: |
      If a @csrf_exempt view handles email address or password changes, an attacker
      can use CSRF to change a victim's email address or password to attacker-
      controlled values, then use the password reset flow to take over the account.
  - title: Financial Fraud via Payment CSRF
    description: |
      @csrf_exempt on payment or fund transfer endpoints allows attackers to trigger
      unauthorized transactions. E-commerce and financial applications that exempt
      payment views from CSRF protection face direct financial liability from
      successful CSRF attacks.
  - title: Mass Account Manipulation
    description: |
      CSRF attacks can be scaled by hosting malicious content that automatically
      triggers requests from many users simultaneously, enabling mass data deletion,
      mass privilege changes, or coordinated manipulation of application state across
      many accounts.

secure_example: |
  from django.views.decorators.csrf import csrf_exempt
  from django.http import HttpResponse, JsonResponse
  from django.contrib.auth.decorators import login_required
  import hmac
  import hashlib

  # SECURE: Webhook endpoint -- external service cannot include CSRF token
  # Authenticate using HMAC signature instead
  @csrf_exempt
  def github_webhook(request):
      if request.method != 'POST':
          return HttpResponse(status=405)
      # SECURE: Validate webhook signature from trusted source
      signature = request.headers.get('X-Hub-Signature-256', '')
      secret = b'your_webhook_secret'
      expected = 'sha256=' + hmac.new(secret, request.body, hashlib.sha256).hexdigest()
      if not hmac.compare_digest(signature, expected):
          return HttpResponse(status=403)
      process_webhook(request.body)
      return HttpResponse(status=200)

  # SECURE: API endpoint that uses token authentication, not session cookies
  # CSRF only matters for cookie-based authentication
  @csrf_exempt
  def api_create_item(request):
      if request.method != 'POST':
          return HttpResponse(status=405)
      # Token auth -- CSRF exemption is safe because no session cookie is used
      token = request.headers.get('Authorization', '')
      user = validate_api_token(token)
      if user is None:
          return JsonResponse({'error': 'Unauthorized'}, status=401)
      # Process request for authenticated API user
      return JsonResponse({'status': 'created'}, status=201)

  # NOT SECURE: Session-authenticated view should NOT be csrf_exempt
  # @csrf_exempt  <-- REMOVE THIS
  @login_required
  def update_profile(request):
      # This view uses session authentication -- CSRF token required
      if request.method == 'POST':
          request.user.first_name = request.POST.get('name', '')
          request.user.save()
      return JsonResponse({'status': 'updated'})

recommendations:
  - Remove @csrf_exempt from all views that perform state-changing operations for session-authenticated users.
  - For webhook endpoints that receive requests from external services, use HMAC signature validation as an alternative authentication mechanism.
  - For REST API endpoints, use token-based authentication (JWT, API keys) rather than session cookies, making CSRF protection unnecessary and @csrf_exempt appropriate.
  - Document the reason for each @csrf_exempt usage in a code comment explaining why CSRF protection is not needed.
  - Review all @csrf_exempt views to confirm they perform no state-changing operations for session-authenticated users, or that they use equivalent authentication mechanisms.

detection_scope: |
  This rule uses QueryType pattern matching on calls("csrf_exempt") and
  DjangoDecorators patterns matching csrf_exempt applied to view functions and
  class-based views. It matches all @csrf_exempt usages regardless of the view's
  authentication method or operation type. This is an audit rule providing visibility
  for security review. The .where() clause constrains matches to Python files in
  Django project structures.

