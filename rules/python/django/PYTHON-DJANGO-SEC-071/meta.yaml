# FAQ
faq:
  - question: When is @csrf_exempt acceptable to use?
    answer: |
      @csrf_exempt is acceptable for: (1) Webhook endpoints receiving requests from
      third-party services that cannot include Django CSRF tokens -- these should use
      HMAC signature validation instead. (2) REST API views that use token-based
      authentication (JWT, API keys in headers) rather than session cookies -- CSRF
      attacks require the victim's browser to send the session cookie, which does not
      apply to token auth. (3) Public endpoints that perform no state changes for
      authenticated users.

  - question: Does @csrf_exempt on a webhook endpoint make the application vulnerable?
    answer: |
      Only if the webhook endpoint performs state-changing operations without
      validating that the request comes from the legitimate external service. Use
      HMAC signature validation, IP allowlisting, or other mechanisms to authenticate
      webhook sources. A @csrf_exempt webhook endpoint with no source authentication
      that modifies data is vulnerable to forgery by any external site.

  - question: Can Django REST Framework views use @csrf_exempt safely?
    answer: |
      DRF's APIView and authentication classes (TokenAuthentication, JWTAuthentication)
      automatically enforce CSRF exemption for token-authenticated requests because
      the session cookie is not used for authentication. This is safe because CSRF
      requires the browser to automatically send authentication credentials (cookies)
      with cross-site requests. Token headers are not automatically included by browsers.

  - question: What if @csrf_exempt is required for a legacy AJAX endpoint?
    answer: |
      Modern AJAX (XMLHttpRequest, fetch) can include CSRF tokens via headers or body.
      Django provides csrftoken cookie accessible to JavaScript for AJAX calls. The
      recommended pattern is to read the csrftoken cookie in JavaScript and include
      it as an X-CSRFToken header. This works with Django's CSRF middleware and
      eliminates the need for @csrf_exempt on AJAX endpoints.

  - question: Is SameSite=Strict cookie setting enough to replace CSRF tokens?
    answer: |
      SameSite=Strict prevents cookies from being sent on cross-site requests, which
      would prevent most CSRF attacks. However, browser support is not universal and
      some legitimate cross-site flows (OAuth, payment provider callbacks) require
      the Lax setting. Django's CSRF middleware provides defense-in-depth that works
      regardless of browser SameSite support.

  - question: How do I audit all @csrf_exempt views in my codebase beyond this rule?
    answer: |
      Run: pathfinder scan --ruleset python/django/PYTHON-DJANGO-SEC-071 --project .
      This lists all @csrf_exempt usages. For each finding, verify: (1) the view does
      not perform state changes for session-authenticated users, or (2) alternative
      authentication validation is present, and (3) the exemption is documented with
      a comment explaining the justification.

