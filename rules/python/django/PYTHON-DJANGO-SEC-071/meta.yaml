id: PYTHON-DJANGO-SEC-071
name: Django CSRF Exempt Decorator
short_description: '@csrf_exempt disables CSRF protection. Ensure this is intentional.'
severity: MEDIUM
category: django
language: python
ruleset: python/PYTHON-DJANGO-SEC-071
cwe:
- id: CWE-352
  name: Cross-Site Request Forgery (CSRF)
  url: https://cwe.mitre.org/data/definitions/352.html
tags:
- python
- django
- csrf
