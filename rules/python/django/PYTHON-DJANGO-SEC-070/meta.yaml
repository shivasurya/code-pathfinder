# Rule Identity
id: PYTHON-DJANGO-SEC-070
name: Django Insecure Cookie Settings via set_cookie()
short_description: Cookie set without secure, httponly, or samesite flags, making it vulnerable to interception, XSS-based theft, and CSRF attacks.

# Classification
