# Rule Identity
id: PYTHON-DJANGO-SEC-011
name: Django Command Injection via subprocess
short_description: User input flows to subprocess with shell=True or as a string command, enabling OS command injection.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-011

