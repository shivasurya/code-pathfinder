# Rule Identity
id: PYTHON-DJANGO-SEC-001
name: Django SQL Injection via cursor.execute()
short_description: User input flows to cursor.execute() without parameterization, enabling SQL injection attacks.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-001

# Vulnerability Details
cwe:
