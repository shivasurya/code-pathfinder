# Rule Identity
id: PYTHON-DJANGO-SEC-030
name: Django SSRF via requests Library
short_description: User input flows to requests.get/post/put/delete/head(), enabling the server to make HTTP requests to attacker-controlled URLs.

# Classification
severity: HIGH
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-030

# Vulnerability Details
