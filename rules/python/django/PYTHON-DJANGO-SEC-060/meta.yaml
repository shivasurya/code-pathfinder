# Rule Identity
id: PYTHON-DJANGO-SEC-060
name: Django XSS in HTML Email Body via EmailMessage
short_description: User input flows into HTML email body content without sanitization, enabling HTML injection in emails.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-060

# Vulnerability Details
cwe:
