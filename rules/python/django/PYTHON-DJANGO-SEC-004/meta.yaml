# Rule Identity
id: PYTHON-DJANGO-SEC-004
name: Django SQL Injection via RawSQL Expression
short_description: User input flows to RawSQL() expression without parameterization, enabling SQL injection through Django's annotation system.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-004

