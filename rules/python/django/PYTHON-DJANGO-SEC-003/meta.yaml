# Rule Identity
id: PYTHON-DJANGO-SEC-003
name: Django SQL Injection via QuerySet.extra()
short_description: User input flows to QuerySet.extra() without parameterization, enabling SQL injection through Django's legacy ORM extension interface.

# Classification
