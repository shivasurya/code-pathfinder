# Rule Identity
id: PYTHON-DJANGO-SEC-005
name: Raw SQL Usage Audit via RawSQL Expression
short_description: RawSQL() expression detected. Audit this usage to confirm parameterized queries are used for all user-controlled values.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-005

# Vulnerability Details
cwe:
  - id: CWE-89
    name: "Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
    url: https://cwe.mitre.org/data/definitions/89.html

owasp:
  - id: A03:2021
