# Rule Identity
id: PYTHON-DJANGO-SEC-020
name: Django Code Injection via eval()
short_description: User input flows to eval(), enabling arbitrary Python code execution on the server.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-020

