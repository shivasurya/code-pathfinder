id: PYTHON-DJANGO-SEC-020
name: Django Code Injection via eval()
short_description: User input flows to eval(). Never use eval() with untrusted data.
severity: CRITICAL
category: django
language: python
ruleset: python/PYTHON-DJANGO-SEC-020
cwe:
- id: CWE-95
  name: Improper Neutralization of Directives in Dynamically Evaluated Code
  url: https://cwe.mitre.org/data/definitions/95.html
tags:
- python
- django
- code-injection
- eval
- OWASP-A03
- CWE-95
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'These rules detect code injection vulnerabilities in Django applications where untrusted

  user input from HTTP requests flows into dynamic code evaluation functions such as eval(),

  exec(), or is used to index globals() for arbitrary function dispatch. Python''s eval() and

  exec() interpret strings as Python code, meaning any user-controlled input reaching these

  functions allows an attacker to execute arbitrary Python code on the server with the full

  privileges of the application process.'
message: User input flows to eval(). Never use eval() with untrusted data.
secure_example: "from django.http import JsonResponse\nimport ast\nimport operator\n\n# Safe math operations\
  \ whitelist\nSAFE_OPS = {\n    ast.Add: operator.add,\n    ast.Sub: operator.sub,\n    ast.Mult: operator.mul,\n\
  \    ast.Div: operator.truediv,\n}\n\ndef safe_eval_math(expr):\n    \\\"\\\"\\\"Evaluate simple math\
  \ expressions safely using AST parsing.\\\"\\\"\\\"\n    tree = ast.parse(expr, mode='eval')\n    #\
  \ Only allow numbers and basic arithmetic\n    for node in ast.walk(tree):\n        if not isinstance(node,\
  \ (ast.Expression, ast.BinOp, ast.Constant,\n                                 ast.Add, ast.Sub, ast.Mult,\
  \ ast.Div)):\n            raise ValueError(\"Unsafe expression\")\n    return eval(compile(tree, '<string>',\
  \ 'eval'))\n\ndef calculate(request):\n    # SECURE: Use ast.literal_eval or custom safe parser\n  \
  \  expression = request.GET.get('expr', '')\n    try:\n        result = safe_eval_math(expression)\n\
  \    except (ValueError, SyntaxError):\n        return JsonResponse({'error': 'Invalid expression'},\
  \ status=400)\n    return JsonResponse({'result': result})\n\ndef dispatch(request):\n    # SECURE:\
  \ Use explicit allowlist for dispatch\n    ALLOWED_ACTIONS = {\n        'list': list_items,\n      \
  \  'search': search_items,\n        'count': count_items,\n    }\n    action = request.GET.get('action',\
  \ '')\n    handler = ALLOWED_ACTIONS.get(action)\n    if handler is None:\n        return JsonResponse({'error':\
  \ 'Unknown action'}, status=400)\n    return handler(request)"
