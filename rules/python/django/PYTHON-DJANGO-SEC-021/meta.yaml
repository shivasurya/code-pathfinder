# Rule Identity
id: PYTHON-DJANGO-SEC-021
name: Django Code Injection via exec()
short_description: User input flows to exec(), enabling arbitrary Python statement execution on the server.

# Classification
severity: CRITICAL
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-021

