# Rule Identity
id: PYTHON-DJANGO-SEC-031
name: Django SSRF via urllib
short_description: User input flows to urllib.request.urlopen() or urllib.request.Request(), enabling the server to make HTTP requests to attacker-controlled URLs.

# Classification
severity: HIGH
category: django
