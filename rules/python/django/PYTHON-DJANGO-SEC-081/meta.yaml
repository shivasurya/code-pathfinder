# Rule Identity
id: PYTHON-DJANGO-SEC-081
name: Django Default Empty Password Value via flows()
short_description: request.POST.get('password', '') with empty string default flows to set_password(), potentially setting an empty password when the field is omitted.

# Classification
severity: HIGH
category: django
