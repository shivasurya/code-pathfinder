# Rule Identity
id: PYTHON-DJANGO-SEC-061
name: Django XSS in send_mail html_message Parameter
short_description: User input flows into the html_message parameter of send_mail() without sanitization, enabling HTML injection in emails.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-061

