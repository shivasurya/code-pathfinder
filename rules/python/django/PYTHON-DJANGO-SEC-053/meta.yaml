# Rule Identity
id: PYTHON-DJANGO-SEC-053
name: Django SafeString Subclass Audit
short_description: Class extends SafeString or SafeData, bypassing Django's auto-escaping for all instances. Audit to confirm the class properly sanitizes content.

# Classification
severity: MEDIUM
category: django
language: python
ruleset: python/django/PYTHON-DJANGO-SEC-053

