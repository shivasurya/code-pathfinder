# Rule Identity
id: GO-SEC-001
name: SQL Injection via database/sql
short_description: User-controlled input reaches database/sql query methods without parameterization, enabling SQL injection — ranked #3 in OWASP Top 10 and #6 in CWE Top 25 (2024).

# Classification
severity: CRITICAL
category: security
language: go
ruleset: golang/GO-SEC-001

# Vulnerability Details
