# Rule Identity
id: GO-SSRF-002
name: SSRF via Outbound net/http Client Calls
short_description: User-controlled input flows into net/http standard library client methods without URL validation, enabling SSRF attacks against internal services and cloud metadata endpoints.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-SSRF-002

# Vulnerability Details
