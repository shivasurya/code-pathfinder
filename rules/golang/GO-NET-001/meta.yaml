# Rule Identity
id: GO-NET-001
name: HTTP Server Without TLS
short_description: Detects http.ListenAndServe() starting an unencrypted HTTP server — all traffic including credentials and session tokens travels in plaintext, interceptable by any network observer.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-NET-001

