# Rule Identity
id: GO-SQLI-002
name: SQL Injection via pgx PostgreSQL Driver
short_description: User-controlled input reaches pgx query methods without parameterization, enabling SQL injection on PostgreSQL via the high-performance native pgx driver.

# Classification
severity: CRITICAL
category: security
language: go
ruleset: golang/GO-SQLI-002
status: disabled

