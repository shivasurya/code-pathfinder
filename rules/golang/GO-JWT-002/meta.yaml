# Rule Identity
id: GO-JWT-002
name: JWT Parsed Without Signature Verification
short_description: jwt.ParseUnverified() skips signature validation entirely — any attacker can forge arbitrary JWT claims (sub, role, admin) without knowing the signing key.

# Classification
severity: HIGH
category: security
