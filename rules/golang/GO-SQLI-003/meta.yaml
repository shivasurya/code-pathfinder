# Rule Identity
id: GO-SQLI-003
name: SQL Injection via sqlx
short_description: User-controlled input reaches sqlx query methods without parameterization — sqlx's convenience wrappers (Get, Select, NamedExec) are also vulnerable when used with raw string concatenation.

# Classification
severity: CRITICAL
category: security
language: go
