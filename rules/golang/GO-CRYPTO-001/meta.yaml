# Rule Identity
id: GO-CRYPTO-001
name: Use of MD5 Weak Hash Algorithm
short_description: Detects use of MD5 (crypto/md5) which is cryptographically broken — collision attacks are feasible in seconds and GPU cracking reaches 164 billion hashes/second.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-CRYPTO-001

# Vulnerability Details
cwe:
  - id: CWE-328
    name: "Use of Weak Hash"
    url: https://cwe.mitre.org/data/definitions/328.html
  - id: CWE-916
