# Rule Identity
id: GO-XSS-001
name: XSS via Unsafe html/template Type Conversions
short_description: |
  User input cast to template.HTML, template.CSS, template.JS, or template.URL bypasses
  Go's context-aware auto-escaping, allowing raw attacker payload to reach the browser.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-XSS-001

# Vulnerability Details
cwe:
  - id: CWE-79
    name: "Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
    url: https://cwe.mitre.org/data/definitions/79.html
  - id: CWE-116
    name: "Improper Encoding or Escaping of Output"
    url: https://cwe.mitre.org/data/definitions/116.html

