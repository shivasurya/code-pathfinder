# Rule Identity
id: GO-SEC-004
name: Hardcoded Credentials in Source Code
short_description: Detects credential-named variables (password, secret, api_key, token) being assigned or passed as arguments — hardcoded secrets are exposed in git history, compiled binaries, container images, and CI/CD logs.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-SEC-004

