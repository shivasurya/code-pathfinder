# Rule Identity
id: GO-GORM-SQLI-002
name: SQL Injection via GORM Query Builder Methods
short_description: User-controlled input flows into GORM query builder methods (Order, Where, Group, Having) that accept raw SQL string fragments — GORM does not escape these clause arguments.

# Classification
severity: HIGH
category: security
