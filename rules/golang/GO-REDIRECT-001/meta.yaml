# Rule Identity
id: GO-REDIRECT-001
name: Open Redirect via User-Controlled URL
short_description: User-controlled input flows into HTTP redirect functions without URL validation — open redirect enables phishing, OAuth token theft, and malware distribution via trusted-domain URLs.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-REDIRECT-001

# Vulnerability Details
cwe:
