# Rule Identity
id: GO-XSS-003
name: XSS via io.WriteString to http.ResponseWriter
short_description: User input flows into io.WriteString writing directly to ResponseWriter without HTML escaping — io.WriteString is a raw byte writer that performs no HTML neutralization.

# Classification
severity: HIGH
category: security
