# Rule Identity
id: GO-CRYPTO-005
name: MD5 Used for Password Hashing
short_description: MD5 hash output flows into password-related functions — MD5 runs at 164 billion hashes/second on a single GPU, making any MD5-hashed password database crackable in seconds to minutes.

# Classification
severity: CRITICAL
category: security
