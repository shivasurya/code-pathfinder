# Rule Identity
id: GO-NET-002
name: gRPC Client Without TLS
short_description: Detects gRPC client using grpc.WithInsecure() or grpc.WithNoTLS() which disables transport encryption — all RPC calls including auth tokens and payloads travel in plaintext.

