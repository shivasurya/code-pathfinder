# Rule Identity
id: GO-PATH-001
name: Path Traversal via HTTP Input
short_description: User-controlled HTTP input reaches file system operations without path validation — filepath.Clean() alone is insufficient; filepath.Join("/uploads", "/etc/passwd") returns "/etc/passwd" in Go.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-PATH-001

