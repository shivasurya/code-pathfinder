# Rule Identity
id: GO-SSRF-001
name: Server-Side Request Forgery via go-resty HTTP Client
short_description: User-controlled input flows into go-resty HTTP client calls without URL validation, enabling SSRF attacks that steal cloud metadata credentials or probe internal services.

# Classification
severity: HIGH
category: security
language: go
