# Rule Identity
id: GO-GORM-SQLI-001
name: SQL Injection via GORM Raw/Exec
short_description: User-controlled input flows into GORM Raw() or Exec() raw SQL methods without parameterization — GORM's ORM safety guarantees do not apply to Raw/Exec with string concatenation.

# Classification
severity: CRITICAL
category: security
language: go
