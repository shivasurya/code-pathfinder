# Rule Identity
id: GO-CRYPTO-002
name: Use of SHA1 Weak Hash Algorithm
short_description: Detects use of SHA1 (crypto/sha1) which has a proven collision (SHAttered, 2017) and is deprecated by NIST for all applications through 2030.

# Classification
severity: HIGH
category: security
language: go
ruleset: golang/GO-CRYPTO-002

