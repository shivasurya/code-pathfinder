# Rule Identity
id: GO-CRYPTO-004
name: Use of RC4 Stream Cipher
short_description: Detects use of RC4 (crypto/rc4) which is prohibited in TLS by RFC 7465 (2015), has known statistical keystream biases, and is labeled "cryptographically broken" in the Go standard library.

# Classification
severity: HIGH
category: security
