# Rule Identity
id: GO-XSS-002
name: XSS via fmt.Fprintf to http.ResponseWriter
short_description: User input flows into fmt.Fprintf/Fprintln/Fprint writing directly to ResponseWriter — fmt functions perform no HTML escaping, any user-controlled format argument renders as raw HTML in the browser.

# Classification
severity: HIGH
category: security
