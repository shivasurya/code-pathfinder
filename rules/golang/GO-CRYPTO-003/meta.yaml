# Rule Identity
id: GO-CRYPTO-003
name: Use of DES or 3DES Weak Cipher
short_description: Detects use of DES/3DES (crypto/des) — DES uses a 56-bit key exhausted in 22 hours (1999); 3DES is vulnerable to the SWEET32 birthday attack and disallowed by NIST after December 31, 2023.

