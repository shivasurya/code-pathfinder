# Rule Identity
id: GO-SEC-002
name: OS Command Injection via HTTP Input
short_description: User-controlled HTTP request input reaches os/exec command execution — the critical pattern is exec.Command("sh", "-c", userInput) which enables full shell injection with metacharacters.

# Classification
severity: CRITICAL
category: security
language: go
ruleset: golang/GO-SEC-002

# Vulnerability Details
