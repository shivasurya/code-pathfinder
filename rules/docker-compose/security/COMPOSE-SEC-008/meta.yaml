id: COMPOSE-SEC-008
name: Dangerous Capability Added
short_description: Service adds dangerous capability. These capabilities can be used for container escape
  or privilege escalation.
severity: HIGH
category: security
language: docker-compose
ruleset: docker-compose/COMPOSE-SEC-008
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker-compose
- compose
- capabilities
- cap-add
- security
- privilege-escalation
- container-escape
- linux
- kernel
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects services that add dangerous Linux capabilities via `cap_add`.

  Linux capabilities divide root privileges into distinct units. Some capabilities

  are extremely powerful and can be used for container escape or privilege escalation.

  This rule flags the most dangerous ones.'
message: Service adds dangerous capability. These capabilities can be used for container escape or privilege
  escalation.
secure_example: ''
recommendations:
  - "Review your Dockerfile to address the dangerous capability added issue"
  - "Follow Docker official best practices for image building"
  - "Use docker build --check to validate Dockerfile syntax and best practices"
detection_scope: ''
references:
- title: 'CWE-250: Execution with Unnecessary Privileges'
  url: https://cwe.mitre.org/data/definitions/250.html
- title: Linux Capabilities man page
  url: https://man7.org/linux/man-pages/man7/capabilities.7.html
- title: Docker Security Best Practices
  url: https://cheatsheetseries.owasp.org/cheatsheets/Docker_Security_Cheat_Sheet.html
compliance: []
faq:
  - question: "Why does this rule flag dangerous capability added?"
    answer: "Service adds dangerous capability. These capabilities can be used for container escape or privilege escalation."
  - question: "How do I fix this?"
    answer: "Review the secure code example in the playground above and apply the recommended pattern to your Dockerfile or docker-compose.yml."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
