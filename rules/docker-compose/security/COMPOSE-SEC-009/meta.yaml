id: COMPOSE-SEC-009
name: Using Host PID Mode
short_description: Service uses host PID namespace. Container can see and potentially signal host processes.
severity: HIGH
category: security
language: docker-compose
ruleset: docker-compose/COMPOSE-SEC-009
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker-compose
- compose
- pid
- host-pid
- security
- isolation
- namespace
- process
- information-disclosure
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects services using `pid: host`, which disables PID namespace

  isolation. This allows the container to see and interact with ALL processes

  running on the host system, including sending signals to them, viewing their

  command lines, and potentially injecting code.'
message: Service uses host PID namespace. Container can see and potentially signal host processes.
secure_example: ''
recommendations: []
detection_scope: ''
references:
- title: 'CWE-250: Execution with Unnecessary Privileges'
  url: https://cwe.mitre.org/data/definitions/250.html
- title: Docker PID Namespace Documentation
  url: ''
- title: 'CIS Docker Benchmark: Section 5.15'
  url: ''
compliance: []
faq: []
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
security_implications:
- title: Signal Sending
  description: '```bash kill -9 <pid>  # Kill host processes (if permissions allow) killall -9 sshd  #
    DoS attack on SSH ```'
- title: Information Disclosure
  description: '```bash cat /proc/*/cmdline  # Read command lines (may contain secrets) cat /proc/*/environ  #
    Read environment variables ```'
