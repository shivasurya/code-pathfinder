id: COMPOSE-SEC-007
name: Using Host Network Mode
short_description: Service uses host network mode. Container shares host network stack, bypassing network
  isolation.
severity: HIGH
category: security
language: docker-compose
ruleset: docker-compose/COMPOSE-SEC-007
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker-compose
- compose
- network
- host-network
- security
- isolation
- networking
- namespace
- privilege-escalation
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects services using `network_mode: host`, which disables network

  isolation and makes the container share the host''s network stack. This bypasses

  Docker''s network isolation, exposes all host network interfaces to the container,

  and allows the container to bind to any host port.'
message: Service uses host network mode. Container shares host network stack, bypassing network isolation.
secure_example: ''
recommendations:
  - "Review your Dockerfile to address the using host network mode issue"
  - "Follow Docker official best practices for image building"
  - "Use docker build --check to validate Dockerfile syntax and best practices"
detection_scope: ''
references:
- title: 'CWE-250: Execution with Unnecessary Privileges'
  url: https://cwe.mitre.org/data/definitions/250.html
- title: Docker Network Drivers Documentation
  url: https://docs.docker.com/network/drivers/
- title: 'CIS Docker Benchmark: Section 5.10'
  url: https://www.cisecurity.org/benchmark/docker
compliance: []
faq:
  - question: "Why does this rule flag using host network mode?"
    answer: "Service uses host network mode. Container shares host network stack, bypassing network isolation."
  - question: "How do I fix this?"
    answer: "Review the secure code example in the playground above and apply the recommended pattern to your Dockerfile or docker-compose.yml."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
security_implications:
- title: Service Exposure
  description: All container services exposed on host IP
- title: Network Sniffing
  description: Container can capture all host network traffic
- title: Localhost Access
  description: Can access services on host's 127.0.0.1
- title: No Firewall Protection
  description: Bypasses Docker's iptables rules
