id: DOCKER-SEC-001
name: Container Running as Root - Missing USER
short_description: Dockerfile does not specify USER instruction. Container will run as root by default,
  which increases the attack surface if the container is compromised.
severity: HIGH
category: security
language: docker
ruleset: docker/DOCKER-SEC-001
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker
- dockerfile
- container
- security
- privilege-escalation
- root
- user
- best-practice
- hardening
- principle-of-least-privilege
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects Dockerfiles that do not specify a USER instruction, causing

  containers to run with root privileges by default. Running containers as root

  significantly increases the attack surface and potential impact of a container

  compromise.'
message: Dockerfile does not specify USER instruction. Container will run as root by default, which increases
  the attack surface if the container is compromised.
secure_example: "FROM ubuntu:22.04\n\n# Create non-root user with specific UID/GID\nRUN groupadd -r appuser\
  \ -g 999 && \\\n    useradd -r -u 999 -g appuser appuser\n\n# Install dependencies as root\nRUN apt-get\
  \ update && apt-get install -y nginx\n\n# Switch to non-root user\nUSER appuser\n\n# Copy application\
  \ files (now owned by appuser)\nCOPY --chown=appuser:appuser app /app\n\nCMD [\"nginx\", \"-g\", \"\
  daemon off;\"]"
recommendations: []
detection_scope: ''
references:
- title: 'CWE-250: Execution with Unnecessary Privileges'
  url: https://cwe.mitre.org/data/definitions/250.html
- title: 'NIST SP 800-190: Application Container Security Guide'
  url: https://csrc.nist.gov/publications
- title: Docker Security Best Practices
  url: https://cheatsheetseries.owasp.org/cheatsheets/Docker_Security_Cheat_Sheet.html
- title: Principle of Least Privilege (PoLP)
  url: ''
compliance: []
faq: []
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
