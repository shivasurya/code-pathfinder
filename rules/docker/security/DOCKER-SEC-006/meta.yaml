tests:
  positive: tests/positive/
  negative: tests/negative/
security_implications:
- title: Container Escape
  description: 'Create privileged containers that mount the host filesystem: ```bash docker run -v /:/host
    --privileged alpine chroot /host /bin/sh ``` This gives the attacker a root shell on the host.'
- title: Privilege Escalation
  description: Start containers with any user ID, including UID 0 (root), and mount any host directory
    as a volume.
- title: Persistence
  description: Deploy malicious containers that persist across reboots by modifying host systemd services
    or cron jobs.
- title: Data Exfiltration
  description: Access all volumes, images, and containers on the host, including those containing sensitive
    data from other applications.
- title: Resource Hijacking
  description: Deploy cryptocurrency miners or consume all host resources to cause denial of service.
- title: Lateral Movement
  description: 'Access other containers'' filesystems and networks, potentially compromising the entire
    infrastructure. Real-world attack chain:

    ```bash

    # Attacker gains shell in container with Docker socket mounted

    # Step 1: List all containers

    docker ps -a # Step 2: Create privileged container mounting host root

    docker run -it -v /:/host --privileged alpine /bin/sh # Step 3: Chroot into host filesystem

    chroot /host /bin/bash # Step 4: Now has root access to host - install backdoor

    echo "* * * * * root /tmp/backdoor.sh" >> /etc/crontab

    ```'
