id: DOCKER-SEC-006
name: Docker Socket Mounted as Volume
short_description: Dockerfile mounts Docker socket. This gives the container full control over the host
  Docker daemon, equivalent to root access.
severity: CRITICAL
category: security
language: docker
ruleset: docker/DOCKER-SEC-006
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker
- dockerfile
- docker-socket
- volume
- security
- privilege-escalation
- container-escape
- daemon
- host-access
- critical
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects VOLUME instructions that mount the Docker socket into a container.

  Mounting the Docker socket (/var/run/docker.sock or /run/docker.sock) gives a container

  full control over the host''s Docker daemon, which is equivalent to unrestricted root

  access on the host machine.'
message: Dockerfile mounts Docker socket. This gives the container full control over the host Docker daemon,
  equivalent to root access.
secure_example: ''
recommendations: []
detection_scope: ''
