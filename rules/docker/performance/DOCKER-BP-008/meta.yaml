id: DOCKER-BP-008
name: pip install Without --no-cache-dir
short_description: pip install without --no-cache-dir. Pip cache remains in image, adding 50-200 MB depending
  on dependencies.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-008
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- pip
- python
- package-manager
- cache
- optimization
- image-size
- best-practice
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects RUN instructions using `pip install` without the `--no-cache-dir`

  flag. By default, pip caches downloaded packages and wheels in `~/.cache/pip/`,

  which can add 50-200 MB to Docker images. The --no-cache-dir flag disables caching,

  significantly reducing image size for Python applications.'
message: pip install without --no-cache-dir. Pip cache remains in image, adding 50-200 MB depending on
  dependencies.
secure_example: 'FROM python:3.11-slim


  WORKDIR /app


  # Copy only requirements first for layer caching

  COPY requirements.txt .


  # Good: No cache retained

  RUN pip install --no-cache-dir -r requirements.txt


  # Copy application code

  COPY . .


  CMD ["python", "app.py"]'
recommendations: []
detection_scope: ''
references:
- title: 'pip documentation: Caching'
  url: https://pip.pypa.io/en/stable/topics/caching/
