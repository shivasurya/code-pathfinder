id: DOCKER-BP-017
name: Use WORKDIR Instead of cd
short_description: Use WORKDIR instruction instead of 'cd' in RUN commands.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-017
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- workdir
- cd
- directory
- best-practice
- maintainability
- clarity
- anti-pattern
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Detects use of ''cd'' command in RUN instructions when WORKDIR is not used.

  Using ''cd'' in RUN commands is error-prone, less clear, and doesn''t persist

  across instructions. WORKDIR is the proper way to set working directory.'
message: Use WORKDIR instruction instead of 'cd' in RUN commands.
secure_example: 'FROM node:18


  # Good: WORKDIR persists across all subsequent instructions

  WORKDIR /app

  COPY . .

  RUN npm install

  RUN npm build  # Already in /app directory'
recommendations:
  - "Review your Dockerfile to address the use workdir instead of cd issue"
  - "Follow Docker official best practices for image building"
  - "Use docker build --check to validate Dockerfile syntax and best practices"
detection_scope: ''
references:
- title: Docker Best Practices
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
- title: "Dockerfile Best Practice: Use WORKDIR instead of cd"
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/#workdir
compliance: []
faq:
  - question: "Why does this rule flag use workdir instead of cd?"
    answer: "Use WORKDIR instruction instead of 'cd' in RUN commands."
  - question: "How do I fix this?"
    answer: "Review the secure code example in the playground above and apply the recommended pattern to your Dockerfile or docker-compose.yml."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
