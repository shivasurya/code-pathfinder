id: DOCKER-BP-001
name: Base Image Uses :latest Tag
short_description: Base image uses ':latest' tag or no tag (defaults to latest). This makes builds non-reproducible.
severity: MEDIUM
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-001
cwe:
- id: CWE-1188
  name: CWE 1188
  url: https://cwe.mitre.org/data/definitions/1188.html
tags:
- docker
- dockerfile
- from
- image
- tag
- version
- latest
- reproducibility
- best-practice
- supply-chain
- immutability
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects FROM instructions using the :latest tag (or no tag, which defaults

  to :latest). Using unversioned or latest-tagged base images makes builds non-reproducible

  and can introduce unexpected breaking changes or security vulnerabilities when the

  upstream image is updated.'
message: Base image uses ':latest' tag or no tag (defaults to latest). This makes builds non-reproducible.
secure_example: '# Good: Pin specific version

  FROM ubuntu:22.04


  # Better: Use digest for cryptographic verification

  FROM ubuntu:22.04@sha256:b6b83d3c331794420340093eb706a6f152d9c1fa51b262d9bf34594887c2c7ac


  # Good: Pin Python minor version

  FROM python:3.11.7-slim-bookworm


  # Good: Pin Node.js with specific base

  FROM node:18.19.0-alpine3.19


  # Multi-stage with pinned versions

  FROM maven:3.9.6-eclipse-temurin-17 AS builder

  FROM eclipse-temurin:17.0.10_7-jre-alpine'
recommendations:
  - "Pin base images to specific version tags (e.g., python:3.11-slim instead of python:latest)"
  - "Use digest pinning (@sha256:...) for maximum reproducibility"
  - "Document the base image version in a comment for team awareness"
detection_scope: ''
references:
- title: 'Docker Best Practices: Image Tagging'
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
- title: '12-Factor App: Dependencies'
  url: https://12factor.net/dependencies
- title: 'NIST SP 800-190: Container Image Integrity'
  url: https://csrc.nist.gov/publications
- title: 'CIS Docker Benchmark: Section 4.1'
  url: https://www.cisecurity.org/benchmark/docker
compliance: []
faq:
  - question: "Why should I avoid the :latest tag?"
    answer: "The :latest tag is mutable and can point to different images over time. Your build may break or introduce vulnerabilities when the upstream image changes without your knowledge."
  - question: "What is digest pinning?"
    answer: "Digest pinning uses the SHA256 hash of a specific image layer (e.g., python:3.11@sha256:abc123...). Unlike tags, digests are immutable and guarantee you always pull the exact same image."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
