id: DOCKER-COR-001
name: Multiple ENTRYPOINT Instructions
short_description: Dockerfile has multiple ENTRYPOINT instructions. Only the last one takes effect, making
  earlier ones misleading.
severity: MEDIUM
category: correctness
language: docker
ruleset: docker/DOCKER-COR-001
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- entrypoint
- correctness
- configuration
- maintainability
- confusing
- anti-pattern
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Detects Dockerfiles with multiple ENTRYPOINT instructions. Docker only honors

  the last ENTRYPOINT, making earlier ones misleading and potentially causing

  unexpected runtime behavior. This can lead to confusion and bugs.'
message: Dockerfile has multiple ENTRYPOINT instructions. Only the last one takes effect, making earlier
  ones misleading.
secure_example: 'FROM ubuntu:22.04


  # Good: Single ENTRYPOINT per Dockerfile

  ENTRYPOINT ["/app/start.sh"]


  # Or use multi-stage builds if you need different entrypoints:

  FROM ubuntu:22.04 AS stage1

  ENTRYPOINT ["/app/build.sh"]


  FROM ubuntu:22.04 AS stage2

  ENTRYPOINT ["/app/start.sh"]'
recommendations:
  - "Review your Dockerfile to address the multiple entrypoint instructions issue"
  - "Follow Docker official best practices for image building"
  - "Use docker build --check to validate Dockerfile syntax and best practices"
detection_scope: ''
references:
- title: 'Docker Documentation: ENTRYPOINT instruction'
  url: https://docs.docker.com/reference/dockerfile/#entrypoint
- title: "Dockerfile Best Practice: Multiple CMD instructions"
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/#cmd
- title: Docker Best Practices
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
compliance: []
faq:
  - question: "Why does this rule flag multiple entrypoint instructions?"
    answer: "Dockerfile has multiple ENTRYPOINT instructions. Only the last one takes effect, making earlier ones misleading."
  - question: "How do I fix this?"
    answer: "Review the secure code example in the playground above and apply the recommended pattern to your Dockerfile or docker-compose.yml."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
