id: DOCKER-COR-003
name: Multiple CMD Instructions
short_description: Multiple CMD instructions detected. Only the last one takes effect.
severity: MEDIUM
category: correctness
language: docker
ruleset: docker/DOCKER-COR-003
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- cmd
- correctness
- configuration
- maintainability
- confusing
- anti-pattern
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Detects Dockerfiles with multiple CMD instructions. Docker only honors

  the last CMD, making earlier ones misleading and potentially causing

  unexpected runtime behavior. This can lead to confusion and bugs.'
message: Multiple CMD instructions detected. Only the last one takes effect.
secure_example: 'FROM ubuntu:22.04


  # Good: Single CMD per Dockerfile

  CMD ["nginx", "-g", "daemon off;"]


  # Or use multi-stage builds if you need different commands:

  FROM ubuntu:22.04 AS builder

  CMD ["make", "build"]


  FROM ubuntu:22.04 AS runtime

  CMD ["nginx", "-g", "daemon off;"]'
recommendations: []
detection_scope: ''
references:
- title: 'Docker Documentation: CMD instruction'
  url: ''
- title: Docker Best Practices
  url: ''
compliance: []
faq: []
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
