  builds.
secure_example: '# Good: Use specific base image version

  FROM alpine:3.19.0


  # Install packages without upgrading

  RUN apk add --no-cache nginx=1.24.0-r15


  # If you need latest packages, update the base image version

  # FROM alpine:3.20.0'
