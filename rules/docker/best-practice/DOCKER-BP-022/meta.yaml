id: DOCKER-BP-022
name: Missing HEALTHCHECK Instruction
short_description: No HEALTHCHECK instruction. Container health cannot be monitored by orchestrators,
  reducing reliability and observability.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-022
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- healthcheck
- monitoring
- observability
- orchestration
- kubernetes
- reliability
- best-practice
- availability
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects Dockerfiles that do not include a HEALTHCHECK instruction.

  Health checks allow Docker, Kubernetes, and other orchestrators to monitor

  container health and automatically restart or replace failing containers,

  improving application availability and resilience.'
message: No HEALTHCHECK instruction. Container health cannot be monitored by orchestrators, reducing reliability
  and observability.
secure_example: "FROM python:3.11-slim\n\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir\
  \ -r requirements.txt\n\nCOPY . .\n\n# Health check: Test HTTP endpoint every 30s\nHEALTHCHECK --interval=30s\
  \ --timeout=3s --start-period=5s --retries=3 \\\n  CMD curl --fail http://localhost:8000/health || exit\
  \ 1\n\nCMD [\"python\", \"app.py\"]"
recommendations:
  - "Add a HEALTHCHECK instruction to enable container health monitoring"
  - "Use curl, wget, or a custom health check script"
  - "Set appropriate interval, timeout, and retries for your application"
detection_scope: ''
references:
- title: Docker HEALTHCHECK documentation
  url: https://docs.docker.com/reference/dockerfile/#healthcheck
- title: Kubernetes Liveness and Readiness Probes
  url: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
- title: '12-Factor App: Admin Processes'
  url: https://12factor.net/admin-processes
- title: Production-Ready Health Checks (Microsoft)
  url: https://learn.microsoft.com/en-us/dotnet/architecture/microservices/implement-resilient-applications/monitor-app-health
compliance: []
faq:
  - question: "Why add HEALTHCHECK to a Dockerfile?"
    answer: "HEALTHCHECK lets Docker and orchestrators like Kubernetes detect when your application is unhealthy and automatically restart or replace the container."
  - question: "What is a good health check command?"
    answer: "For web services: HEALTHCHECK CMD curl -f http://localhost:8080/health || exit 1. For non-HTTP services, use a custom script that verifies the application is responsive."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
