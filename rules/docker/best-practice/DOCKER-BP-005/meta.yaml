id: DOCKER-BP-005
name: apt-get Without --no-install-recommends
short_description: apt-get install without --no-install-recommends. This installs unnecessary packages,
  increasing image size and attack surface.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-005
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- apt-get
- package-manager
- ubuntu
- debian
- optimization
- image-size
- best-practice
- bloat
- attack-surface
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects RUN instructions that use `apt-get install` without the

  `--no-install-recommends` flag. By default, apt installs both required packages

  and "recommended" packages, which are often unnecessary and significantly bloat

  Docker images, increasing attack surface and build/deploy times.'
message: apt-get install without --no-install-recommends. This installs unnecessary packages, increasing
  image size and attack surface.
secure_example: "FROM ubuntu:22.04\n\n# Good: Only install required packages\nRUN apt-get update && \\\
  \n    apt-get install -y --no-install-recommends \\\n      nginx \\\n      curl \\\n      ca-certificates\
  \ && \\\n    # Clean up apt cache to further reduce size\n    rm -rf /var/lib/apt/lists/*\n\n# Result:\
  \ Smaller, more secure image"
recommendations: []
detection_scope: ''
references:
- title: 'Debian Policy Manual: Dependencies'
  url: https://www.debian.org/doc/debian-policy/ch-relationships.html
- title: 'Docker Best Practices: Minimize Layer Size'
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
- title: Ubuntu Package Management Guide
  url: https://help.ubuntu.com/community/AptGet/Howto
- title: 'CIS Docker Benchmark: Image Optimization'
  url: https://www.cisecurity.org/benchmark/docker
compliance: []
faq: []
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
security_implications:
- title: Supply Chain Risks
  description: 'Recommended packages may pull in: - Unmaintained dependencies - Packages from less-trusted
    sources - Transitive dependencies with vulnerabilities'
- title: Compliance Issues
  description: '- More packages = more licenses to track - Harder to maintain Software Bill of Materials
    (SBOM) - Difficult to audit all dependencies'
