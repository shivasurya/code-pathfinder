id: DOCKER-BP-016
name: Prefer JSON Notation for CMD/ENTRYPOINT
short_description: Use JSON notation (exec form) for CMD/ENTRYPOINT for proper signal handling.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-016
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- cmd
- entrypoint
- exec-form
- json
- signal-handling
- best-practice
- process-management
- pid1
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Detects CMD or ENTRYPOINT using shell form instead of exec form (JSON array).

  Shell form wraps commands in /bin/sh -c, which creates issues with signal handling,

  process management, and adds an unnecessary shell layer.'
message: Use JSON notation (exec form) for CMD/ENTRYPOINT for proper signal handling.
secure_example: 'FROM nginx:alpine


  # Good: Exec form (JSON) - proper signal handling

  CMD ["nginx", "-g", "daemon off;"]

  ENTRYPOINT ["/app/start.sh"]'
recommendations:
  - "Review your Dockerfile to address the prefer json notation for cmd/entrypoint issue"
  - "Follow Docker official best practices for image building"
  - "Use docker build --check to validate Dockerfile syntax and best practices"
detection_scope: ''
references:
- title: Docker Best Practices
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
- title: "Dockerfile Best Practice: Use JSON notation for CMD/ENTRYPOINT"
  url: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/#cmd
- title: Docker ENTRYPOINT documentation
  url: https://docs.docker.com/reference/dockerfile/#entrypoint
compliance: []
faq:
  - question: "Why does this rule flag prefer json notation for cmd/entrypoint?"
    answer: "Use JSON notation (exec form) for CMD/ENTRYPOINT for proper signal handling."
  - question: "How do I fix this?"
    answer: "Review the secure code example in the playground above and apply the recommended pattern to your Dockerfile or docker-compose.yml."
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
