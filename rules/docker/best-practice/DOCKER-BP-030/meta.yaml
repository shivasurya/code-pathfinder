id: DOCKER-BP-030
name: Nonsensical Command
short_description: RUN command uses 'cd' which doesn't persist. Use WORKDIR instead.
severity: LOW
category: best-practice
language: docker
ruleset: docker/DOCKER-BP-030
cwe:
- id: CWE-710
  name: Improper Adherence to Coding Standards
  url: https://cwe.mitre.org/data/definitions/710.html
tags:
- docker
- dockerfile
- cd
- workdir
- directory
- shell
- best-practice
- anti-pattern
- confusing
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'Detects ''cd'' command appearing in the middle or end of a RUN instruction

  chain (after ; or &&). Using cd this way is confusing and indicates the

  developer may not understand that WORKDIR should be used instead.'
message: RUN command uses 'cd' which doesn't persist. Use WORKDIR instead.
secure_example: 'FROM ubuntu:22.04


  # Good: Use WORKDIR to change directories

  RUN apt-get update && apt-get install -y nginx

  WORKDIR /app

  RUN touch file.txt'
recommendations: []
detection_scope: ''
references:
- title: Docker Best Practices
  url: ''
- title: hadolint DL4006
  url: ''
compliance: []
faq: []
similar_rules: []
tests:
  positive: tests/positive/
  negative: tests/negative/
