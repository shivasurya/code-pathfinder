id: DOCKER-AUD-003
name: Privileged Port Exposed
short_description: Exposing port below 1024 typically requires root privileges to bind. Consider using
  non-privileged ports (>1024) with port mapping or granting CAP_NET_BIND_SERVICE capability.
severity: MEDIUM
category: audit
language: docker
ruleset: docker/DOCKER-AUD-003
cwe:
- id: CWE-250
  name: Execution with Unnecessary Privileges
  url: https://cwe.mitre.org/data/definitions/250.html
tags:
- docker
- dockerfile
- port
- expose
- privileged
- root
- security
- unix
- networking
- capabilities
- best-practice
author:
  name: Shivasurya
  url: https://x.com/sshivasurya
description: 'This rule detects EXPOSE instructions for ports below 1024 (privileged ports).

  On Unix-like systems, binding to ports 1-1023 traditionally requires root privileges,

  which conflicts with the security best practice of running containers as non-root users.

  While this rule is informational (sometimes privileged ports are intentional), it

  highlights a potential privilege escalation requirement.'
message: Exposing port below 1024 typically requires root privileges to bind. Consider using non-privileged
  ports (>1024) with port mapping or granting CAP_NET_BIND_SERVICE capability.
secure_example: ''
recommendations: []
detection_scope: ''
references:
- title: 'Linux Capabilities: CAP_NET_BIND_SERVICE'
  url: https://man7.org/linux/man-pages/man7/capabilities.7.html
